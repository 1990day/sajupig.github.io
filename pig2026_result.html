        // 페이지가 열리자마자 브라우저 금고(sessionStorage)에서 정보를 꺼내옵니다!
        window.onload = function() {
            setTimeout(() => { // 살짝 로딩 느낌 주기
                const gender = sessionStorage.getItem('saju_gender');
                const calendarType = sessionStorage.getItem('saju_calendar');
                const yearStr = sessionStorage.getItem('saju_year');
                const monthStr = sessionStorage.getItem('saju_month');
                const dayStr = sessionStorage.getItem('saju_day');
                const timeStr = sessionStorage.getItem('saju_time');

                const year = parseInt(yearStr);
                const month = parseInt(monthStr);
                const day = parseInt(dayStr);
                
                const timeMap = {
                    'unknown': 12, '자시': 0, '축시': 2, '인시': 4, '묘시': 6, '진시': 8,
                    '사시': 10, '오시': 12, '미시': 14, '신시': 16, '유시': 18, '술시': 20, '해시': 22
                };
                const hour = timeMap[timeStr] !== undefined ? timeMap[timeStr] : 12;

                let lunarObj;
                if (calendarType === 'solar') {
                    lunarObj = Solar.fromYmdHms(year, month, day, hour, 0, 0).getLunar();
                } else if (calendarType === 'lunar') {
                    lunarObj = Lunar.fromYmdHms(year, month, day, hour, 0, 0);
                } else if (calendarType === 'lunar-leap') {
                    lunarObj = Lunar.fromYmdHms(year, -month, day, hour, 0, 0); // 윤달 처리는 생략/간소화
                }

                const bazi = lunarObj.getEightChar();
                
                // 정보로 마법의 운세 생성!
                const fortuneHtml = generateFortune2026(bazi, gender);

                // 일주 이름만 뽑아서 화면 위쪽에 예쁘게 표시
                const dGan = bazi.getDay().charAt(0); 
                const dZhi = bazi.getDay().charAt(1);
                document.getElementById('ilju-name-display').innerText = transFull(dGan) + transFull(dZhi) + " 일주";

                // 로딩 문구 숨기고, 결과창과 버튼 띄우기
                document.getElementById('result-loading').style.display = 'none';
                document.getElementById('dynamic-fortune-content').innerHTML += fortuneHtml;
                document.getElementById('fortune-result-content').style.display = 'block';
                document.getElementById('go-home-btn').style.display = 'block';

            }, 1500); // 1.5초 로딩
        };
    </script>
