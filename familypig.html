    function openLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }

    function dummyLogin() {
        alert("꿀꿀! 사주돼지 로그인이 완료되었습니다.");
        closeLogin();
        document.querySelector('.login-btn-header').innerText = '내 돼지정보';

    (function initDropdowns() {
        const selects = [
            {y: 'me-year', m: 'me-month', d: 'me-day'},
            {y: 'you-year', m: 'you-month', d: 'you-day'}
        ];
        
        const curYear = new Date().getFullYear();
        
        selects.forEach(group => {
            const yearSel = document.getElementById(group.y);
            const monthSel = document.getElementById(group.m);
            const daySel = document.getElementById(group.d);
            
            if (!yearSel || yearSel.options.length > 0) return;

            for(let i = curYear; i >= 1900; i--) yearSel.add(new Option(i + "년", i));
            for(let i = 1; i <= 12; i++) monthSel.add(new Option(i + "월", i));
            for(let i = 1; i <= 31; i++) daySel.add(new Option(i + "일", i));
            
            yearSel.value = "1990";
        });
    })();

        '乙亥': "시끌벅적하고 말 많은 가족들 사이에서 묘하게 거리를 두며 적당한 개인주의를 실천하는 조용한 평화주의자입니다. 명절에 형제들끼리 유산이나 부모님 모시는 문제로 핏대를 세우고 싸우면 누구 편도 들지 않고 스위스 같은 중립국 역할을 자처하며 구석에서 전만 부칩니다. 부모님의 깊은 감정 쓰레기통 역할을 하거나 형제들의 사생활에 지나치게 간섭하는 피곤하고 질척거리는 가족 관계를 극도로 꺼립니다. 스트레스가 극에 달하면 갑자기 본가 연락을 다 무시하고 잠수를 타거나 자기만의 동굴로 들어가 버리는 기행을 벌여 식구들의 복장을 터지게 만듭니다. 다정하고 말도 잘 들어주지만 진짜 속마음은 꽁꽁 숨겨두어 가족조차도 무슨 생각을 하는지 모르는 고양이 같은 성향입니다.",
        '丙子': "밖에서는 텐션 높고 쿨하게 잘 어울리는 인싸처럼 보이지만, 집안에 들어오면 부모 형제에게 꽤나 지독한 집착과 소유욕을 보이는 이중적인 면모가 있습니다. 내 형제가 나 말고 다른 친척이랑 더 친하게 지내거나 부모님이 동생만 편애하는 꼴을 보면 겉으론 쿨한 척 폰만 만지작거려도 속은 활활 타들어 갑니다. 은근슬쩍 집안의 사랑을 독차지하고 싶어 서운함을 티 내거나 밥을 안 먹고 방문을 걸어 잠그는 등 묘하게 유치한 질투를 시전합니다. 집안의 대소사에서 은근히 자기가 주도권을 쥐고 여론을 이끌고 싶어 하는 보스 기질도 다분합니다. 식구들을 툭툭 건드려보고 애정을 지속적으로 확인받으려는 버릇 탓에 피곤하지만, 그만큼 가족을 끔찍이 아끼고 명절 분위기를 띄우는 데는 일등 공신입니다.",
        '丁丑': "부모 형제의 작은 고민과 빚 문제 하나도 내 일처럼 끌어안고 끙끙대는 헌신과 눈물겨운 인내의 아이콘입니다. 동생이 사고를 쳐 합의금이 필요하다면 몰래 대출을 받아서라도 쥐어주고, 부모님의 신세 한탄도 새벽까지 무릎 꿇고 들어주는 보살급 멘탈을 가졌습니다. 하지만 본인은 정작 심한 상처를 받고 서운해도 꾹꾹 참으며 속병을 앓는 짠하고 답답한 캐릭터입니다. 가족 간의 불화를 피하려고 무조건 내가 죄인이라고 머리를 숙이지만, 그 억울함이 계속 쌓이다가 어느 날 갑자기 눈이 돌아가 폭발하며 가출해 버리거나 연을 뚝 끊어 주변을 경악하게 만듭니다. 이기적이고 뻔뻔한 핏줄들에게 엮여서 평생 호구 잡히기 딱 좋은 샌드백 성향이니, 제발 가끔은 철저하게 이기적으로 살아갈 필요가 있습니다.",
        '戊寅': "내가 이 구역의 대장이 되어 식구들을 진두지휘하고 총대를 메야 직성이 풀리는 상남자 상여자 대장부 스타일입니다. 명절 식당 예약부터 부모님 칠순 잔치 플랜, 심지어 형제의 이사 방향까지 본인이 주도해야 마음이 편하고 식구들이 토를 달면 짜증이 확 올라옵니다. 의리가 넘쳐서 내 가족이 밖에서 억울한 일을 당하면 불도저처럼 밀고 들어가 다 뒤집어엎을 정도로 든든합니다. 하지만 자기 주장이 너무 강해서 집안에서는 대화가 안 통하는 통제광이나 군사 독재자처럼 느껴지기도 합니다. 남의 말을 듣기보단 내 말이 무조건 법이니까 잔말 말고 따라 라는 식의 꼰대 마인드가 발동할 때가 많아 기가 약한 가족들은 슬금슬금 피하게 됩니다. 강압적인 명령조만 버리면 집안을 일으켜 세울 장군감입니다.",
        '己卯': "어떤 험악한 집안 분위기든 카멜레온처럼 보호색을 띠며 스며드는 눈치 백단 생존 전문가입니다. 부모님과 형제 사이에서 상속 문제로 피 터지는 싸움이 나도 기가 막히게 양쪽을 오가며 박쥐처럼 줄을 타고 절대 욕을 먹지 않는 신들린 처세술을 자랑합니다. 식구들 비위를 아주 잘 맞춰주고 쓴소리를 안 해서 싹싹하다는 소리를 듣지만, 속으로는 누구보다 철저하게 부양의 책임을 피할 손절 각과 이득을 챙길 계산기를 두드리는 중입니다. 나한테 조금이라도 금전적 피해가 올 것 같은 사고뭉치 식구는 대놓고 싸우지 않고 서서히 연락 빈도를 줄이며 흔적도 없이 거리를 둬버립니다. 앞에서는 웃으며 다 들어주는 척하지만 실속은 거머리처럼 다 챙겨 먹는 제일 얍삽하고 무서운 실용주의자입니다.",
        '庚辰': "맺고 끊음이 식칼처럼 확실하고 한 번 결정하면 불도저처럼 밀어붙이는 박력 터지는 가족입니다. 핏줄 사이라도 빙빙 돌려 말하는 꼴을 극혐해서 부모님에게도 팩트로 명치를 세게 때리는 잔인한 직언 제조기입니다. 하지만 뒤끝은 1도 없어서 한바탕 시원하게 쌍욕을 섞어가며 대판 싸우고 나면 언제 그랬냐는 듯 훌훌 털어버리고 밥을 비벼 먹습니다. 돈 문제로 쪼잔하게 굴거나 구차하게 변명하며 책임 회피하는 형제를 가장 경멸하며 집안의 체면과 가오를 목숨처럼 중요시합니다. 가족이라도 내 믿음을 한 번이라도 크게 저버리고 사기를 치면 그 자리에서 호적을 파버릴 기세로 영구 제명시켜 버리는 무자비함이 있습니다. 필터링 없는 말로 상처를 주지만 위기 상황엔 전 재산을 내놓는 진짜배기 핏줄입니다.",
        '辛巳': "자신의 라이프스타일과 삶의 퀄리티를 지독하게 중요시하여 가족의 촌스러움이나 구질구질함을 은근히 부끄러워하고 혐오하는 우아한 속물주의자입니다. 거지근성으로 똘똘 뭉쳐 돈 꿔달라는 형제나, 매너 없이 지저분한 생활 습관을 가진 식구와는 한집에 사는 것조차 지옥불처럼 고통스러워합니다. 겉으로는 생글생글 웃으며 교양 있게 굴지만 속으로는 가족들의 경제 관념, 직업군, 패션 센스를 스캔하며 계속해서 마이너스 점수를 줍니다. 내 기준에 미달하는 막장 가족이라고 느끼면 스트레스를 견디지 못하고 서서히 거리를 두며 우아하게 독립을 선언해 남보다 못한 사이로 지냅니다. 남들에게 보여지는 가풍을 중요시해 부모님 용돈도 화끈하게 쏘지만 그만큼 대접받길 바라는 예민한 귀족병 환자입니다.",
        '壬午': "말 한마디로 천 냥 빚도 갚고 깐깐한 부모님 혼을 쏙 빼놓아 용돈을 타내는 마성의 입담을 가진 집안의 재간둥이입니다. 넉살이 엄청나게 좋고 유머 감각이 뛰어나서 명절에 싸해진 친척들 분위기도 5분 만에 배꼽 잡고 웃게 만드는 초능력이 있습니다. 가족들을 자기 페이스로 교묘하게 끌어들이며 은근슬쩍 불리한 잔소리 상황을 모면하는 혓바닥 기술이 탁월합니다. 밖으로 발이 넓어서 여기저기 술자리 부르는 곳이 많다 보니 정작 명절 당일이나 집안 대소사엔 코빼기도 안 보여 부모님 입장에서는 천불이 나는 철부지 자식이기도 합니다. 호기심이 많고 진지하고 무거운 제사나 부양 문제는 질색하며, 늘 즐겁고 가벼운 핑곗거리를 만들어 밖으로 나도는 자유분방한 피터팬 핏줄입니다.",
        '癸未': "가족의 불행과 아픔을 자기 일처럼 뼛속까지 안타까워하고 어떻게든 자기 살을 깎아서라도 도와주려고 오지랖을 부리는 짠내 폭발 마더 테레사입니다. 형제가 사업에 망해 고민을 털어놓으면 새벽까지 같이 오열해주고 해결책을 찾아 이리저리 뛰어다니는 따뜻한 심성의 소유자입니다. 하지만 정작 본인은 자기 속마음을 잘 드러내지 않고 외로움을 심하게 타서 가족 내 애정 결핍 기질이 다분합니다. 내가 희생한 만큼 부모 형제도 나를 가장 특별하고 1순위로 생각해 주길 바라는 갈구가 커서, 사소한 편애나 명절의 서운함에도 크게 삐지고 멘탈이 바사삭 부서집니다. 상대방에게 지나치게 의존하고 희생을 강요하며 서로의 숨통을 조일 수 있으니, 제발 가족으로부터의 정서적 독립이 시급한 분입니다.",
        '甲申': "가족 사이에서도 묘하게 경쟁심을 불태우며 형제자매보다 무조건 자기가 더 돈을 많이 벌고 잘나가야 직성이 풀리는 피곤한 승부사입니다. 명절에 친척들이 모이면 은근슬쩍 자기 새 차, 연봉, 자식 성적 자랑을 교묘하게 섞어가며 기를 죽이고 우위를 점하려 하는 얄미운 구석이 있습니다. 행동력과 추진력이 폭발적이라 집안 행사를 이끌고 가는 걸 좋아하지만, 타협을 전혀 모르고 부모님 의견도 개무시한 채 자기 고집대로 밀어붙이는 불도저 기질 탓에 명절마다 잦은 고성을 빚습니다. 식구들이 내 의견에 태클을 걸거나 반대하면 눈이 뒤집혀 불같이 화를 내며 밥상을 엎을 기세를 보입니다. 살가운 애정 표현은 죽어도 못 하지만 내 가족이 밖에서 욕먹고 들어오면 당장 뛰쳐나가는 행동파 핏줄입니다.",
        '乙酉': "가족을 자기 입맛과 기준대로 완벽하게 통제하고 개조하려는 숨 막히는 완벽주의자이자 지적질 대마왕입니다. 부모님의 생활 습관부터 형제의 옷차림, 재테크 방식, 애인 고르는 눈까지 시시콜콜 잔소리를 늘어놓으며 메스를 들이댑니다. 겉으로는 다 피가 되고 살이 되라고 하는 소리라고 포장하지만 사실은 내 눈에 거슬리고 답답한 꼴을 1초도 못 보는 지독한 깐깐함 때문입니다. 눈물 콧물 빼는 감정적인 위로나 공감보다는 차가운 얼음장 같은 팩트 폭행을 날려 가족의 명치를 두 번 박살 내는 잔인한 재주가 있습니다. 계산이 기가 막히게 빠르고 억울하게 손해 보는 짓은 절대 안 해서, 형제간의 부양비나 유산 문제도 철저하게 기브 앤 테이크를 따집니다. 피도 눈물도 없어 보이지만 위기 해결 능력은 1등입니다.",
        '丙戌': "호탕하고 짐승 같은 의리가 넘쳐서 가족들을 위해 지갑을 활짝 열고 호구 노릇을 자처하는 집안의 든든한 물주이자 행동 대장입니다. 겉보기엔 근심 걱정 하나 없이 해맑은 대인배 같지만, 혼자 방에 있을 땐 극도의 외로움과 우울감에 빠지는 반전 조울증 멘탈의 소유자입니다. 형제들이 나를 빼놓고 모이거나 부모님이 대놓고 다른 자식을 편애하면 하늘이 무너지는 듯한 끔찍한 배신감을 느끼고 그 자리에서 눈이 돌아 이성의 끈을 놓아버릴 정도로 욱하는 다혈질입니다. 촉이 무서울 정도로 발달해서 가족 누군가 나에게 돈을 숨기려 하거나 거짓말을 하면 귀신같이 알아채고 쌍욕을 날립니다. 정이 많아 내 식구에겐 간장게장 다리까지 발라주지만 한 번 돌아서면 가장 무서운 원수가 됩니다.",
        '丁亥': "가족들의 너덜너덜해진 멘탈을 조용히 어루만져 주고 상처를 보듬어 주는 집안의 따뜻하고 포근한 심리 상담가 같은 존재입니다. 웬만하면 큰소리를 내며 부딪히지 않고 둥글둥글하게 잘 지내며, 부모님과 형제 사이에서 고성이 오가는 트러블이 생기면 스무스하게 말로 중재하는 외교관 역할을 맡습니다. 겉보기엔 한없이 순둥순둥하고 만만해 보이지만, 속으로는 가족들의 능력치, 재산 상황, 인성까지 철저하고 냉혹하게 분석하며 은근히 포지션을 나누는 무서운 이성도 숨어있습니다. 대놓고 싸우며 핏대를 세우기보다는 부드러운 화법으로 식구들을 가스라이팅하여 결국 내가 원하는 방향으로 이끄는 지능적인 처세술이 뛰어납니다. 진짜 내 밥그릇은 절대 안 뺏기면서도 효자 소리는 다 듣는 영악한 실속파입니다.",
        '戊子': "명절에 모여도 리액션이 고장 나고 평소 본가에 연락도 드문드문해서 도대체 집구석에 관심이 있긴 한 건지 알 수 없는 무뚝뚝의 끝판왕이자 돌하르방입니다. 부모님이 서운함을 토로하며 눈물을 흘려도 로봇처럼 영혼 없는 대답만 늘어놓아 복장을 터뜨려 명에 살게 만듭니다. 하지만 속으로는 집안의 대소사와 가족들의 밥줄을 끊임없이 계산하고 걱정하며 밤잠을 설치는 보이지 않는 그림자 가장입니다. 말로 사랑한다고 오글거리게 표현하기보다는 부모님 낡은 냉장고를 조용히 최고급으로 바꿔주거나, 집안에 급전이 필요할 때 묻지도 따지지도 않고 목돈을 입금해 버리는 식의 츤데레 짓으로 핏줄의 애정을 증명합니다. 요란한 화목함은 질색하지만 한 번 내 가족은 굶어 죽는 꼴을 절대 못 보는 책임감의 화신입니다.",
        '己丑': "집안에서 누가 사업을 말아먹거나 속을 썩여도 묵묵히 다 뒤집어쓰고 참아내는 미련할 정도의 인내심과 황소고집을 가진 짠한 가족입니다. 형제가 큰 사고를 치거나 부모님이 대놓고 헌신을 무시하며 차별 대우를 해도 당장 연을 끊지 못하고 혼자 속으로 삭히며 무던하게 호구처럼 버텨줍니다. 남들이 보면 왜 저런 개차반 취급을 받고도 집에 붙어있나 싶을 정도로 답답해 보입니다. 하지만 이 참을성도 마일리지가 있어서 인내의 둑이 무너지는 순간 눈이 핑 돌며 지난 20년 치 서운했던 일화까지 날짜별로 끄집어내 화산 폭발하듯 쏟아내 주변을 초토화시킵니다. 변화를 병적으로 싫어하고 보수적이라 늘 먹던 명절 음식, 고루한 제사 방식만 박박 고집해서 답답한 꼰대 소리를 듣기도 하지만 집안을 지키는 듬직한 소입니다.",
        '庚寅': "성질머리가 활활 타오르는 불같고 생각한 건 바로 행동으로 질러버려야 직성이 풀리는 집안의 통제 불능 무법자입니다. 뒤끝이 1도 없고 투명해서 음흉하게 재산 문제나 유산으로 속을 꿍꿍 앓으며 머리 쓰는 짓은 뇌 구조상 절대 못 합니다. 식구들에게 불만이 생기면 다짜고짜 방문을 열고 쳐들어가 샤우팅을 지르고 밥상을 뒤집어엎은 뒤, 10분 뒤에 쿨하게 화해하자고 피자를 사 오는 단세포적인 매력이자 환장할 포인트가 있습니다. 가오와 체면을 목숨처럼 여겨서 친척들 앞에서 돈 낼 때 눈치 보며 쪼잔하게 구는 걸 극혐하고 가장 먼저 화끈하게 카드를 긁습니다. 하지만 너무 직진만 하는 성격 탓에 필터링 없는 말로 부모님 마음에 대못을 박고 혼자 방구석에서 엉엉 우는 일도 잦은 쌈닭입니다.",
        '辛卯': "분위기와 감각을 목숨보다 중요시하여 집안 꼴이 조금이라도 지저분하거나 촌스러운 것을 1초도 견디지 못하는 극강의 까탈스런 예민 보스입니다. 부모님의 옥장판 구식 인테리어나 형제의 목 늘어난 츄리닝 패션을 볼 때마다 한숨을 푹푹 쉬며 은근히 꼽을 주고 가르치려 듭니다. 눈이 너무 높고 결벽증에 가까워 명절에 친척이 밥 먹을 때 쩝쩝거리는 소리 하나에도 얼굴을 찌푸리며 속으로 무식하다고 맹렬히 무시하기도 합니다. 성격이 미친 듯이 변덕스럽고 가시 돋친 팩폭을 툭툭 내뱉어서 온 가족이 이 사람 눈치를 보게 만드는 묘하고 불편한 권력을 쥐고 있습니다. 내 비위에 조금이라도 거슬리면 피를 나눈 가족이라도 가차 없이 철벽을 치고 카톡을 차단해버리는 도도하고 싸가지 없는 고양이 성향입니다.",
        '壬辰': "집안 구석에서도 무조건 자기가 무리를 이끌고 명령을 내리는 대장 노릇을 해야 성에 차는 무서운 야망캐이자 골목대장입니다. 부모님의 낡은 간섭이나 꼰대 같은 통제를 죽기보다 싫어해서, 은근슬쩍 집안 여론을 교묘하게 자기 쪽으로 주도하고 명절 스케줄도 내 맘대로 기획해야 직성이 풀립니다. 승부욕과 질투심이 미친 듯이 강해서 형제자매가 나보다 돈을 더 잘 벌거나 부모님의 유산을 더 받으면 속으로 시퍼런 칼을 갈며 극악의 질투의 화신으로 변해 난리를 칩니다. 재산 분쟁이나 서열 싸움이 생기면 핏줄이고 뭐고 물러서기는커녕 수단과 방법을 가리지 않고 쟁취해 내는 소름 돋는 전투력을 자랑합니다. 스케일이 커서 화끈하게 쏘기도 하지만 내가 1인자가 아니면 다 엎어버리는 독선적인 폭군입니다.",
        '癸巳': "어떤 험악하고 살얼음판 같은 집안 분위기라도 애교 한 번, 능청스러운 조크 한마디로 스르르 녹여버리는 인간 소화기이자 요물입니다. 부모님과의 갈등을 정면으로 핏대 세워 돌파하기보다는 빙글빙글 돌려서 부드럽게 넘어가거나 상대방이 스스로 잔소리를 멈추게 포기하게 만드는 고단수 심리전과 가스라이팅의 달인입니다. 화를 내는 법이 거의 없고 워낙 싹싹해서 어른들에게 늘 최고로 예쁨을 받지만, 그 선한 천사 얼굴 뒤에는 이 상황이 나한테 물질적으로 이득이 되는지 철저하게 따지는 차가운 주판알이 미친 듯이 굴러가고 있습니다. 부양 문제 등 절대 자기가 손해 보는 짓은 안 하며, 집안에 빚이 생기거나 멸망의 위기가 닥치면 제일 먼저 발을 빼고 해외로 도망가 버릴 영악함을 갖춘 실리주의자입니다.",
        '甲午': "어딜 가나 시선을 한 몸에 받고 명절마다 화려하고 시끄러운 입담으로 친척들의 혼을 쏙 빼놓는 미친 존재감의 관종 소유자입니다. 오지랖이 태평양보다 넓고 텐션이 대기권을 찌르지만 그만큼 감정의 롤러코스터도 미친 수준이라 도무지 종잡을 수 없는 집안의 걸어 다니는 시한폭탄이기도 합니다. 부모님이 조금이라도 비교하거나 잔소리를 하면 단 1초도 참지 못하고 그 자리에서 쌍욕을 섞어가며 필터링 없이 쏟아부어 명절 분위기를 초상집으로 만들고는, 며칠 뒤 폭풍 오열하며 한우 세트를 보내는 정신 나간 패턴을 반복합니다. 참을성이 생후 3개월 아기 수준이라 지루하고 고루한 가족 제사나 훈화 말씀을 못 버티고 튀어버립니다. 늘 옆에서 사고 칠까 멘탈을 잡아줘야 하는 통제 불능 비글 같은 핏줄입니다.",
        '乙未': "겉으로는 네네, 엄마 아빠 뜻대로 다 할게요 하면서 다 맞춰주고 져주는 순하고 불쌍한 양 같지만, 속에는 구렁이 백 마리가 똬리를 틀고 들어앉은 무서운 집념의 소유자입니다. 가족들 의견에 순순히 따르고 희생하는 척하면서도 결국 돌고 돌아 몇 년 뒤 자기가 원하는 목적(알짜 유산, 전폭적 지원금 등)으로 교묘하게 상황을 이끄는 소름 돋는 조종술을 가졌습니다. 끈질긴 인내심 하나는 우주 최강이라, 아무리 억울하게 차별받고 욕을 먹는 상황이라도 입술을 깨물고 효도하며 버티다가 최후의 승리자가 되는 독한 타입입니다. 소유욕과 질투가 은근히 강해서 부모님이 다른 형제를 편애하면 겉으론 웃어넘기지만 속으론 저주를 퍼부으며 블랙박스에 다 녹화해 둡니다. 한 번 원한을 품으면 죽을 때까지 복수하는 외유내강형 독사입니다.",
        '丙申': "가족의 진지하고 무거운 책임감, 부양 의무 같은 단어는 딱 질색이고 늘 새롭고 재밌는 도파민만 쫓아다니는 구제 불능 자유로운 영혼입니다. 유머 감각과 밈 활용 센스가 터져서 우울한 집안 분위기를 순식간에 예능으로 환기시키는 재간둥이 역할을 톡톡히 하지만, 장남 장녀로서의 진득함이나 인내심과는 거리가 안드로메다만큼 멉니다. 부모님이 심각한 노후 고민이나 빚 문제를 털어놔도 농담으로 회피하거나 분위기 파악 못 하고 장난을 쳐서 식구들 속을 확 뒤집어 놓습니다. 명절에 오기로 약속을 잡아놔도 그날 기분에 따라 갑자기 취소하거나 친구들과 해외여행을 가버리는 충동적인 기행을 밥 먹듯이 벌입니다. 무거운 책임감을 기대하면 상처만 받는, 그냥 가끔 만나서 맛있는 거나 먹는 쿨한 파티원 느낌의 철부지입니다.",
        '丁酉': "명절에 본가에 방문할 때도 음식의 퀄리티와 플레이팅, 집안의 위생 상태, 잠자리의 쾌적함을 병적으로 고집하는 극강의 피곤한 까탈쟁이입니다. 식구들끼리 대충 남은 전이나 찌개를 비벼 먹자고 하면 동공 지진이 오며 은근히 불쾌해하고 숟가락을 내려놓습니다. 자신이 가족에게 받는 대우와 서열 포지션에 굉장히 예민해서, 형제가 매너 없이 굴거나 부모님이 내 헌신을 무시하면 속으로 분노하며 바로 마음의 철창을 닫아버립니다. 눈치가 무서울 정도로 빠르고 예리해서 식구들의 사소한 돈 거짓말이나 편애는 0.1초 만에 꿰뚫어 보고 코웃음을 치며 경멸합니다. 피곤할 정도로 잣대가 높아서 가족들과도 부딪히지만, 내 맘에 드는 대우를 해주면 백화점 VIP 대접을 해주는 우아한 호구병 환자이기도 합니다.",
        '戊戌': "타협이란 단어는 사전에서 찢어버린 아집과 독선으로 똘똘 뭉친 집안의 브레이크 고장 난 고집불통 대마왕입니다. 부모나 형제가 내 인생 방식이나 정치 성향에 태클을 걸면 그 자리에서 끝장 논리 배틀을 신청해 피를 봐야 직성이 풀립니다. 남의 말은 귓등으로도 안 듣고 자기가 무조건 100퍼센트 맞다고 박박 우기는 통에 주변 가족들이 기가 다 빨려서 결국 포기하고 맙니다. 내 방에 마음대로 들어오거나 폰을 보는 선을 넘는 간섭을 극도로 혐오해서, 핏줄이라도 지켜야 할 철조망에 고압 전류가 흐르고 있습니다. 욱하는 성질을 주체 못 하고 집안 살림을 다 엎어버리는 파괴적인 다혈질 폭군이지만, 역설적이게도 자기 식구 하나만큼은 굶어 죽어도 책임지고 지켜내는 상남자 상여자의 가장 무거운 어깨를 가졌습니다.",
        '己亥': "겉보기엔 착하고 무던해서 부모님 말씀 잘 듣고 형제에게 다 양보하는 짠한 호구처럼 보이지만, 실상은 머릿속에 가계부와 재산 분할 비율, 증여세를 슈퍼컴퓨터처럼 돌리고 있는 소름 돋는 실리주의자입니다. 형제들 사이에서 부양 문제나 병원비로 피 터지는 충돌이 나면 절대 대놓고 앞에 나서지 않고 관망하다가, 결국 나에게 제일 이득이 되는 쪽에 은근슬쩍 들러붙는 기회주의적 성향이 농후합니다. 억울한 일이 있어도 대놓고 싸우지 않고 눈물을 무기로 분위기와 상황을 교묘하게 조작해서 부모님이 스스로 내 편을 들게 만드는 음흉하고 완벽한 전술의 달인입니다. 진짜 속마음과 숨겨둔 비자금은 죽어도 꺼내 보여주지 않으면서 집안의 알짜배기 혜택은 알뜰살뜰 다 챙겨 먹는 가장 무서운 실속파입니다.",
        '庚子': "부모 형제의 감정적인 헛소리나 모순을 귀신같이 잡아내서 자비 없는 뼈 때리는 논리로 압살해 버리는 집안의 팩트 폭행 전차입니다. 가족이 밖에서 상처받아 위로나 공감을 바라고 하소연했다간 그건 니가 멍청하게 굴어서 그런 건데? 라며 차가운 얼음장 팩트로 명치를 찌르고 눈물 콧물 빼게 만듭니다. 감정에 휩쓸려 오열하거나 신세 한탄하는 막장 드라마 꼴을 극도로 혐오하고 언제나 냉철한 이성 충을 유지하려 애씁니다. 형제가 도박으로 빚을 지고 보증을 서달라거나 거짓말을 치는 순간 혈연이라도 버러지 취급하며 미련 없이 인연을 끊어버리는 서늘한 결단력이 있습니다. 너무 차갑고 기계 같아서 정떨어지지만, 집안에 법적 소송이나 금전 문제가 터졌을 땐 이 가족만한 완벽한 알파고 해결사가 없습니다.",
        '辛丑': "아무리 집안이 돈 문제로 뒤집어지고 빡치는 상황에서도 안면 근육 하나 안 떨리고 꾹꾹 눌러 참는 극강의 징그러운 포커페이스입니다. 부모님이 아무리 노골적으로 편애하고 비수를 꽂아도 그 자리에서 절대 티를 안 내고 조용히 밥만 넘기기 때문에 남들은 이 자식이 뇌가 맑은 보살인 줄 압니다. 하지만 사실은 똥고집이 황소 뺨치게 쎄고, 속으로는 받은 상처와 원한을 사골 곰탕처럼 푹푹 끓이며 복수의 칼을 갈고 있는 중입니다. 이미 썩어 문드러진 집안 문제나 빚쟁이 형제도 쉽게 끊어내지 못하고 미련하게 혼자 끌어안고 가는 고구마 1,000개 먹은 답답함이 있습니다. 평생을 호구처럼 참다가 어느 날 명절에 한계치가 터지면 밥상을 다 엎어버리고 쌍욕을 시전하는 조용한 화산 같은 무서운 성질입니다.",
        '壬寅': "집구석에 가만히 앉아있는 꼴을 1초도 못 견디고 늘 새로운 밖의 자극과 사람들을 찾아 쏘다니는 통제 불능 자유의 영혼입니다. 지적 호기심이 뛰어나서 명절에 어른들과 정치나 경제 토론하는 걸 즐기고, 입담이 워낙 좋아서 지루한 제사 분위기를 화기애애한 예능으로 리드합니다. 오지랖이 태평양 같아서 온갖 친척들의 민원과 연애 상담을 도맡아 하고 위기에 빠진 가족을 지나치지 못하는 홍반장 기질이 낭낭합니다. 하지만 워낙 밖으로 발이 넓고 역마살이 심하게 끼어서 본가에 진득하게 붙어서 부모님을 케어하거나 깊고 끈끈한 소속감을 가지진 못합니다. 꼰대 같은 간섭과 구속을 질색해서 명절에 언제 오냐고 잔소리하면 폰 끄고 혼자 치앙마이로 여행 가버리는 잡힐 듯 잡히지 않는 바람 같은 자식입니다.",
        '癸卯': "집안의 공기 흐름과 식구들의 멘탈 상태를 1초 만에 스캔해서 그에 맞춰 완벽하게 연기하고 행동하는 극강의 눈치와 센스를 장착했습니다. 엄마가 우울증 기미가 보이면 말없이 명품 립스틱을 사다 주고, 아빠가 극대노해 보이면 납작 엎드려서 비위를 맞춰주는 등 거의 전문 감정 노동자 수준의 눈물겨운 헌신을 보여줍니다. 가족 간의 고성방가나 갈등 상황을 극도로 회피해서, 자기가 1도 잘못하지 않았어도 집안 평화를 위해 일단 싹싹 빌고 상황을 무마시키려는 유약하고 짠한 면이 있습니다. 자존감이 다소 낮고 결정 장애가 심해서 이사 방향이나 이직 문제도 부모님이나 언니 오빠에게 끊임없이 묻고 의존하는 피곤한 껌딱지 기질이 셉니다. 둥글둥글 착하지만 가족 가스라이팅에서 벗어나 독립하는 법을 시급히 배워야 할 온실 속 화초입니다.",
        '甲辰': "집안 어른들이 꼰대 마인드로 이래라저래라 훈수를 두거나 가풍을 들이밀며 가르치려 드는 걸 극도로 혐오하는 반항아 기질의 1인자입니다. 집안에서도 무조건 자기가 주도권을 쥐고 목소리를 높여 통제해야 직성이 풀리며, 다른 형제가 나대거나 대장 노릇을 하려 들면 은근히 기강을 잡고 밟으려 듭니다. 자존심은 대기권을 찌르고 타협이란 걸 몰라서, 가족끼리 유산이나 제사 문제로 싸움이 나면 자기가 100퍼센트 잘못했어도 절대 먼저 미안하다는 소리를 안 하고 방에 틀어박혀 굶어 죽을 각오로 버티는 똥고집입니다. 쓸데없는 오지랖이 넓어서 형제들 부부 싸움에 훈수를 두다가 오히려 이혼 직전까지 판을 키우기도 합니다. 제멋대로에 성질머리도 괴팍하지만 역설적이게도 부모가 중병에 누우면 가장 앞장서서 병원비를 대출받아 내는 폼생폼사 행동파 효자 효녀입니다.",
        '乙巳': "집안에서 숨만 쉬어도 식구들을 홀리고 끌어당기는 묘한 뱀 같은 매력과 미친 애교로 어른들의 사랑과 유산을 독차지하는 요물 같은 존재입니다. 썰렁한 집안의 분위기 메이커 역할을 자처하며 깐깐한 부모님의 속마음을 귀신같이 읽어내서 가려운 곳을 긁어주는 싹싹하고 완벽한 처세술을 자랑합니다. 하지만 감정 기복이 조울증 널뛰기 수준이라 아까까지 박장대소하며 화투를 치다가도, 자기 심기나 콤플렉스를 건드리면 갑자기 표정이 썩어 들어가며 집안 분위기를 북극 살얼음판으로 얼려버립니다. 참을성이 생후 1개월 수준이고 욱하는 성질에 필터링 없는 독설을 내뿜어 형제들 가슴에 대못을 박고는, 다음 날 아무 일 없었다는 듯 배스킨라빈스 사 들고 들어오는 도저히 뇌 구조를 종잡을 수 없는 매력적인 도른자입니다.",
        '丙午': "자존심과 자아 비대가 태양계를 뚫고 나가는 집안의 브레이크 고장 난 유아독존 폭군 스타일입니다. 명절 모임에서 스포트라이트는 무조건 내가 다 받아야 직성이 풀리고, 부모님이 다른 형제를 칭찬하며 비교하거나 내 의견을 묵살하면 불같이 화를 내며 끓는 제사 국을 엎어버릴 기세의 파괴왕입니다. 기가 너무 쎄고 전투력이 높아서 웬만한 형제자매들은 기가 쪽쪽 빨려 알아서 눈치를 보고 비위를 맞추며 피해 다닙니다. 가족에게 서운한 일이 생기면 뒤에서 꿍꿍 앓거나 정치질을 하지 않고, 그 자리에서 어른이고 뭐고 쌍욕 섞인 사이다 팩폭을 날려버리는 미친 다혈질입니다. 하지만 다음 날이면 뇌세포가 리셋이 되어 엄마 밥 줘 하고 태연하게 기어 나오는 붕어 기억력의 소유자입니다. 맞추긴 더럽게 힘들지만 뒤끝 하나는 세계 최고로 깔끔한 화끈한 골목대장입니다.",
        '丁未': "겉으로 보기엔 부모님 말씀에 다 순종하고 배려심 넘치는 천사표 효자 효녀 같지만, 속을 까보면 꼬장꼬장한 늙은이 아집과 맹독으로 무장한 외유내강형 꼰대입니다. 부모님의 신세 한탄을 세상 진지하게 다 들어주고 맞춰주는 척 훌륭한 리액션을 보이지만, 정작 자기 진로나 결혼 문제 등 중대사에 있어서는 절대 가족 뜻대로 안 하고 기어이 자기 똥고집대로 밀고 나가는 벽창호입니다. 식구들에게 상처받고 서운한 일이 생기면 그 자리에서 뒤집어엎지 않고 가슴 속 데스노트에 꼼꼼히 날짜별로 적어뒀다가, 나중에 재산 분할이나 제사 문제로 크게 싸울 때 15년 전 서운했던 일화까지 토씨 하나 안 틀리고 끄집어내 상대방의 멘탈을 털어버리는 뒤끝 작렬의 달인입니다. 평소엔 한없이 헌신적이지만 핀트가 나가면 지옥의 독설을 쏟아내는 지킬 앤 하이드입니다.",
        '戊申': "부모님이 말 한마디를 시키면 입에서 대답이 돌아오기까지 세월아 네월아 속이 터져나가는 무뚝뚝함과 단답형의 결정체입니다. 엄마가 옆에서 갱년기로 오열하고 감정 호소를 해도 바위처럼 눈 하나 깜짝 안 하는 무반응이어서 상대를 미쳐버리게 만듭니다. 따뜻한 위로나 오글거리는 가족애 따위는 개나 줘버렸고 오로지 효율성, 돈, 현실적 이득만 따지는 지독한 알파고 계산기입니다. 어버이날 카네이션이나 롤링페이퍼를 주면 돈 아깝게 쓰레기를 왜 사냐며 차라리 그 돈을 통장에 입금해 달라고 정색할 정도로 감성 지수가 처참합니다. 겉치레 문안 인사나 안부 전화는 극혐하여 1년에 두어 번 연락할까 말까 하지만, 부모님이 중병에 걸렸을 때 말없이 수술비 수천만 원을 일시불로 긁어버리는 식의 상남자 상여자 식 팩트 폭행 효도의 표본입니다.",
        '己酉': "명절 가족 모임 구석에 조용히 앉아 배나 깎고 있는 것 같지만, 눈알은 쉴 새 없이 돌아가며 부모님의 통장 잔고 기류와 형제들의 찌질한 약점을 데이터베이스화하고 있는 소름 돋는 관찰자입니다. 눈치가 미치도록 빠르고 손익 계산이 칼날 같아서, 집안에서 나한테 돈이 되는 일과 뒤집어쓸 독박 짐(부모님 모시기, 빚 갚기)을 기가 막히게 분리수거하여 요리조리 피합니다. 장남 장녀라 할지라도 억울하게 부양 부담을 지고 호구 잡히는 걸 죽기보다 싫어해서, 증여세나 상속 문제는 1원 단위까지 형제들과 칼같이 공평하게 나눠야 직성이 풀립니다. 형제끼리 싸움이 나면 흥분해서 소리치지 않고, 아주 차분한 목소리로 상대방의 가장 아픈 콤플렉스와 치부만 정밀 타격하여 오열하게 만들어버리는 잔인한 언변술의 달인입니다.",
        '庚戌': "세상을 극단적인 흑백 논리로만 바라보며 내 가풍과 융통성 없는 원칙을 따르지 않는 가족은 무식하고 덜떨어졌다고 속으로 맹렬히 무시하는 살벌한 꼰대입니다. 가족이면 무조건 피를 나누고 헌신해야지 라는 맹목적인 장남 장녀 콤플렉스와 폼생폼사에 죽고 사는 진짜베기 의리파 쌈닭이기도 합니다. 한 번 내 바운더리에 들어온 내 새끼, 내 동생은 사채 빚을 내서라도 끝까지 책임지고 보호하는 수호신 든든함이 있습니다. 하지만 그만큼 형제나 부모가 내 기대를 처참히 꺾고 부끄러운 범죄나 사기를 치면, 그 자리에서 경찰에 신고해 버리고 호적을 파버릴 무자비한 결단력이 있습니다. 타협이나 유도리라곤 1도 없고 잔소리가 숨 막힐 정도로 꽉 막혀 대화가 안 통하지만, 융통성 하나 빼면 쓰러져가는 집안을 다시 일으켜 세울 가장 듬직한 기둥입니다.",
        '辛亥': "우아하고 세련된 인스타 감성의 라이프스타일에 미쳐서 조금이라도 지저분한 본가 화장실 환경이나 촌스러운 부모님의 억척스러운 행동을 1초도 견디지 못하는 극강의 결벽주의자입니다. 거지근성으로 똘똘 뭉쳐 돈 꿔달라고 징징대는 형제나, 매너 없이 밥그릇 긁는 소리를 내는 식구를 보면 벌레 보듯 극도로 혐오하며 명절 참석을 일방적으로 보이콧해버립니다. 가족 사이에서도 프라이버시를 지키고 호텔급의 품격 있는 대우를 원하며, 자기가 비싼 한우 세트를 보낸 만큼 부모님도 센스 있게 용돈으로 보답해 주길 바라는 철저하게 계산적인 면이 다분합니다. 말솜씨가 화려하고 밖에서는 돈 많은 부잣집 자식 행세를 완벽히 해내는 소름 돋는 연기파입니다. 잣대가 너무 까다롭고 높아서 정작 핏줄들과 진짜 마음을 터놓고 지내진 못하는 고독하고 피곤한 완벽주의자입니다.",
        '壬子': "얼굴엔 사람 좋은 둥글둥글한 효자의 미소를 띠고 있지만, 속에는 시커먼 흑막과 아무도 모르는 엄청난 비밀을 가득 품고 있는 깊이를 알 수 없는 심해 같은 성격입니다. 부모님 앞에서는 다 양보하는 척하고 형제들과도 갈등 없이 둥글게 지내지만, 결국 유산 분배 문제나 집안의 중대사는 교묘한 가스라이팅으로 자기가 원하는 대로 쥐고 흔들어야 직성이 풀립니다. 겉으론 한없이 여유롭고 부처님처럼 화를 안 내는 척하지만 속으로는 자존심이 미친 듯이 오만하게 강하고, 형제에게 한 번 앙심을 품으면 죽을 때까지 복수의 칼날을 갈고 잊지 않습니다. 선 넘는 간섭이나 사생활 침해를 극도로 혐오해서 부모님이 연봉이나 결혼을 캐물으면 눈빛이 살인마처럼 서늘하게 돌변합니다. 평생을 허허실실 참다가 한 번 꼭지가 돌면 쌍욕을 섞어가며 제사상을 엎고 집안을 쑥대밭으로 만드는 흉폭성이 숨어있습니다.",
        '癸丑': "부모 형제에게 내 거 다 양보하고 헌신하며 궂은일 다 하는 짠내 폭발 호구 찐따 같아 보이지만, 사실은 이 집안의 모든 권력 구조와 동정 여론을 뒤에서 완벽하게 조종하고 있는 지독하고 무서운 전략가입니다. 일방적으로 차별받고 독박 간병 등 희생당하는 불쌍한 가족 포지션 속에서도 꿋꿋하게 버티는 기괴할 정도의 징그러운 인내심을 보여줍니다. 하지만 절대 뇌가 순수하고 멍청해서 참는 게 아니라, 부모님의 죄책감을 극도로 자극하여 결국 숨겨둔 알짜배기 땅이나 가장 큰 심리적 유산을 다 빼먹을 때까지 찰거머리처럼 붙어있는 소름 돋는 집념입니다. 속을 알 수 없는 음침함이 깔려있어 끊임없이 부모님의 사랑을 다른 형제와 비교하며 피해 의식을 느끼고 시험하려 듭니다. 한 번 엮이면 평생 부양과 눈물 콧물 짜는 헌신의 가스라이팅에서 빠져나올 수 없는 피곤한 애증의 늪입니다.",
        '甲寅': "누가 시키는 건 죽어도 반대로 안 하고 자기가 이 집안의 머리가 되고 대장이 되어야만 밥이 넘어가는 자존심과 고집의 끝판왕입니다. 부모님이 조언이랍시고 진로에 잔소리를 하거나 선을 넘으려 하면 불같이 화를 내며 그날로 짐 싸서 가출을 선언하거나 핏줄 관계를 그 자리에서 박살 내버리는 핵불닭 멘탈입니다. 타협이라고는 사전에서 찢어버린 직진형이라 명절 가족 여행을 갈 때도 내 동선이 무조건 100퍼센트 맞아 라며 불도저처럼 밀어붙여 온 식구들의 피로도를 극에 달하게 만듭니다. 형제와 재산이나 의견 문제로 쌍욕 하며 싸움이 나면 하늘이 두 쪽 나도 절대 먼저 고개 숙여 사과하는 법이 없고 10년이고 20년이고 말 안 하고 버티며 자존심을 세웁니다. 고집불통에 천하의 불효자 소리도 듣지만, 사기꾼이나 외부의 위협이 생기면 내 식구만큼은 짐승처럼 물어뜯어 지켜내는 상남자 의리파입니다.",
        '乙卯': "형제자매 사이에서도 은근히 지기 싫어하는 피 말리는 승부욕과 애정 결핍, 관심 종자의 화신입니다. 부모님이 나보다 동생이나 오빠를 더 챙기는 꼴을 보면 속에서 천불이 나고 극악의 찌질한 질투심에 휩싸여 명절 밥상머리에서 궁상맞게 투정을 부리거나 분위기를 다 망쳐놓기 일쑤입니다. 사소한 일상 말싸움에서도 기어이 꼬투리를 잡고 논리로 상대를 짓밟아 무조건 자기가 이겼다는 항복을 받아내야 직성이 풀리는 피곤한 쌈닭입니다. 내 방, 내 물건, 내 부모님에 대한 소유욕이 병적으로 소름 돋게 강해서 식구들의 폰 비번이나 일거수일투족을 다 꿰뚫고 있어야 마음이 편해지는 숨 막히는 집구석 CCTV 역할을 자처합니다. 집착과 의심을 눈물겨운 가족애라 착각하는 정신 나간 성향 탓에 주변 식구들의 멘탈을 서서히 말라 죽게 갉아먹기 딱 좋은 피곤한 찰거머리 스타일입니다.",
        '丙辰': "입만 열면 청산유수 사기꾼 뺨치는 화려한 언변으로 온갖 친척들의 혼을 쏙 빼놓고 홀려버리는 마성의 구강 액션 종결자입니다. 씀씀이가 부자집 회장님 급으로 크고 오지랖이 태평양 같아서 밖에서 남들 밥도 잘 사주고 베풀기 좋아해 밖의 남들 눈엔 훌륭한 사람, 성공한 자식처럼 보입니다. 하지만 집안에서 형제와 빚 문제나 부양으로 다툼이 생기면 특유의 기가 막힌 혓바닥 드리블로 내 잘못조차 상대방이 오해한 탓으로 둔갑시켜 버리는 소름 돋는 가스라이팅 능력을 시전합니다. 부모님 통장을 거덜 내고 속을 뒤집어 놓고도 뻔뻔하게 말로 구워삶아 결국 웃으면서 용서하게 만드는 얄밉고도 무서운 재주가 있습니다. 밖에서 얕고 넓은 남들 챙기느라 정작 집에 생활비는 땡전 한 푼 안 주거나 찐 가족 행사에 소홀하여 원성을 사는 전형적인 밖에서만 젠틀한 쇼윈도 인싸입니다.",
        '丁巳': "가족 안에서도 텐션의 고저차가 에베레스트 정상과 태평양 심해를 미친 듯이 오가는 초특급 조울증 감정 기복의 소유자입니다. 기분이 째질 때는 세상에 다시없을 효자 효녀가 되어 온갖 호들갑을 떨며 명품 선물과 용돈 봉투를 뿌려대지만, 부모님이 심기를 조금이라도 건드리면 그 즉시 눈을 까뒤집고 폭언을 쏟아붓고 문을 부서져라 쾅 닫고 들어가는 분노조절장애급 흑화 텐션을 보여줍니다. 형제에게 미친 듯이 집착하고 내 간까지 빼줄 듯 다 퍼주다가도, 명절 카톡 답장이 늦거나 약간 서운하게 하면 돌연 의심의 눈초리를 번뜩이며 5년 전 서운함까지 다 캐묻고 사람 피를 말리는 미저리 짓을 합니다. 성격이 브레이크 터진 불도저 같아서 싸우면 앞뒤 안 가리고 TV고 뭐고 다 부수지만, 그만큼 집에 불이 나거나 위기엔 목숨 걸고 불길에 뛰어들어 가족을 구하는 맵고 뜨거운 또라이입니다.",
        '戊午': "집안에서 무조건 내가 세상의 중심이어야 하고 통제권을 독재자처럼 쥐어야만 밥맛이 도는 무자비한 꼰대 대마왕 스타일입니다. 가족 외식 메뉴, 명절 도착 시간, 심지어 동생의 대학 진로까지 전부 자기 입맛대로 통제하고 검열해야 마음이 편하며 식구들이 반기라도 들면 그 자리에서 쌍욕 하며 밥상을 엎어버립니다. 부모님마저도 내가 돈 번다는 유세로 내가 부양하고 가르쳐야 할 아랫사람 정도로 생각하는 오만한 경향이 있어, 선을 쎄게 넘는 과도한 간섭과 꼰대력을 발산해 식구들 숨통을 턱턱 조입니다. 애정 표현 방식조차 너무 군대식으로 강압적이고 거칠어서 돈을 수백 쓰고도 욕을 처먹는 미련한 불상사가 잦습니다. 남의 말을 귓등으로도 안 듣고 자기가 신인 줄 아는 이 똥고집을 꺾지 않으면 늙어서 자식들에게 버림받고 독거노인이 될 확률이 99퍼센트인 꽉 막힌 대장부입니다.",
        '己未': "겉으로는 묵언 수행하는 바위 스님처럼 얌전해 보이지만 속에는 독 품은 킹코브라 한 마리가 살고 있는 징그럽고 질긴 집념의 고집불통 가족입니다. 부모님에게 따뜻한 애정 표현이나 살가운 짓은 더럽게 안 하면서 본가 냉장고 파먹으며 찰싹 붙어 기생하는 생존력 강한 거머리 캥거루족 기질이 있습니다. 가족이 아무리 나를 호구 취급하고 막말을 퍼부으며 선을 넘어 빡치게 해도 바로 집을 나가지 못하고 방문 닫고 혼자 꾹꾹 눈물 삼키며 미련하게 버티는 고구마 10,000개 멘탈을 가졌습니다. 가장 큰 문제는 그 서운함을 그냥 잊는 게 아니라 뇌 속 블랙박스에 풀HD로 전부 녹화해 뒀다가 먼 훗날 유산 문제나 큰 다툼이 터질 때 25년 전 죄상까지 날짜와 시간까지 하나하나 읊으며 사람 피를 말려 죽인다는 겁니다. 노잼의 끝판왕이지만 한 번 맡은 빚 갚기나 부양 의무는 끝까지 책임지는 듬직한 소입니다.",
