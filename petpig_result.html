        if (!char || char === 'unknown') return "?";
        const el = elementMap[char];
        return `<span class="${colorClasses[el]}">${char}</span>`;
    }

    // 신규 로직: 사람이었다면 어떤 관계였을까?

        '甲子': "당신은 반려동물을 단순히 키우는 존재가 아니라, 하나의 인생 프로젝트처럼 책임지고 돌보는 진지한 보호자입니다. 아이가 더 건강하게, 더 오래 행복하게 살 수 있는 방법을 늘 고민하며 관련 정보와 지식을 꾸준히 공부하는 노력형입니다. 작은 변화에도 예민하게 반응하며 혹시 놓치는 부분이 있을까 스스로를 계속 점검하는 꼼꼼함을 가지고 있습니다. 사랑 표현은 다소 서툴 수 있지만 행동으로 보여주는 스타일이라 아이의 생활 환경, 식단, 건강 관리에서 확실한 차이를 만들어냅니다. 때로는 완벽하게 해주고 싶은 마음 때문에 스스로 부담을 느끼기도 하지만, 결국 아이는 당신의 안정적인 보호 속에서 누구보다 편안함을 느끼며 성장하게 됩니다. 시간이 지날수록 더 깊은 유대감이 쌓이는 장기형 보호자입니다.",
        '甲戌': "당신은 반려동물을 가족 중에서도 가장 소중한 존재로 생각하는 책임감 강한 보호자입니다. 한번 마음을 주면 끝까지 지키는 의리와 헌신이 강해 어떤 상황에서도 아이를 포기하거나 방치하지 않습니다. 겉으로는 현실적이고 단단한 성격처럼 보이지만, 아이 앞에서는 누구보다 다정하고 부드러운 모습을 보여줍니다. 필요하다면 시간과 비용을 아끼지 않고 투자하는 스타일이며, 아이의 삶의 질을 높여주기 위해 꾸준히 환경을 개선하려 노력합니다. 다만 보호 본능이 강해 때로는 과잉 걱정을 하거나 통제하려는 모습이 나타날 수 있습니다. 그러나 그 모든 행동의 근본에는 ‘끝까지 책임진다’는 강한 신념이 자리하고 있어 아이에게는 가장 든든한 버팀목이 되는 존재입니다.",
        '甲申': "당신은 반려동물과의 관계에서도 방향성과 기준을 중요하게 생각하는 리더형 보호자입니다. 아이가 건강하고 균형 잡힌 생활을 할 수 있도록 규칙과 생활 리듬을 만들어주는 데 능숙합니다. 단순히 예뻐하는 것에 그치지 않고 사회성, 활동성, 환경 적응력까지 고려하는 현실적인 애정을 가지고 있습니다. 아이가 다양한 경험을 통해 성장하는 모습을 보는 것에 큰 보람을 느끼며, 보호자로서의 역할을 하나의 책임이자 자부심으로 받아들입니다. 때로는 엄격해 보일 수 있지만 그 안에는 아이를 더 강하고 행복하게 키우고 싶은 깊은 의도가 담겨 있습니다. 시간이 지날수록 아이와 신뢰가 단단히 쌓이며 서로를 존중하는 건강한 관계를 만들어갑니다.",
        '甲午': "당신은 반려동물과 함께하는 시간을 삶의 가장 큰 행복으로 여기는 에너지 넘치는 보호자입니다. 집에만 있기보다 새로운 장소, 새로운 활동을 함께 경험하며 추억을 쌓는 것을 좋아합니다. 아이의 반응과 감정을 즉각적으로 느끼고 공감하는 감각이 뛰어나며, 즐거운 분위기를 만드는 능력이 있습니다. 사랑 표현이 풍부하고 적극적이라 아이도 자연스럽게 밝고 활발한 성향을 보이기 쉽습니다. 다만 감정의 흐름에 따라 계획이 바뀌거나 생활 패턴이 일정하지 않을 수 있어 꾸준한 관리가 필요합니다. 그럼에도 당신과 함께하는 일상은 늘 생동감이 넘치며 아이에게는 세상이 재미있는 곳이라는 인식을 심어주는 긍정 에너지의 보호자입니다.",
        '甲辰': "당신은 반려동물에게 아낌없이 주는 스타일의 보호자로, 사랑의 표현이 크고 확실한 편입니다. 아이를 위해서라면 좋은 것, 편한 것, 안전한 것을 먼저 생각하며 환경과 생활 수준을 끌어올리는 데 적극적입니다. 자존감이 높고 책임 의식이 강해 보호자로서 인정받는 것을 중요하게 여기며, 아이를 잘 키운다는 자부심도 큽니다. 때로는 과하게 챙기거나 기대를 하기도 하지만, 그만큼 애정의 깊이가 크기 때문에 쉽게 식지 않는 특징이 있습니다. 아이의 작은 변화에도 감동하고 함께 성장해가는 과정을 소중히 여깁니다. 시간이 갈수록 보호자와 반려동물 사이에 안정적인 신뢰와 유대가 만들어지는 장점이 있습니다.",
        '甲寅': "당신은 반려동물과 정서적으로 매우 깊이 연결되는 보호자입니다. 눈빛과 행동만으로도 아이의 상태를 알아차리는 직관력이 뛰어나며, 보호 본능이 강해 위험 상황에서는 누구보다 빠르게 대응합니다. 평소에는 강단 있고 주도적인 성격이지만 아이 앞에서는 한없이 부드러워지는 이중적인 매력을 가지고 있습니다. 사랑을 표현할 때는 행동과 헌신으로 보여주는 스타일이며, 아이가 편안함과 안정감을 느끼도록 환경을 만드는 데 능숙합니다. 때로는 독점욕이나 과잉 보호가 나타날 수 있지만 그만큼 애착이 깊다는 의미이기도 합니다. 시간이 흐를수록 서로가 서로에게 없어서는 안 될 존재가 되는 끈끈한 관계를 만들어가는 보호자입니다.",
        '乙丑': "당신은 반려동물을 화려하게 키우기보다는 안정적으로 오래 함께하는 삶을 가장 중요하게 생각하는 보호자입니다. 눈에 띄는 애정 표현보다 생활 속에서 묵묵히 돌봄을 실천하는 타입으로, 아이의 식사 시간, 잠자리, 생활 환경을 꾸준히 관리하는 책임감이 강합니다. 감정 기복이 크지 않아 아이에게 안정적인 보호막 같은 존재가 되며, 쉽게 흔들리지 않는 신뢰를 만들어갑니다. 아이가 말썽을 피우더라도 크게 화내기보다 차분하게 수습하며, 시간이 지나면 자연스럽게 성장할 것이라 믿는 여유를 가지고 있습니다. 겉으로는 무덤덤해 보여도 속으로는 누구보다 깊은 애정을 품고 있어, 오래 함께할수록 더 단단한 유대가 형성됩니다. 아이 입장에서는 편안함과 안정감을 동시에 느낄 수 있는 든든한 삶의 기반 같은 보호자입니다.",
        '乙亥': "당신은 반려동물과 정서적으로 깊이 연결되는 감성 중심 보호자입니다. 아이의 기분 변화나 작은 행동에도 민감하게 반응하며, 말하지 않아도 마음을 읽어내는 공감 능력이 뛰어납니다. 혼자 있는 시간보다 아이와 함께 체온을 나누며 시간을 보내는 것을 더 좋아하고, 정신적으로도 큰 위로를 받는 관계를 만들어갑니다. 현실적인 관리보다 감정적 교감을 우선하는 경향이 있어 때로는 지나치게 애착이 깊어질 수 있지만, 그만큼 아이에게 따뜻한 사랑을 꾸준히 전달합니다. 아이의 존재 자체에서 삶의 의미를 찾는 순수한 보호자이며, 함께하는 순간 하나하나를 소중하게 기억하려 노력합니다. 아이는 당신 곁에서 정서적으로 매우 안정된 상태를 유지하며 애착이 강하게 형성되는 특징이 있습니다.",
        '乙酉': "당신은 반려동물의 생활 환경과 외적인 관리에 세심한 관심을 기울이는 정돈형 보호자입니다. 청결, 미용, 위생 상태를 꼼꼼히 체크하며 아이가 항상 쾌적하고 건강하게 지낼 수 있도록 꾸준히 노력합니다. 주변에서 보기에도 관리가 잘 된 반려동물을 키우는 보호자로 인정받는 것을 중요하게 생각하며, 작은 부분까지 신경 쓰는 섬세함이 있습니다. 아이의 컨디션이 조금이라도 달라지면 빠르게 알아차리고 대응하는 관찰력이 뛰어나며, 생활 루틴을 안정적으로 유지하는 능력도 좋습니다. 다만 완벽하게 돌보고 싶은 마음이 강해 스스로 부담을 느끼거나 걱정이 많아질 수 있습니다. 그럼에도 아이는 당신의 체계적인 관리 속에서 건강하고 안정된 생활을 유지하게 됩니다.",
        '乙未': "당신은 반려동물을 가족처럼 보듬으며 따뜻하게 키우는 헌신형 보호자입니다. 아이가 편안하게 생활할 수 있도록 공간과 환경을 세심하게 만들어주며, 감정적으로도 늘 곁에서 지지해주는 역할을 합니다. 아이가 먹고 자고 노는 모든 일상에 애정을 쏟는 스타일이라 자연스럽게 보호자와 반려동물 사이의 애착이 깊어집니다. 현실적인 기준보다 정서적인 만족을 더 중요하게 여기며, 아이가 행복해 보이면 스스로도 큰 보람을 느낍니다. 때로는 지나치게 맞춰주거나 단호함이 부족할 수 있지만, 그만큼 부드럽고 따뜻한 분위기를 만드는 능력이 있습니다. 아이는 당신과 함께하는 생활 속에서 안정감과 편안함을 느끼며 천천히 자신의 속도로 성장하게 됩니다.",
        '乙巳': "당신은 반려동물을 향한 애정 표현이 풍부하고 감정적으로 깊이 몰입하는 보호자입니다. 아이의 반응 하나에도 크게 기뻐하거나 걱정하는 등 감정의 교류가 매우 활발한 편입니다. 사랑을 표현할 때는 행동과 시간 투자로 보여주는 타입이며, 아이와 함께하는 시간을 삶의 중요한 가치로 여깁니다. 때로는 과잉 보호나 걱정이 많아질 수 있지만 그만큼 책임감도 강해 위기 상황에서는 빠르게 대응하는 힘이 있습니다. 아이의 기분과 상태를 세심하게 살피며 늘 더 좋은 환경을 만들어주려 노력하는 열정적인 보호자입니다. 아이는 당신의 따뜻한 관심 속에서 정서적으로 풍부한 교감을 경험하게 됩니다.",
        '乙卯': "당신은 반려동물을 친구이자 동반자로 대하는 자유로운 관계형 보호자입니다. 통제하거나 억압하기보다 아이의 성향을 존중하며 자연스럽게 함께 살아가는 방식을 선택합니다. 밝고 긍정적인 분위기를 잘 만들어 아이와의 일상이 즐겁고 유쾌하게 흘러가는 경우가 많습니다. 감정 표현이 부드럽고 유연해 아이가 스트레스를 덜 느끼며 편안하게 행동할 수 있는 환경을 만들어줍니다. 규칙보다는 관계의 흐름과 교감을 더 중요하게 여기기 때문에 서로 간의 신뢰가 깊게 형성되는 특징이 있습니다. 아이에게는 부담 없이 의지할 수 있는 보호자이자 언제나 함께 놀아주는 좋은 친구 같은 존재입니다.",
        '丙寅': "당신은 반려동물에게 삶의 활력과 용기를 불어넣는 태양 같은 보호자입니다. 아이가 세상을 두려워하지 않고 당당하게 살아가길 바라는 마음이 강해 다양한 경험과 활동을 함께 하려는 추진력이 뛰어납니다. 사랑 표현이 풍부하고 직설적이며, 기쁨과 애정을 숨기지 않고 적극적으로 보여주는 스타일입니다. 아이가 당신 곁에 있을 때 가장 밝고 자신감 있는 모습을 보이기 쉬우며, 보호자와의 교감을 통해 에너지를 얻는 경우가 많습니다. 때로는 열정이 지나쳐 기대치가 높아지거나 성급해질 수 있지만 그만큼 책임감도 강해 아이의 성장과 행복을 진심으로 고민합니다. 함께할수록 서로에게 힘이 되는 역동적인 관계를 만들어가는 보호자입니다.",
        '丙子': "당신은 반려동물 앞에서만큼은 누구보다 솔직하고 자유로운 모습을 드러내는 감성형 보호자입니다. 사회적인 모습과는 다르게 아이와 있을 때는 긴장이 풀리고 자연스럽게 애정 표현이 많아지는 특징이 있습니다. 아이의 작은 행동에도 크게 반응하며 일상의 즐거움을 발견하는 능력이 뛰어나고, 함께 보내는 시간을 삶의 중요한 휴식으로 여깁니다. 감정 교류가 활발해 아이와의 유대감이 빠르게 깊어지며, 보호자 본인도 정서적으로 안정감을 얻는 경우가 많습니다. 다만 감정의 흐름에 따라 돌봄의 방식이 달라질 수 있어 생활 루틴을 일정하게 유지하는 노력이 필요합니다. 아이에게는 부담 없이 마음을 드러낼 수 있는 따뜻한 쉼터 같은 보호자입니다.",
        '丙戌': "당신은 반려동물을 끝까지 책임지고 지키겠다는 의지가 매우 강한 신념형 보호자입니다. 한번 마음을 주면 어떤 상황에서도 쉽게 포기하지 않으며, 아이의 삶 전반을 안정적으로 관리하려는 현실적인 책임감을 가지고 있습니다. 위기 상황에서는 누구보다 빠르게 결단하고 행동하는 추진력이 있으며, 보호자로서의 역할을 스스로 중요하게 인식합니다. 사랑 표현은 뜨겁고 확실하지만 동시에 원칙과 기준을 세우는 데도 능숙해 아이가 안정된 환경에서 생활하도록 돕습니다. 때로는 강한 보호 본능 때문에 과잉 통제나 걱정이 나타날 수 있지만 그만큼 헌신의 깊이가 큽니다. 아이에게는 든든한 울타리이자 언제든 기대어 쉴 수 있는 믿음직한 존재입니다.",
        '丙申': "당신은 반려동물과 함께하는 시간을 놀이와 즐거움으로 채워가는 유쾌한 보호자입니다. 아이와의 관계를 하나의 활기찬 파트너십처럼 여기며 다양한 활동을 시도하는 것을 좋아합니다. 호기심이 많고 새로운 환경에 대한 적응력이 좋아 아이에게도 긍정적인 자극을 줄 수 있는 특징이 있습니다. 아이가 지루해하지 않도록 생활에 변화를 주려는 노력과 센스가 있으며, 함께 웃고 움직이는 순간에서 큰 만족을 느낍니다. 다만 관심이 분산되거나 꾸준함이 부족해질 수 있어 기본적인 생활 관리의 균형을 유지하는 것이 중요합니다. 아이에게는 활력과 재미를 선물하는 에너지 넘치는 보호자입니다.",
        '丙午': "당신은 반려동물에게 집중적인 사랑과 에너지를 쏟는 열정형 보호자입니다. 애정 표현이 강하고 감정이 뜨겁게 움직이는 편이라 아이와의 관계에서도 몰입도가 높은 특징을 보입니다. 아이가 행복해하는 모습을 보는 것 자체가 삶의 중요한 동기가 되며, 함께하는 시간에 큰 의미를 부여합니다. 주도적으로 환경을 만들고 활동을 계획하는 능력이 있어 아이의 생활이 활기차게 유지되는 경우가 많습니다. 다만 감정의 강도가 높아 피로를 느끼거나 기대가 커질 수 있으므로 균형 잡힌 돌봄이 필요합니다. 아이는 당신의 강한 에너지 속에서 자신감과 애착을 동시에 형성하게 됩니다.",
        '丙辰': "당신은 반려동물의 삶 전체를 넓은 시야로 바라보며 안정적으로 이끌어주는 든든한 보호자입니다. 현실적인 계획과 장기적인 책임감을 바탕으로 아이의 건강, 환경, 생활 수준을 꾸준히 개선하려는 성향이 있습니다. 감정 표현은 화려하지 않아도 행동으로 보여주는 스타일이며, 아이가 편안하고 안전하게 살아갈 수 있도록 기반을 만들어줍니다. 보호자로서의 역할에 자부심이 강하고 아이를 위해 투자하는 시간과 노력을 가치 있게 여깁니다. 때로는 기대치가 높아지거나 완벽을 추구하는 모습이 나타날 수 있지만 그만큼 헌신의 깊이가 큽니다. 아이에게는 삶의 중심을 단단히 잡아주는 신뢰감 있는 보호자입니다.",
        '丁卯': "당신은 반려동물의 감정과 기분 변화를 아주 민감하게 읽어내는 정서 교감형 보호자입니다. 아이가 평소와 다르게 숨을 쉬거나 눈빛이 살짝 달라지는 것만 봐도 바로 상태를 알아차릴 만큼 관찰력과 공감 능력이 뛰어납니다. 단순히 돌보는 차원을 넘어 아이의 마음을 이해하고 맞춰주는 데 강점이 있으며, 아이 역시 당신 곁에서 심리적으로 큰 안정감을 느끼는 경우가 많습니다. 강하게 통제하거나 억누르기보다는 부드럽게 달래고 자연스럽게 유도하는 방식을 택하기 때문에, 아이와의 관계가 억압적이지 않고 매우 유연하게 흘러갑니다. 감정이입이 깊은 편이라 아이가 아프거나 힘들어하면 보호자 본인도 크게 흔들릴 수 있지만, 그만큼 끝까지 세심하게 곁을 지키는 힘이 있습니다. 아이 입장에서는 가장 편하게 기대고 마음을 풀 수 있는, 정서적으로 매우 안전한 보호자입니다.",
        '丁丑': "당신은 화려하게 티 내기보다는 묵묵히 끝까지 책임지는 헌신형 보호자입니다. 아이를 위해 해야 할 일이 있다면 누가 보지 않아도 꾸준히 해내는 성실함이 있으며, 생활 관리와 건강 돌봄 같은 기본적인 부분에서 특히 강한 힘을 보입니다. 겉으로 표현은 담백할 수 있지만 실제 애정의 깊이는 매우 크고, 한번 마음을 준 존재에게는 쉽게 변하지 않는 지속적인 사랑을 보여줍니다. 아이가 어릴 때도, 나이가 들어갈 때도, 상황이 좋을 때도 힘들 때도 한결같은 태도로 곁을 지키는 신뢰감이 큰 장점입니다. 때로는 감정을 겉으로 많이 드러내지 않아 무심해 보일 수 있지만 실제로는 아이의 상태와 필요를 누구보다 진지하게 받아들이고 있습니다. 아이에게는 늘 같은 자리에서 안정감을 주는, 오래 볼수록 더 귀한 보호자입니다.",
        '丁亥': "당신은 반려동물을 조건 없이 감싸 안는 깊은 애정형 보호자입니다. 아이를 하나의 존재로 소중히 여기는 마음이 매우 크고, 단순한 귀여움 이상의 정서적 의미를 부여하는 경향이 강합니다. 아이가 편안해하는지, 외롭지는 않은지, 작은 불안이라도 느끼고 있지는 않은지 계속 마음을 쓰며, 정서적인 안정까지 함께 책임지려 합니다. 공감 능력이 풍부하고 마음이 여려서 아이가 힘들어하면 본인도 같이 아파하고, 아이가 행복해하면 그 모습을 오래 바라보며 큰 위로를 얻습니다. 사랑을 줄 때 계산하지 않고, 내가 더 주는 것이 당연하다고 여기는 편이라 헌신의 밀도가 상당히 높은 보호자입니다. 아이는 당신과 함께 있을 때 가장 따뜻하고 포근한 보호를 받고 있다고 느끼며, 깊은 애착 관계를 형성하기 쉽습니다.",
        '丁酉': "당신은 반려동물을 세심하고 정갈하게 돌보는 관리형 보호자입니다. 아이가 지내는 공간, 먹는 것, 사용하는 물건 하나까지 깔끔하고 안정적으로 유지하려는 성향이 강하며, 불편함이 생기지 않도록 미리 챙기는 능력이 뛰어납니다. 감각이 섬세하고 기준이 분명해 청결, 위생, 생활 환경의 질을 높이는 데 강점을 보이며, 작은 변화도 쉽게 지나치지 않습니다. 아이를 귀하게 키운다는 자부심이 있고, 보호자로서 제대로 돌보고 있다는 확신이 있어야 마음이 놓이는 편입니다. 그래서 때로는 기준이 높아 스스로 피곤해질 수 있지만, 그만큼 아이는 안정적이고 잘 정돈된 환경 안에서 생활하게 됩니다. 아이에게는 늘 상태가 잘 관리되고 편안함이 유지되는, 믿음직하고 세련된 보호자입니다.",
        '丁未': "당신은 반려동물을 향한 애착이 매우 깊고 정이 많은 보호자입니다. 아이의 행동 하나하나를 그냥 지나치지 못하고, 작은 표정과 몸짓에도 큰 의미를 부여할 만큼 마음이 많이 가는 편입니다. 아이를 특별한 존재로 여기며, 남들이 보기에는 사소한 일상도 당신에게는 소중한 추억이 됩니다. 함께 있는 시간 자체에서 정서적인 충만함을 크게 느끼고, 품에 안거나 체온을 나누는 순간에 가장 큰 안정과 행복을 얻는 특징이 있습니다. 다만 애착이 깊은 만큼 떨어져 있는 시간을 힘들어하거나 걱정이 많아질 수 있지만, 그만큼 아이를 향한 보호 본능과 헌신도 강합니다. 아이는 당신의 따뜻한 관심과 애정 속에서 사랑받는 감각을 뚜렷하게 느끼며 자라게 됩니다.",
        '丁巳': "당신은 반려동물의 상태와 필요를 빠르게 읽어내고 즉각적으로 반응하는 예민하고 똑똑한 보호자입니다. 아이가 무엇을 원하는지, 지금 편안한지 불편한지, 어떤 점을 먼저 챙겨야 하는지를 재빨리 파악하는 감각이 뛰어나며, 돌봄의 밀도가 매우 높은 편입니다. 사랑 표현은 부드럽지만 내면에는 강한 책임감과 보호 본능이 자리하고 있어 아이를 향한 집중력이 상당히 높습니다. 겉으로는 차분하고 냉정해 보여도 아이 앞에서는 표정과 태도가 훨씬 부드러워지고, 누구보다 세심하게 맞춤형으로 돌보려는 모습을 보입니다. 때로는 신경을 많이 쓰는 탓에 긴장하거나 예민해질 수 있지만, 그만큼 아이의 변화에 빠르게 대응하는 장점도 큽니다. 아이에게는 가장 빠르게 나를 이해하고 챙겨주는, 든든하고 정교한 보호자입니다.",
        '戊辰': "당신은 반려동물에게 흔들리지 않는 안정감을 제공하는 기반형 보호자입니다. 감정의 기복보다는 꾸준한 생활 관리와 환경 조성을 통해 아이가 편안하게 지낼 수 있도록 돕는 현실적인 돌봄 방식을 가지고 있습니다. 아이의 성향을 존중하며 과도한 간섭보다는 스스로 적응하고 성장할 수 있는 여유를 주는 편입니다. 책임감이 강해 한번 맡은 존재는 끝까지 돌봐야 한다는 신념이 분명하며, 위기 상황에서도 쉽게 동요하지 않는 단단함이 있습니다. 겉으로는 표현이 크지 않아도 행동으로 보여주는 신뢰가 크기 때문에 아이는 당신 곁에서 안정적인 삶의 리듬을 유지하게 됩니다. 함께하는 시간이 길어질수록 보호자와 반려동물 사이에 깊고 묵직한 유대가 형성되는 특징이 있습니다.",
        '戊寅': "당신은 반려동물을 스스로 지켜야 할 가족으로 인식하는 책임 중심 보호자입니다. 보호 본능이 강하고 상황 판단이 빠른 편이라 위험하거나 불안한 환경에서는 먼저 나서서 해결하려는 주도성이 있습니다. 겉모습은 단단하고 무뚝뚝해 보일 수 있지만 실제로는 아이를 향한 애정이 매우 깊고 진지한 편입니다. 아이가 안전하게 생활할 수 있도록 규칙과 기준을 세우는 능력이 있으며, 보호자로서의 역할을 자부심 있게 받아들입니다. 때로는 강한 의지 때문에 융통성이 부족해 보일 수 있지만 그만큼 흔들리지 않는 믿음을 주는 장점이 있습니다. 아이에게는 언제든 기대어 쉴 수 있는 든든한 방패 같은 존재입니다.",
        '戊子': "당신은 감정을 크게 드러내기보다는 조용히 실천으로 사랑을 보여주는 내면형 보호자입니다. 아이의 생활 환경과 건강 상태를 세심하게 챙기면서도 티 내지 않는 배려를 지속하는 특징이 있습니다. 겉으로는 무심해 보일 수 있지만 실제로는 아이의 변화와 필요를 깊이 관찰하며 장기적인 돌봄 계획을 세우는 현실적인 태도를 가지고 있습니다. 감정적인 애정 표현보다 생활의 안정과 편안함을 우선하기 때문에 아이는 당신과 함께할 때 심리적으로 안정된 상태를 유지하기 쉽습니다. 한 번 쌓인 신뢰는 쉽게 무너지지 않으며 시간이 지날수록 더 깊은 관계로 발전합니다. 아이에게는 말없이 곁을 지켜주는 묵직한 보호자입니다.",
        '戊戌': "당신은 반려동물을 향한 마음이 쉽게 변하지 않는 의리형 보호자입니다. 상황이 좋을 때뿐 아니라 힘들고 지칠 때도 끝까지 책임을 다하려는 태도가 강하며, 보호자로서의 역할을 인생의 중요한 가치로 받아들입니다. 아이가 나이가 들거나 건강이 약해져도 관계의 의미를 더 깊게 생각하며 함께하는 시간을 소중히 여깁니다. 감정 표현은 절제되어 있지만 마음의 깊이는 매우 크고, 행동과 선택에서 그 진심이 드러나는 스타일입니다. 안정적인 환경을 만들고 생활 기반을 지켜주는 힘이 있어 아이는 당신 곁에서 편안함을 느끼며 오래 함께할 수 있습니다. 변함없는 태도와 지속적인 책임감이 가장 큰 장점인 보호자입니다.",
        '戊申': "당신은 반려동물의 삶을 현실적으로 설계하고 관리하는 계획형 보호자입니다. 감정에 휩쓸리기보다는 아이에게 진짜 필요한 것이 무엇인지 판단하고 효율적으로 돌보려는 지혜가 있습니다. 건강 관리, 생활 습관, 환경 개선 등 실질적인 부분에 집중하며 아이가 오래 안정적으로 지낼 수 있는 기반을 만들어줍니다. 정보 탐색 능력과 판단력이 좋아 아이에게 맞는 선택을 신중하게 하는 특징이 있습니다. 다만 지나치게 합리적으로 접근하면 감정 표현이 부족해 보일 수 있으므로 교감의 시간도 중요합니다. 아이는 당신의 체계적인 돌봄 속에서 튼튼하고 균형 잡힌 삶을 살아가기 쉽습니다.",
        '戊午': "당신은 반려동물과 함께 활동하며 관계를 만들어가는 행동형 보호자입니다. 몸으로 부딪치고 경험을 쌓으며 유대감을 형성하는 스타일이라 아이와의 생활이 활기차고 생동감 있게 흘러가는 경우가 많습니다. 겉으로는 무뚝뚝하거나 강해 보일 수 있지만 실제로는 정이 많고 따뜻한 성향이 있어 아이와 함께 있을 때 자연스럽게 웃음이 많아집니다. 보호자로서의 책임감도 강해 힘든 상황에서도 포기하지 않고 끝까지 해결하려는 추진력이 있습니다. 아이는 당신과 함께 뛰고 움직이는 과정에서 자신감과 신뢰를 동시에 쌓게 됩니다. 생활 속에서 자연스럽게 애정을 표현하는 든든한 보호자입니다.",
        '己巳': "당신은 반려동물의 성향과 기분을 빠르게 파악하고 상황에 맞게 유연하게 대응하는 생활 밀착형 보호자입니다. 아이의 눈높이에서 생각하려는 노력이 강해 무리하게 통제하기보다 자연스럽게 유도하는 방식을 선택합니다. 감각이 섬세하고 관찰력이 좋아 아이가 좋아하는 환경과 활동을 잘 찾아내며, 일상 속 작은 즐거움을 함께 만들어가는 데 능숙합니다. 때로는 친구처럼 편하게 놀아주고, 필요할 때는 부모처럼 따뜻하게 보살피는 균형감이 있습니다. 현실적인 돌봄 능력과 정서적인 교감이 동시에 살아 있어 아이가 안정감과 활력을 함께 느끼기 쉽습니다. 함께할수록 생활의 리듬이 잘 맞아 오래 편안하게 이어지는 관계를 만드는 보호자입니다.",
        '己卯': "당신은 부드러운 분위기와 따뜻한 태도로 반려동물의 마음을 편안하게 만들어주는 정서 안정형 보호자입니다. 강하게 몰아붙이기보다는 미소와 배려로 아이를 자연스럽게 이끄는 힘이 있으며, 보호자와 함께 있을 때 아이가 긴장을 풀고 안정된 상태를 유지하는 경우가 많습니다. 감정 표현이 부드럽고 공감 능력이 좋아 아이의 기분 변화를 빠르게 받아들이며, 스트레스가 쌓이지 않도록 생활 환경을 조율합니다. 아이에게 좋은 기억을 많이 만들어주고 싶어 꾸준히 시간을 투자하는 성향이 있으며, 작은 일상 속에서도 의미를 찾는 따뜻함이 있습니다. 다만 지나치게 맞춰주다 보면 기준이 흐려질 수 있어 균형이 중요합니다. 아이에게는 언제나 포근하고 평화로운 쉼터 같은 보호자입니다.",
        '己丑': "당신은 반려동물을 향한 사랑이 깊고 오래 지속되는 인내형 보호자입니다. 반복되는 돌봄과 생활 관리에도 쉽게 지치지 않으며, 묵묵히 책임을 다하는 꾸준함이 큰 강점입니다. 감정 표현은 절제된 편이지만 행동에서 진심이 드러나는 타입으로, 아이의 생활 기반을 안정적으로 유지하는 데 집중합니다. 아이가 말썽을 피우거나 예상치 못한 일이 생겨도 크게 동요하지 않고 차분하게 수습하는 현실적인 힘이 있습니다. 함께 보내는 시간이 쌓일수록 서로에 대한 신뢰가 깊어지며, 보호자와 반려동물 사이에 편안한 생활 리듬이 만들어집니다. 아이에게는 늘 같은 자리에서 기다려주는 든든하고 따뜻한 보호자입니다.",
        '己亥': "당신은 반려동물의 본능과 개성을 존중하며 여유 있게 함께 살아가는 평화형 보호자입니다. 무리한 훈련이나 통제보다는 아이가 편안함을 느끼는 생활 방식에 맞추려는 유연함이 있으며, 관계 속에서 긴장을 만들지 않는 부드러운 태도를 가지고 있습니다. 감정적으로 넉넉하고 관대한 편이라 작은 실수나 변덕에도 크게 화를 내지 않고 이해하려는 마음이 앞섭니다. 아이와 함께 있는 시간을 삶의 휴식으로 여기며 자연스럽게 정서적인 교감을 쌓아가는 특징이 있습니다. 다만 지나치게 느긋해지면 관리가 소홀해질 수 있어 기본적인 생활 균형을 유지하는 것이 중요합니다. 아이에게는 스트레스 없이 편안하게 숨 쉴 수 있는 안정된 보호자입니다.",
        '己酉': "당신은 반려동물의 생활 환경과 외적인 관리에 정성을 쏟는 실용적 보호자입니다. 아이가 사용하는 물건, 먹는 음식, 머무는 공간까지 꼼꼼하게 신경 쓰며 불편함이 없도록 꾸준히 관리합니다. 감각이 섬세하고 기준이 분명해 위생과 생활 질을 높이는 데 능숙하며, 보호자로서 책임을 다하고 있다는 확신이 있어야 마음이 놓이는 편입니다. 겉으로는 체계적으로 키우려는 모습이 강해 보이지만 실제로는 아이가 가장 좋은 상태로 지내길 바라는 깊은 애정이 담겨 있습니다. 생활의 작은 부분까지 신경 쓰는 노력 덕분에 아이는 안정적이고 쾌적한 환경에서 성장하게 됩니다. 아이에게는 믿고 의지할 수 있는 깔끔하고 성실한 보호자입니다.",
        '己未': "당신은 반려동물과의 관계에 깊이 몰입하는 애착형 보호자입니다. 아이를 단순한 동물이 아니라 정서적으로 매우 중요한 존재로 받아들이며, 함께하는 시간을 삶의 중심에 두는 경향이 있습니다. 떨어져 있는 시간을 힘들어할 만큼 애정이 깊고, 아이의 표정과 행동에 크게 감정이 움직이는 편입니다. 보호 본능이 강해 불편함이나 외로움을 느끼지 않도록 끊임없이 신경 쓰며 생활 전반을 아이 중심으로 조율합니다. 때로는 스스로를 희생하는 선택을 하기도 하지만 그만큼 관계의 밀도와 애정의 깊이가 큽니다. 아이에게는 언제나 나를 우선으로 생각해 주는 따뜻하고 헌신적인 보호자입니다.",
        '庚午': "당신은 반려동물을 향한 보호 본능이 매우 강하고 행동력이 뛰어난 수호자형 보호자입니다. 위험하거나 불안한 상황이 오면 누구보다 빠르게 앞에 나서 아이를 지키려는 강한 책임감을 가지고 있습니다. 감정 표현은 직선적이고 솔직한 편이며, 사랑을 말보다는 행동으로 보여주는 스타일입니다. 아이와 함께 활동하고 몸으로 부딪치며 관계를 쌓는 것을 중요하게 여기기 때문에 생활이 역동적으로 흘러가는 경우가 많습니다. 때로는 열정이 지나쳐 과하게 개입하거나 통제하려는 모습이 나타날 수 있지만, 그만큼 헌신의 강도와 진심이 분명합니다. 아이는 당신 곁에서 강한 보호를 받고 있다는 안정감 속에 자신감 있는 성향으로 자라기 쉽습니다.",
        '庚辰': "당신은 반려동물에게 필요한 것을 빠르게 판단하고 즉각적으로 실행하는 추진형 보호자입니다. 고민이나 망설임보다는 현실적인 선택과 결단을 통해 아이의 생활 환경을 개선하려는 힘이 강합니다. 책임감이 크고 한번 정한 방향은 끝까지 밀고 나가는 끈기가 있어 보호자로서 신뢰를 얻기 쉽습니다. 감정 표현은 과장되지 않지만 분명하고 진솔하며, 아이를 향한 애정도 꾸준하게 지속되는 특징이 있습니다. 때로는 기준이 높고 단호해 보일 수 있지만 그만큼 아이가 안정적으로 생활할 수 있는 기반을 만들어줍니다. 아이에게는 삶의 방향을 단단히 잡아주는 든든한 보호자입니다.",
        '庚寅': "당신은 겉으로는 냉정하고 이성적인 이미지가 강하지만 실제로는 반려동물에게 매우 따뜻한 마음을 가진 보호자입니다. 애정 표현이 서툴러 보여도 아이가 필요로 할 때는 언제든 몸을 낮추고 도와주는 헌신적인 태도를 보입니다. 보호 본능과 책임 의식이 강해 아이의 안전과 생활 질을 중요하게 여깁니다. 스스로 보호자의 역할을 진지하게 받아들입니다. 아이와의 관계에서도 주도적인 역할을 맡는 경우가 많고, 함께 성장하는 과정에서 큰 보람을 느낍니다. 때로는 강한 기준 때문에 거리감이 느껴질 수 있지만 시간이 지날수록 신뢰가 깊어지는 장점이 있습니다. 아이에게는 믿고 의지할 수 있는 단단한 버팀목 같은 보호자입니다.",
        '庚子': "당신은 반려동물의 상태를 냉정하게 분석하고 체계적으로 돌보는 관리형 보호자입니다. 감정에 휩쓸리기보다는 상황을 객관적으로 판단하여 아이에게 가장 필요한 조치를 취하려는 현실적인 태도가 강합니다. 건강 관리나 생활 환경 개선처럼 실질적인 부분에서 꾸준한 노력을 기울이며, 문제 상황이 생기면 끝까지 원인을 찾아 해결하려는 집념이 있습니다. 사랑 표현은 화려하지 않지만 진심이 분명하고 행동으로 드러나는 스타일입니다. 아이는 당신의 단단한 보호 아래에서 안정된 생활 리듬을 유지하며 불안감 없이 지낼 수 있습니다. 신뢰와 책임을 기반으로 관계를 만들어가는 보호자입니다.",
        '庚戌': "당신은 반려동물을 향한 마음이 쉽게 변하지 않는 의리형 보호자입니다. 한번 가족으로 받아들인 존재는 어떤 상황에서도 끝까지 책임져야 한다는 신념이 분명하며, 장기적인 관계를 중요하게 생각합니다. 아이가 건강할 때뿐 아니라 약해지고 나이가 들어도 변함없이 곁을 지키려는 깊은 헌신이 있습니다. 감정 표현은 직선적이고 강도가 높은 편이며, 보호 본능이 강해 아이를 지키기 위한 선택을 주저하지 않습니다. 때로는 지나치게 강한 태도가 부담이 될 수 있지만 그만큼 신뢰감과 안정감을 주는 힘이 큽니다. 아이에게는 평생 믿고 의지할 수 있는 굳건한 보호자입니다.",
        '庚申': "당신은 반려동물에게 자유와 안전을 동시에 제공하려는 균형형 보호자입니다. 불필요한 간섭이나 과보호를 줄이면서도 기본적인 생활 기반과 보호는 확실히 책임지는 현실적인 성향을 가지고 있습니다. 아이가 스스로 탐색하고 경험할 수 있는 환경을 만들어주며, 필요할 때는 강하게 개입해 방향을 잡아주는 조절 능력이 뛰어납니다. 감정 표현은 담백하지만 꾸준하고 진솔해 시간이 지날수록 깊은 신뢰가 쌓입니다. 아이와의 관계에서도 서로를 존중하는 안정적인 거리감이 유지되며 건강한 유대가 형성됩니다. 아이에게는 자유롭게 성장할 수 있도록 지켜보면서도 언제든 보호해 줄 준비가 된 든든한 보호자입니다.",
        '辛未': "당신은 반려동물을 정성스럽게 가꾸고 보호하는 품격형 보호자입니다. 생활 환경의 질과 위생 상태, 먹는 것과 사용하는 물건까지 꼼꼼하게 관리하며 아이가 항상 안정되고 편안한 상태를 유지하도록 노력합니다. 감각이 섬세하고 기준이 분명해 작은 변화도 쉽게 놓치지 않으며, 보호자로서 제대로 돌보고 있다는 확신이 있어야 마음이 놓이는 편입니다. 아이를 단순히 키우는 것이 아니라 함께 살아가는 공간과 분위기까지 책임지려는 의식이 강합니다. 때로는 완벽하게 해주고 싶은 마음이 부담으로 이어질 수 있지만, 그만큼 꾸준한 정성과 헌신이 관계를 깊게 만듭니다. 아이는 당신의 세심한 돌봄 속에서 안정감과 보호받고 있다는 확신을 느끼며 성장하게 됩니다.",
        '辛巳': "당신은 반려동물의 매력과 개성을 잘 살려주는 감각형 보호자입니다. 아이가 더 건강하고 아름답게 보일 수 있도록 환경과 생활 방식을 세심하게 조율하며, 외적인 관리와 분위기 형성에도 신경을 많이 쓰는 편입니다. 표현 방식은 세련되고 부드러우며, 애정을 드러낼 때도 감정과 분위기를 중요하게 생각합니다. 겉으로는 차분하고 냉정해 보일 수 있지만 실제로는 아이와의 교감에서 큰 행복을 느끼는 로맨틱한 면이 있습니다. 아이가 편안하게 느끼는 공간을 만들기 위해 꾸준히 노력하며, 함께하는 시간을 특별하게 만드는 능력이 있습니다. 아이에게는 아름답고 안정적인 일상을 선물하는 보호자입니다.",
        '辛卯': "당신은 반려동물의 기분과 컨디션을 매우 세밀하게 읽어내는 정밀 교감형 보호자입니다. 작은 소음이나 환경 변화에도 민감하게 반응하며 아이가 스트레스를 받지 않도록 생활 환경을 조정하는 능력이 뛰어납니다. 감정 표현은 크지 않지만 깊고 지속적인 관심을 통해 아이와의 유대감을 천천히 쌓아갑니다. 보호자로서 기준이 높아 때로는 스스로에게도 엄격해질 수 있지만, 그만큼 아이의 삶의 질을 높이려는 의지가 강합니다. 아이가 편안하고 안정된 상태를 유지할 수 있도록 세심하게 돌보는 과정에서 보호자 본인도 큰 만족을 느낍니다. 아이에게는 가장 나를 잘 이해하고 배려해 주는 섬세한 보호자입니다.",
        '辛丑': "당신은 조용하지만 매우 깊은 애정을 지속적으로 보여주는 내면형 보호자입니다. 겉으로 화려하게 표현하지 않아도 행동과 선택에서 진심이 드러나는 타입이며, 아이를 향한 책임감이 쉽게 흔들리지 않습니다. 반복되는 돌봄과 생활 관리 속에서도 꾸준함을 유지하며, 아이가 편안하게 지낼 수 있는 기반을 묵묵히 만들어갑니다. 감정적으로 크게 요동치기보다는 안정된 태도를 유지해 아이에게 심리적 안정을 주는 힘이 있습니다. 시간이 지날수록 관계의 밀도가 깊어지고 서로에 대한 신뢰가 단단히 쌓이는 특징이 있습니다. 아이에게는 늘 같은 자리에서 기다려주는 따뜻하고 단단한 보호자입니다.",
        '辛亥': "당신은 반려동물과의 관계에서 정서적 교감과 분위기를 중요하게 여기는 감성형 보호자입니다. 아이가 편안함을 느끼는 공간과 시간을 만들기 위해 세심하게 신경 쓰며, 함께하는 순간에서 큰 행복과 위로를 얻는 특징이 있습니다. 생활의 속도를 아이의 리듬에 맞추려는 유연함이 있어 관계가 부드럽고 자연스럽게 이어집니다. 감정이 깊고 애착이 강해 아이의 상태 변화에도 민감하게 반응하며, 보호자로서의 역할에 의미를 많이 부여하는 편입니다. 때로는 지나치게 마음을 쓰거나 걱정이 많아질 수 있지만 그만큼 애정의 밀도가 높습니다. 아이에게는 정서적으로 따뜻하게 감싸주는 고요한 보호자입니다.",
        '辛酉': "당신은 반려동물을 향한 마음이 분명하고 오래 지속되는 신념형 보호자입니다. 한번 마음을 준 존재에게는 쉽게 변하지 않는 애정을 보이며, 보호자로서의 역할을 자부심 있게 받아들이는 특징이 있습니다. 생활 환경과 건강 관리에서 높은 기준을 세우고 아이가 항상 좋은 상태를 유지할 수 있도록 노력합니다. 겉으로는 냉정하거나 까다로워 보일 수 있지만 실제로는 매우 부드럽고 헌신적인 마음을 가지고 있습니다. 아이와의 관계에서도 신뢰를 중요하게 여기며 꾸준히 시간을 투자하는 편입니다. 아이에게는 변함없이 나를 지켜주는 단단하고 믿음직한 보호자입니다.",
        '壬申': "당신은 반려동물에게 넓은 세상과 다양한 경험을 선물하고 싶어 하는 자유 확장형 보호자입니다. 아이를 과하게 통제하기보다는 스스로 탐색하고 적응하며 성장하도록 기회를 주는 성향이 강합니다. 활동 범위가 넓고 새로운 환경에 대한 두려움이 적어 아이와 함께 움직이며 관계를 만들어가는 데 능숙합니다. 자잘한 실수나 사고에도 크게 집착하지 않고 전체 흐름을 보려는 여유가 있어 아이가 심리적으로 위축되지 않고 자신감을 유지하기 쉽습니다. 보호자로서 책임감도 분명하지만 방식이 부드럽고 유연해 억압적인 분위기가 만들어지지 않습니다. 아이에게는 세상을 배우고 경험할 수 있도록 길을 열어주는 든든한 동반자 같은 보호자입니다.",
        '壬午': "당신은 반려동물과 함께할 때 에너지와 분위기가 크게 살아나는 활력형 보호자입니다. 밝고 긍정적인 태도로 아이와의 일상을 즐겁게 만들며, 함께 움직이고 반응하는 과정에서 관계의 밀도가 빠르게 깊어집니다. 아이의 행동에 적극적으로 반응하고 감정을 나누는 표현력이 좋아 자연스럽게 유대감이 형성되는 특징이 있습니다. 일상 속에서 재미와 변화를 추구하는 성향이 있어 아이가 지루함을 느낄 틈이 적습니다. 다만 에너지의 기복이 생기면 생활 리듬이 불규칙해질 수 있어 균형을 유지하는 것이 중요합니다. 아이에게는 함께 있으면 세상이 즐겁게 느껴지는 따뜻한 보호자입니다.",
        '壬辰': "당신은 반려동물의 다양한 모습과 변화를 넓은 마음으로 받아들이는 포용형 보호자입니다. 작은 문제나 단기적인 상황보다 장기적인 관계와 안정된 흐름을 중요하게 생각하는 현실적인 시야를 가지고 있습니다. 아이가 가진 개성과 속도를 존중하며 과도한 간섭 없이 자연스럽게 함께 살아가는 방식을 선택합니다. 감정적으로 여유가 있어 아이가 불안해할 때 차분하게 안정감을 주는 힘이 있으며, 보호자로서 큰 틀을 잡아주는 역할을 합니다. 때로는 세밀한 관리가 부족해 보일 수 있지만 대신 관계의 지속성과 신뢰가 깊어지는 장점이 있습니다. 아이에게는 언제든 돌아와 쉴 수 있는 넓은 품 같은 보호자입니다.",
        '壬寅': "당신은 반려동물과 함께 움직이며 경험을 공유하는 모험형 보호자입니다. 새로운 산책 코스나 활동을 시도하는 데 적극적이며 아이의 호기심과 에너지를 자연스럽게 이끌어내는 능력이 있습니다. 자유로운 성향이 강하지만 아이와의 관계에서는 책임감을 분명히 인식하고 지속적인 관심을 기울입니다. 친구처럼 편하게 놀아주면서도 필요할 때는 방향을 잡아주는 균형감이 있어 건강한 유대가 형성되기 쉽습니다. 아이는 당신과 함께할 때 활동성과 자신감이 높아지며 세상을 긍정적으로 받아들이는 경향이 있습니다. 함께하는 시간이 쌓일수록 서로에게 삶의 활력이 되는 보호자입니다.",
        '壬子': "당신은 반려동물을 향한 감정의 깊이가 크고 조용하게 애정을 지속하는 내면형 보호자입니다. 화려한 표현보다는 눈빛과 분위기 속에서 교감을 나누는 것을 중요하게 생각하며, 함께 있는 시간 자체에서 큰 안정과 위로를 얻습니다. 아이의 감정 변화에 민감하게 반응하면서도 겉으로는 차분한 태도를 유지하는 특징이 있습니다. 보호자로서 큰 흐름을 놓치지 않고 관계의 균형을 유지하려는 힘이 있어 장기적인 유대가 안정적으로 이어집니다. 때로는 마음속 고민이 깊어질 수 있지만 그만큼 애정의 밀도와 진심이 큽니다. 아이에게는 조용하지만 매우 깊은 사랑으로 감싸주는 보호자입니다.",
        '壬戌': "당신은 반려동물의 삶을 끝까지 책임지고 지켜내려는 신념형 보호자입니다. 상황이 어렵거나 시간이 오래 걸리더라도 쉽게 포기하지 않는 인내심과 지속력이 강하며, 보호자로서의 역할을 삶의 중요한 가치로 받아들입니다. 아이의 좋은 모습뿐 아니라 힘든 모습까지 모두 끌어안으며 함께 살아가는 관계를 중요하게 생각합니다. 감정 표현은 절제되어 있지만 행동과 선택에서 책임감이 분명하게 드러나는 타입입니다. 아이에게 안정된 방향성과 보호를 동시에 제공하며, 시간이 지날수록 깊은 신뢰가 쌓이는 특징이 있습니다. 아이에게는 언제나 흔들림 없이 길을 밝혀주는 보호자입니다.",
        '癸酉': "당신은 반려동물의 감정과 상태를 매우 섬세하게 읽어내는 직관형 보호자입니다. 말로 표현되지 않는 분위기와 눈빛의 변화까지 민감하게 느끼며 아이의 마음을 먼저 이해하려는 성향이 강합니다. 감정 교류를 중요하게 생각하고 아이가 안정감을 느낄 수 있는 환경을 조용히 만들어주는 능력이 있습니다. 생활 관리에서도 작은 부분까지 신경 쓰는 꼼꼼함이 있으며, 보호자로서의 역할을 매우 진지하게 받아들이는 편입니다. 때로는 마음이 여려 쉽게 상처를 받거나 걱정이 많아질 수 있지만 그만큼 애정의 밀도와 진심이 깊습니다. 아이에게는 언제든 나를 이해해 주는 따뜻하고 세심한 보호자입니다.",

        '丙寅': "이 아이는 존재 자체로 집안 분위기를 환하게 바꾸는 태양형 반려동물입니다. 가만히 있어도 눈에 띄는 존재감이 있고, 보호자를 향한 애정 표현도 매우 적극적이라 함께 있으면 집 안의 공기가 훨씬 밝아지는 느낌을 줍니다. 반가운 마음이 생기면 망설이지 않고 바로 달려오고, 기분이 좋을 때는 꼬리나 눈빛, 몸짓으로 감정을 숨김없이 표현하는 편입니다. 새로운 공간이나 활동에도 비교적 겁이 적고, 흥미가 생기면 먼저 다가가 보려는 용기와 호기심이 함께 살아 있습니다. 다만 에너지가 넘치는 만큼 심심함을 오래 견디지 못해 놀이와 반응이 충분히 필요할 수 있습니다. 보호자와 함께 움직이고 부딪치며 관계를 쌓을수록 더 반짝이고 더 사랑스러운 매력을 드러내는 아이입니다.",
        '丙子': "이 아이는 영리한 호기심과 생기 넘치는 감각을 동시에 가진 재간둥이형 반려동물입니다. 작은 변화도 금방 눈치채고, 처음 보는 물건이나 소리가 있으면 관심을 보이며 탐색하려는 성향이 강합니다. 혼자서도 이것저것 살피며 재미를 찾는 능력이 있어 생활 속에서 보호자를 자주 웃게 만드는 타입입니다. 표정과 반응이 풍부해 눈빛만 봐도 지금 뭘 궁금해하는지, 무엇에 마음이 끌렸는지가 느껴지는 경우가 많습니다. 보호자와의 교감도 빠른 편이라 리액션을 잘해주면 더 신나고 적극적으로 반응합니다. 지루하지 않은 환경과 꾸준한 소통이 있을수록 더욱 똑똑하고 매력적인 성격으로 자라나는 아이입니다.",
        '丙戌': "이 아이는 작고 귀여운 외형 안에 의외로 강한 책임감과 충성심을 품고 있는 수호자형 반려동물입니다. 보호자나 가족을 자기 식구로 받아들이는 마음이 분명해서 낯선 상황에서는 먼저 앞에 서거나 주변을 살피는 행동을 보일 수 있습니다. 기본적으로는 밝고 따뜻한 성향이지만, 지켜야 한다는 본능이 자극되면 생각보다 단단하고 용감한 모습을 드러냅니다. 보호자를 향한 애착이 깊어 함께 움직이는 것을 좋아하고, 산책이나 외부 활동에서도 주변을 살피며 자기 나름의 역할을 하려는 기질이 있습니다. 믿고 의지하는 관계가 형성되면 충성심이 더욱 깊어지고, 감정 표현도 훨씬 풍부해집니다. 함께할수록 든든함과 사랑스러움을 동시에 느끼게 하는 아이입니다.",
        '丙申': "이 아이는 집안의 분위기 메이커 역할을 맡는 유쾌한 개그캐형 반려동물입니다. 몸짓 하나, 표정 하나, 자는 자세 하나까지도 평범하게 지나가지 않고 늘 웃음을 만들 만한 포인트를 가지고 있습니다. 호기심이 많고 상황 적응력이 좋아 새로운 놀이와 자극에 빠르게 반응하며, 보호자의 관심을 받는 순간 더욱 신이 나는 타입입니다. 사람의 반응을 잘 읽는 편이라 웃어주고 놀아줄수록 더 재미있는 행동과 애교를 보여줄 가능성이 큽니다. 다만 에너지가 분산되기 쉬워 심심하면 장난이나 사고로 관심을 끌 수 있으니 놀이와 상호작용이 중요합니다. 함께하는 순간마다 기억에 남는 장면을 만들어내는 사랑스러운 엔터테이너 같은 아이입니다.",
        '丙午': "이 아이는 감정을 숨기지 않고 온몸으로 표현하는 직선적이고 뜨거운 성격의 반려동물입니다. 좋으면 바로 달려들고, 신나면 몸 전체로 들뜬 기분을 보여주는 등 반응이 매우 솔직하고 화끈한 편입니다. 사람을 좋아하는 기질도 강해 산책길이나 외부 환경에서도 존재감을 드러내며 관심을 받는 것을 은근히 즐기는 성향이 있습니다. 에너지가 높고 분위기를 끌어올리는 힘이 있어 보호자가 지쳐 있을 때도 자연스럽게 웃게 만드는 매력이 큽니다. 다만 흥분도가 높아질 때는 감정 조절을 도와주는 안정적인 루틴이 함께 필요할 수 있습니다. 관심과 사랑을 충분히 받으며 자라면 누구보다 밝고 매력적인 인싸형 반려동물로 빛나는 아이입니다.",
        '丙辰': "이 아이는 여유와 존재감을 동시에 가진 넉넉한 성격의 반려동물입니다. 기본적으로 마음의 그릇이 큰 편이라 사소한 일에 쉽게 예민해지기보다 자기 리듬대로 상황을 받아들이는 모습이 많습니다. 편안한 공간, 맛있는 간식, 익숙한 보호자 곁에서 안정감을 느끼며 만족도가 높아지는 타입입니다. 다급하거나 예민한 반응보다는 느긋하고 묵직한 분위기로 존재감을 드러내며, 가만히 있어도 집 안에 안정된 기운을 주는 아이가 많습니다. 애정 표현도 과하게 들쑥날쑥하기보다 꾸준하고 넉넉하게 이어지는 편이라 함께 지낼수록 편안한 정이 깊어집니다. 보호자에게는 보고만 있어도 마음이 느슨해지고 행복해지는 큰 복덩이 같은 아이입니다.",
        '丁卯': "이 아이는 조용하고 섬세한 감정 교류를 가장 중요하게 여기는 정서형 반려동물입니다. 큰 소리나 거친 놀이보다는 보호자의 부드러운 목소리, 손길, 눈맞춤 같은 차분한 교감을 통해 안정감을 느끼는 타입입니다. 낯선 상황에서는 먼저 상황을 살피며 조심스럽게 행동하는 경향이 있지만, 신뢰가 형성되면 깊고 지속적인 애정을 보여줍니다. 보호자의 기분 변화에도 민감하게 반응하여 곁에 다가와 조용히 체온을 나누려는 행동을 자주 보일 수 있습니다. 생활 리듬이 안정적일수록 마음이 더 편안해지고, 그만큼 애정 표현도 풍부해집니다. 함께 지낼수록 마음이 통하는 느낌을 강하게 주는 따뜻한 교감형 아이입니다.",
        '丁丑': "이 아이는 변덕이 적고 꾸준함이 강한 안정형 반려동물입니다. 새로운 자극에 즉각적으로 반응하기보다는 익숙한 환경과 루틴 속에서 심리적 안정을 찾는 성향이 있습니다. 보호자 곁에 조용히 머물며 존재감으로 마음을 편안하게 해주는 타입이며, 과한 애교보다는 묵묵한 애착을 보여주는 경우가 많습니다. 몸을 가까이 붙이거나 같은 공간에 머무르는 것만으로도 깊은 유대감을 형성합니다. 스트레스 상황에서도 쉽게 흥분하지 않고 자기 방식으로 평정을 찾으려는 힘이 있습니다. 꾸준한 돌봄과 안정된 생활 환경 속에서 가장 건강하고 온화하게 성장하는 아이입니다.",
        '丁亥': "이 아이는 감정 교감 능력이 매우 뛰어난 공감형 반려동물입니다. 보호자의 한숨, 목소리 톤, 표정 변화 같은 작은 신호에도 반응하며 자연스럽게 다가와 위로하려는 행동을 보일 수 있습니다. 혼자 활동하는 것보다 보호자와 함께 조용한 시간을 보내는 것을 더 좋아하는 성향이 강합니다. 체온을 나누거나 눈을 맞추는 순간 심리적으로 깊은 안정감을 느끼며 관계가 빠르게 깊어지는 특징이 있습니다. 감수성이 풍부한 만큼 환경 변화나 정서적 긴장에도 영향을 받기 쉬워 부드러운 돌봄이 중요합니다. 사랑을 받을수록 더 다정해지고 더 깊이 마음을 열어가는 따뜻한 아이입니다.",
        '丁酉': "이 아이는 청결감과 정돈된 환경을 중요하게 여기는 예민·세심형 반려동물입니다. 몸 상태나 주변 환경의 작은 변화에도 민감하게 반응하며 쾌적한 공간에서 심리적 안정이 높아지는 특징이 있습니다. 스스로 몸단장을 하거나 특정 공간을 선호하는 등 자기 관리 성향이 나타나기도 합니다. 보호자가 정성껏 돌봐주는 시간 자체를 교감으로 받아들이는 경우가 많아 grooming이나 스킨십 시간이 중요합니다. 낯선 사람이나 상황에는 경계심을 보일 수 있지만 신뢰가 쌓이면 애정 표현이 깊어지는 타입입니다. 섬세하게 관리해 줄수록 우아하고 안정된 성격으로 자리 잡는 아이입니다.",
        '丁未': "이 아이는 애착 욕구가 강하고 보호자와의 신체적 교감을 통해 안정감을 얻는 밀착형 반려동물입니다. 안아주거나 가까이 붙어 있을 때 심리적으로 가장 편안함을 느끼며 떨어져 있는 시간을 길게 힘들어할 수 있습니다. 감정 표현이 솔직하고 즉각적인 편이라 원하는 것이 있을 때 울음이나 행동으로 신호를 보내는 경우도 많습니다. 관심과 사랑을 충분히 받으면 밝고 다정한 성격으로 자라지만, 반대로 외로움을 자주 느끼면 예민해질 수 있습니다. 보호자와의 유대가 성격 형성에 큰 영향을 주는 아이입니다. 꾸준한 스킨십과 안정적인 관계 속에서 가장 행복해지는 타입입니다.",
        '丁巳': "이 아이는 눈치와 상황 판단 능력이 빠른 지능형 반려동물입니다. 보호자의 행동 패턴이나 소리, 생활 리듬을 빠르게 학습하여 타이밍 좋게 행동하는 모습을 자주 보여줍니다. 원하는 것이 있을 때 애교나 행동으로 표현하는 센스가 뛰어나며, 교감 능력도 높은 편입니다. 활동성과 감정 반응이 균형 있게 발달하는 경우가 많아 생활 속에서 다양한 매력을 보여줍니다. 다만 관심 욕구가 강한 만큼 놀이와 소통이 부족하면 장난 행동이 늘어날 수 있습니다. 보호자와 충분히 교류하며 지낼수록 더 똑똑하고 매력적인 성격으로 성장하는 아이입니다.",
        '戊辰': "이 아이는 묵직하고 안정적인 기운으로 집안 전체 분위기를 편안하게 만드는 중심형 반려동물입니다. 급하게 움직이기보다는 자신의 속도대로 천천히 다가와 보호자 곁에 자리를 잡는 경우가 많습니다. 활동성이 아주 강하기보다는 편안한 공간에서 안정감을 느끼며 존재 자체로 따뜻한 위안을 주는 타입입니다. 익숙한 환경과 보호자의 생활 리듬 속에서 심리적 균형을 유지하려는 경향이 강합니다. 쉽게 흥분하지 않고 상황을 차분히 받아들이는 힘이 있어 장기적으로 매우 믿음직한 성격으로 자리 잡습니다. 함께 지낼수록 마음이 느슨해지고 안정되는 든든한 동반자 같은 아이입니다.",
        '戊寅': "이 아이는 자기 주관이 뚜렷하고 자존감이 강한 리더형 반려동물입니다. 처음에는 자신의 영역과 감정을 지키려는 모습이 강하게 나타날 수 있지만, 보호자와 신뢰가 쌓이면 깊은 애착을 보입니다. 부르면 바로 달려오기보다는 상황을 살피고 한 템포 늦게 반응하는 츤데레 기질도 특징입니다. 활동성과 용기가 함께 살아 있어 외부 환경에서도 비교적 당당하게 움직이는 경우가 많습니다. 다만 억지로 통제하기보다 존중과 일관된 교육이 있을 때 성격이 훨씬 안정됩니다. 관계가 깊어질수록 책임감 있고 충직한 모습을 강하게 드러내는 아이입니다.",
        '戊子': "이 아이는 감정을 겉으로 크게 표현하지 않지만 속 깊은 애정을 꾸준히 보내는 조용한 사랑형 반려동물입니다. 보호자의 움직임을 눈으로 따라가거나 가까이 다가와 조용히 곁에 머무르는 행동을 자주 보일 수 있습니다. 혼자 시간을 보내는 것도 잘하지만, 동시에 보호자와 같은 공간에 있는 것만으로도 안정감을 느끼는 타입입니다. 과한 자극이나 소란스러운 환경보다는 차분하고 일정한 생활 패턴을 선호합니다. 마음을 열면 묵직하고 오래가는 애착을 형성하는 특징이 있습니다. 조용하지만 깊은 유대감을 느끼게 해주는 아이입니다.",
        '戊戌': "이 아이는 충성심과 책임감이 강한 전형적인 의리형 반려동물입니다. 한 번 마음을 열면 보호자와의 관계를 끝까지 지키려는 성향이 매우 강하게 나타납니다. 외출 후 돌아왔을 때 격하게 반겨주거나 보호자의 상태를 먼저 확인하려는 행동도 자주 보일 수 있습니다. 자기 식구라는 인식이 분명해지면 경계심보다 애정 표현이 훨씬 커지는 특징이 있습니다. 환경 변화에는 처음에 신중하지만 익숙해지면 꾸준히 적응하는 힘이 있습니다. 평생을 함께하는 든든한 가족 같은 존재로 자리 잡는 아이입니다.",
        '戊申': "이 아이는 현실 감각과 학습 능력이 뛰어난 지능형 반려동물입니다. 새로운 장난감이나 놀이 방식도 빠르게 이해하고 혼자서도 재미를 찾는 자립성이 강한 편입니다. 상황 판단이 빠르고 활동적인 성향이 있어 생활 속에서 다양한 행동 패턴을 보여줍니다. 보호자의 반응을 살피며 자신만의 방식으로 소통하려는 모습도 특징입니다. 다만 지루함을 오래 견디지 못하는 면이 있어 놀이와 자극이 적절히 필요합니다. 잘 성장하면 매우 똑똑하고 생활 능력이 뛰어난 매력적인 아이가 됩니다.",
        '戊午': "이 아이는 에너지와 행동력이 강한 활동형 반려동물입니다. 몸을 움직이며 뛰어노는 시간에서 큰 행복을 느끼고 외부 환경 탐색에도 적극적인 편입니다. 신체 활동을 통해 스트레스를 해소하는 타입이라 산책이나 놀이 시간이 중요합니다. 보호자와 함께 움직일 때 유대감이 빠르게 깊어지고 밝고 쾌활한 성격이 더욱 살아납니다. 감정 표현도 비교적 솔직한 편이라 기분이 좋으면 온몸으로 반응을 보여줍니다. 충분히 에너지를 발산할 수 있는 환경에서 가장 건강하고 즐겁게 성장하는 아이입니다.",
        '己巳': "이 아이는 상황 적응력이 뛰어나고 사회성이 매우 좋은 평화형 반려동물입니다. 낯선 친구나 새로운 환경에서도 긴장하기보다 분위기를 살피며 자연스럽게 어울리는 능력이 있습니다. 보호자의 기분이나 생활 리듬을 빠르게 파악하고 그에 맞게 행동을 조절하는 눈치와 센스가 뛰어난 타입입니다. 관심을 받고 싶을 때도 과하게 떼쓰기보다는 예쁜 행동으로 마음을 얻으려는 특징이 있습니다. 활동성과 안정감이 균형을 이루는 성향이라 함께 지내기 편안하고 스트레스가 적은 아이입니다. 보호자와의 교감이 깊어질수록 더 다정하고 생활력이 좋은 매력적인 반려동물로 성장합니다.",
        '己卯': "이 아이는 부드럽고 포근한 환경을 선호하는 평화형 반려동물입니다. 따뜻한 공간이나 푹신한 장소에서 쉬는 것을 좋아하며 생활의 안정과 편안함을 중요하게 여깁니다. 활동성이 아주 강하기보다는 조용히 보호자 곁에 머무르며 교감을 나누는 시간을 선호하는 특징이 있습니다. 스트레스 상황에서는 숨거나 몸을 말아 자신을 보호하려는 본능이 나타날 수 있습니다. 애정 표현은 부드럽고 지속적이며 신뢰가 쌓이면 깊은 애착 관계를 형성합니다. 보호자의 차분한 태도와 안정된 환경 속에서 가장 잘 성장하는 아이입니다.",
        '己丑': "이 아이는 생활 리듬이 안정적이고 기본적인 만족도가 높은 평온형 반려동물입니다. 먹는 것과 쉬는 것을 균형 있게 즐기며 과도한 자극 없이도 편안하게 하루를 보내는 능력이 있습니다. 보호자 곁에서 조용히 잠들거나 느긋하게 시간을 보내는 모습이 자주 보입니다. 욕구 표현이 과하지 않아 키우는 입장에서는 매우 순하고 편안하게 느껴지는 타입입니다. 다만 규칙적인 생활 환경과 안정적인 돌봄이 함께할 때 더욱 건강하고 온화한 성격으로 자리 잡습니다. 보고만 있어도 마음이 차분해지는 힐링형 아이입니다.",
        '己亥': "이 아이는 여유롭고 관대한 기질을 가진 둥글둥글 평화주의 반려동물입니다. 작은 실수나 변화에도 쉽게 예민해지지 않고 상황을 유연하게 받아들이는 힘이 있습니다. 낯선 사람이나 환경에도 비교적 부드럽게 적응하며 공격성보다는 호기심과 관찰 성향이 강한 편입니다. 보호자와 함께 편안하게 시간을 보내는 것을 좋아하고, 긴장감이 낮은 환경에서 가장 행복해지는 타입입니다. 애정 표현도 느긋하고 지속적인 방식으로 나타나는 경우가 많습니다. 함께 지낼수록 안정감과 따뜻함을 주는 존재로 자리 잡는 아이입니다.",
        '己酉': "이 아이는 생활 패턴 인지 능력이 뛰어나고 루틴을 중요하게 여기는 실용형 반려동물입니다. 밥 시간, 산책 시간, 보호자의 행동 패턴 등을 빠르게 학습하고 스스로 요구를 표현하는 지능적인 특징이 있습니다. 예민하다기보다는 정확하고 꼼꼼한 감각으로 생활을 관리하려는 기질이 있습니다. 규칙적인 환경에서 스트레스가 줄어들고 심리적 안정감이 높아집니다. 보호자와의 신뢰가 쌓이면 애정 표현도 점점 적극적으로 변화하는 경우가 많습니다. 함께 생활할수록 편리함과 똑똑함을 동시에 느끼게 해주는 아이입니다.",
        '己未': "이 아이는 보호자에게 정서적으로 깊이 의존하는 밀착형 반려동물입니다. 혼자 있는 시간을 힘들어하거나 보호자의 움직임을 계속 따라다니는 행동이 나타날 수 있습니다. 가까이 안기거나 체온을 나누는 순간 가장 큰 안정감을 느끼는 성향이 강합니다. 애교 표현이 솔직하고 감정 전달이 빠른 편이라 관계 형성이 매우 깊어지는 특징이 있습니다. 다만 과도한 의존이 생기지 않도록 적절한 독립 경험을 함께 만들어 주는 것이 중요합니다. 사랑을 충분히 받으며 자라면 밝고 따뜻한 성격으로 평생 보호자의 곁을 지키는 아이가 됩니다.",
        '庚午': "이 아이는 감정 표현이 매우 솔직하고 행동력이 강한 직선형 반려동물입니다. 기분이 좋을 때는 몸 전체로 반응을 보여주고, 싫은 상황에서는 분명하게 거리를 두려는 태도를 보이기도 합니다. 숨김없는 성격 덕분에 보호자는 아이의 상태를 비교적 쉽게 이해할 수 있는 편입니다. 활동성이 높고 움직이며 에너지를 발산할 때 가장 즐거워하는 타입이라 산책이나 놀이 시간이 중요합니다. 보호자와 함께 뛰고 반응하며 관계를 쌓을수록 유대감이 빠르게 깊어집니다. 꾸준한 활동과 소통 속에서 밝고 당당한 성격으로 성장하는 매력적인 아이입니다.",
        '庚辰': "이 아이는 용기와 탐색 본능이 강한 리더형 반려동물입니다. 새로운 장소나 상황에서도 먼저 움직이며 환경을 확인하려는 성향이 뚜렷하게 나타납니다. 겁이 적고 호기심이 많아 외부 활동이나 변화에 비교적 잘 적응하는 편입니다. 다만 자기 방식대로 행동하려는 기질도 있어 일관된 교육과 신뢰 형성이 중요합니다. 보호자와의 관계가 안정되면 따뜻한 애정 표현과 충성심이 함께 드러나는 특징이 있습니다. 함께 지낼수록 든든함과 추진력을 동시에 느끼게 하는 아이입니다.",
        '庚寅': "이 아이는 겉으로는 경계심이 있지만 속은 매우 정이 깊은 츤데레형 반려동물입니다. 처음에는 거리를 두거나 시크한 태도를 보일 수 있으나 마음을 열면 갑자기 애교가 늘어나는 반전 매력이 있습니다. 자기 공간과 감정을 중요하게 여기는 독립성도 함께 살아 있는 타입입니다. 보호자와 신뢰가 쌓일수록 충성심과 애착이 강해지며 관계가 매우 끈끈해지는 특징이 있습니다. 강압적인 방식보다 존중과 꾸준한 교감이 성격 안정에 큰 도움이 됩니다. 함께 지낼수록 매력을 더 크게 느끼게 되는 아이입니다.",
        '庚子': "이 아이는 집중력과 학습 능력이 뛰어난 지능형 반려동물입니다. 보호자의 말이나 행동을 주의 깊게 관찰하고 훈련이나 규칙을 빠르게 이해하는 경우가 많습니다. 칭찬과 반응에 민감하게 반응하며 인정받는 순간 큰 만족감을 느끼는 성향이 있습니다. 활동성과 사고 능력이 균형 있게 발달하는 타입이라 다양한 놀이와 교육이 도움이 됩니다. 보호자와의 교류가 많을수록 성격이 더욱 안정되고 자신감이 높아집니다. 함께 생활할수록 똑똑함과 성실함을 동시에 느끼게 하는 아이입니다.",
        '庚戌': "이 아이는 가족 보호 본능과 충성심이 매우 강한 수호자형 반려동물입니다. 자기 식구라는 인식이 분명해지면 보호자를 지키려는 행동이나 경계 태도가 나타날 수 있습니다. 기본적으로는 따뜻한 성향이지만 책임감을 느끼는 상황에서는 단단한 모습을 보이는 특징이 있습니다. 함께 생활하는 시간이 길어질수록 애정 표현이 깊어지고 유대감이 더욱 확고해집니다. 안정된 관계 속에서 자라면 매우 믿음직하고 헌신적인 동반자가 됩니다. 평생 곁을 지켜주는 든든한 아이입니다.",
