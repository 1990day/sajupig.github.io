<script>
    function openLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function closeLogin() { document.getElementById('loginOverlay').style.display = 'none'; }

    // ==========================================================
    // 🚨 [필수] 결제 우회 방지 철통 보안 코드 (Kill Switch 작동)
    // ==========================================================
    const urlParams = new URLSearchParams(window.location.search);
    const paymentKey = urlParams.get('paymentKey'); 
    const meYear = sessionStorage.getItem('me_year'); 
    const youYear = sessionStorage.getItem('you_year'); 
    const orderId = urlParams.get('orderId') || '현장결제';

    if (!paymentKey || paymentKey === '') {
        alert("정상적인 결제 내역이 확인되지 않았습니다! 결제 페이지로 이동합니다.");
        document.body.style.display = "none"; 
        window.location.replace("friendspig.html");
        throw new Error("결제 미확인 차단"); 
    } else if (!meYear || !youYear) {
        alert("사주 정보가 만료되었습니다. 결제 페이지에서 다시 입력해주세요!");
        document.body.style.display = "none";
        window.location.replace("friendspig.html");
        throw new Error("정보 만료 차단");
    }
    // ==========================================================

    const elementMap = {
        '甲': '木', '乙': '木', '寅': '木', '卯': '木',
        '丙': '火', '丁': '火', '巳': '火', '午': '火',
        '戊': '土', '己': '土', '辰': '土', '戌': '土', '丑': '土', '未': '土',
        '庚': '金', '辛': '金', '申': '金', '酉': '金',
        '壬': '水', '癸': '水', '亥': '水', '子': '水'
    };

    const colorClasses = {
        '木': 'c-wood', '火': 'c-fire', '土': 'c-earth', '金': 'c-metal', '水': 'c-water'
    };

    function getCharHtml(char) {
        if (!char || char === 'unknown') return "?";
        const el = elementMap[char];
        return `<span class="${colorClasses[el]}">${char}</span>`;
    }

    const iljuPersonality = {
        '甲子': "친구 관계를 맺을 때 겉으로는 한없이 침착하고 여유로운 어른처럼 행동하지만, 속에서는 친구의 말투, 행동 패턴, 연락 빈도까지 모두 분석하며 계산하는 치밀한 인간관계 전략가입니다. 단톡방의 미묘한 기류 변화도 가장 먼저 캐치합니다. 자존심이 워낙 강해서 무리 속에서 절대 굽히거나 꿀리는 모습을 보이지 않으며, 누군가 나를 은근히 무시한다고 느끼면 겉으론 웃으면서도 속으로는 이미 손절 버튼을 누르고 있습니다. 의심이 많아 처음 만난 사람에게 곁을 잘 주지 않고 온갖 테스트를 거친 뒤에야 바운더리 안에 들입니다. 하지만 한 번 내 사람이라고 정하면 배신하지 않고 끝까지 챙기는 의리가 있습니다. 다만 은근히 친구들에게 훈수를 두거나 꼰대 짓을 할 때가 있어 피곤함을 유발하기도 합니다.",
        '乙丑': "친구에게 간 쓸개 다 빼줄 것처럼 헌신하고 잘 챙기는 스타일입니다. 모임이 있으면 궂은일을 도맡아 하고 친구들의 고민 상담도 자기 일처럼 진지하게 들어줍니다. 하지만 그 깊은 속에는 '내가 이렇게까지 해주는데 너도 이 정도는 해줘야지' 하는 강한 보상 심리가 자리 잡고 있습니다. 친구가 내 기대만큼 고마워하지 않거나 이기적으로 굴면, 겉으로는 아무 말 안 해도 속에서 억울함이 눈덩이처럼 커집니다. 한 번 호구 잡혔다거나 배신감을 느끼면 그동안 참았던 감정이 대폭발하며 뒤끝이 어마어마하게 깁니다. 웬만하면 친구와 손절하지 않고 오래가는 편이지만, 속으로는 상처를 계속 곱씹는 피곤한 인간관계 스타일입니다.",
        '丙寅': "친해지는 속도가 LTE급입니다. 마음에 드는 친구를 발견하면 먼저 다가가 말을 걸고 약속을 잡으며 관계를 주도하는 핵인싸 기질이 다분합니다. 자기 바운더리에 들어온 사람에게는 시간과 돈을 아끼지 않고 베푸는 화끈한 성격입니다. 하지만 그만큼 금방 질려 하거나 감정이 식어버리는 단점도 있습니다. 내 호의를 당연하게 여기거나 관계가 루즈해지면 갑자기 거리를 둡니다. 기분이 좋을 때는 분위기 메이커 역할을 톡톡히 하지만, 화가 나거나 서운하면 필터링 없이 팩폭을 날려서 갑분싸를 만들기도 합니다. 욱하는 마음에 단톡방을 확 나가버리고 혼자 이불킥하며 후회하는 스타일입니다. 오해를 풀 때는 또 시원하게 풀기 때문에 적당히 맞춰주면 꽤 재밌는 친구입니다.",
        '丁卯': "친구들의 감정 변화를 기가 막히게 잘 캐치하는 인간 리트머스지입니다. 친구의 미세한 표정 변화, 카톡의 느낌표 개수, 줄어든 이모티콘만 보고도 '나한테 화난 거 있나?' 하며 혼자 밤새 고민하는 예민 보스입니다. 친구 무리에서 소외당하는 것을 극도로 두려워하고, 나를 얼마나 챙겨주는지로 우정의 깊이를 확인받으려 합니다. 누가 무심한 말을 던지면 겉으론 하하 웃어넘겨도 집에 가서 일기장에 적어두고 상처받습니다. 하지만 특유의 섬세함과 공감 능력 덕분에 주변 사람들이 편하게 기대고 고민을 털어놓는 상담가 역할을 자주 합니다. 내가 피곤해지더라도 남의 기분을 먼저 맞춰주는 탓에 가끔 스스로를 좀먹는 경향이 있습니다.",
        '戊辰': "친구 관계에 있어서 '안정감'과 '의리'를 최우선으로 치는 묵직한 돌직구 스타일입니다. 여기저기 얕게 발을 걸치는 것보다는 소수의 찐친들과 평생 가는 것을 선호합니다. 무리 내에서 중심을 잡아주는 기둥 역할을 하며 입이 무거워 비밀 보장 하나는 확실합니다. 하지만 자기 바운더리 안의 친구들에 대한 은근한 소유욕과 집착이 있습니다. 내 베프가 다른 친구랑 더 친해 보이거나 나를 빼놓고 놀면 겉으론 쿨한 척해도 속으로는 질투심이 불타오릅니다. 평소엔 한없이 관대해 보이지만 거짓말이나 뒤통수를 치는 행동은 절대 용서하지 않는 단호함이 있습니다. 똥고집이 있어 자기 주장을 굽히지 않을 때가 많지만, 곁에 두면 평생 배신하지 않는 든든한 국밥 같은 친구입니다.",
        '己巳': "친구들 사이에서 절대 적을 만들지 않고 둥글둥글하게 잘 지내는 처세술의 달인입니다. 눈치가 백단이라 껄끄러운 상황이 생기면 스무스하게 분위기를 풀거나 쏙 빠져나가는 기술이 일품입니다. 겉보기엔 남의 의견에 다 맞춰주는 순둥이 같지만, 속으로는 누구보다 철저하게 손익 계산을 돌리고 있습니다. 나에게 피해가 오거나 호구 잡힐 것 같은 상황은 귀신같이 피해 갑니다. 무리 안에서 갈등이 생기면 직접 총대를 메기보다는 뒤에서 은근슬쩍 여론을 조작해 내가 유리한 쪽으로 상황 세팅하는 영악함도 갖췄습니다. 대놓고 적을 만들지 않으면서도 실속은 다 챙기는 얍삽하고도 스마트한 인간관계 장인입니다.",
        '庚午': "인간관계에서도 칼같이 선을 긋고 지켜야 할 원칙이 확고한 스타일입니다. 무리한 부탁이나 선 넘는 농담을 극도로 혐오하며, 친구 사이라도 지킬 건 지켜야 한다는 마인드입니다. 오글거리는 우정 타령이나 쓸데없는 감정 소모를 질색하기 때문에 겉보기엔 꽤나 무뚝뚝하고 건조해 보입니다. '응', '아니' 단답형 카톡의 장인이기도 합니다. 하지만 한 번 내 사람이라고 인정하면 누가 내 친구 욕하는 꼴은 절대 못 보는 의리파입니다. 말보다는 행동으로 챙겨주는 츤데레의 정석이며, 친구가 진짜 위기에 처했을 땐 군말 없이 지갑을 열고 발 벗고 나서 줍니다. 빈말은 절대 안 하지만 한 번 뱉은 말은 무조건 지키는 무거운 입을 가진 친구입니다.",
        '辛未': "친구를 사귈 때 허들이 굉장히 높고 까다로운 프로필 심사역입니다. 상대의 말투, 밥 먹는 매너, 심지어 옷 입는 센스까지 은근히 스캔하며 점수를 매깁니다. 예의가 없거나 수준이 안 맞는다고 판단되면 겉으로는 웃어주며 철저하게 거리를 둡니다. 상처받는 것에 대한 방어 기제가 심해서 처음엔 절대 속마음을 100% 꺼내 보이지 않습니다. 하지만 까다로운 검증을 통과해 진짜 절친이 되면 그 누구보다 세심하게 챙겨주고 고민을 나눕니다. 서운한 게 있어도 바로 말하지 않고 마일리지처럼 차곡차곡 쌓아뒀다가 나중에 한방에 터뜨리는 무서운 면모도 있습니다. 완벽한 우정을 꿈꾸지만 현실의 친구들이 내 기준에 못 미치면 쿨하게 혼자 노는 길을 택하기도 합니다.",
        '壬申': "어떤 무리에 던져놔도 물 흐르듯 적응하는 친화력 만렙입니다. 다양한 성향의 친구들과 두루두루 잘 어울리며 꼰대 짓이나 편 가르기를 싫어합니다. 겉보기엔 무한 긍정 예스맨 같지만, 사실 본인의 자유와 개인 시간을 누구보다 소중하게 여깁니다. 시도 때도 없이 연락하거나 주말마다 만나자고 징징대는 집착형 친구를 극도로 피곤해합니다. 머리 회전이 빨라 갈등 상황이 생기면 정면승부보다는 핑계를 대고 쏙 빠져나가는 능력이 탁월합니다. 인맥이 넓고 발이 넓지만 정작 딥하게 마음을 터놓는 친구는 극소수이며, 적당한 거리를 유지할 때 가장 좋은 퍼포먼스를 내는 매력적이고 가벼운 친구입니다.",
        '癸酉': "친구들의 속내나 의도를 엑스레이처럼 꿰뚫어 보는 무서운 직관력의 소유자입니다. 누군가 내 앞에서 가식이나 허세를 떨면 속으로 코웃음을 치며 바로 선을 긋습니다. 인맥을 넓히기보다는 취향이 맞고 대화가 통하는 소수의 사람들과 깊게 교류하는 것을 선호합니다. 싸움이 나면 목소리부터 높이는 무식한 방식을 경멸하며, 논리와 팩트로 상대의 말문을 막히게 하는 냉정한 파이터입니다. 이 때문에 가끔 친구들이 숨 막히고 서운함을 느끼기도 합니다. 무례하거나 상식이 통하지 않는 사람과는 1초도 섞이기 싫어하는 자존심 강하고 고상한 스타일의 친구입니다.",
        '甲戌': "의리와 책임감 하나로 똘똘 뭉친 인간관계의 가장 같은 존재입니다. 평소엔 살가운 애정 표현이나 호들갑을 떨지 않아서 무뚝뚝해 보이지만, 친구가 힘들 땐 가장 먼저 현실적인 대안을 찾아주고 쓴소리도 마다하지 않는 진국입니다. 친구의 성공을 돕거나 인생의 방향을 함께 고민해 주는 것을 진짜 우정이라고 봅니다. 반대로 목표 없이 허송세월하거나 찌질한 모습을 보이는 친구에겐 가차 없이 잔소리를 폭격합니다. 내가 보호해야 할 바운더리 안에 들어온 친구에겐 한없이 관대하지만, 신뢰를 저버리거나 통수를 치는 순간 뒤도 안 돌아보고 손절하는 단호박입니다. 의지하기엔 최고의 친구지만 가끔 기가 쎄서 피곤할 때도 있습니다.",
        '乙亥': "무리 안에서 묘하게 거리를 두며 적당한 개인주의를 실천하는 평화주의자입니다. 친구들 사이에서 갈등이 생기면 누구 편도 들지 않고 스위스 같은 중립국 역할을 자처합니다. 깊은 감정 쓰레기통 역할을 하거나 지나치게 서로의 사생활에 간섭하는 피곤한 우정을 극도로 꺼립니다. 갑자기 잠수를 타거나 혼자만의 동굴로 들어가 버리는 기행을 벌여 친구들을 서운하게 만들 때도 있습니다. 다정하고 말도 잘 들어주지만 '진짜 쟤 속마음은 뭘까?' 하는 생각이 들 정도로 보이지 않는 유리벽을 치고 있습니다. 서로의 프라이버시를 존중하고 가끔 만나도 어색하지 않은 쿨한 관계를 유지할 때 가장 편안함을 느끼는 고양이 같은 친구입니다.",
        '丙子': "밖에서는 텐션 높고 누구와도 잘 어울리는 핵인싸처럼 보이지만, 찐친 관계에 들어가면 꽤나 집착과 소유욕이 강해집니다. 내 절친이 나 말고 다른 무리랑 더 재밌게 노는 꼴을 보면 겉으론 쿨한 척해도 속이 부글부글 끓습니다. 은근슬쩍 서운함을 티 내거나 삐져서 연락을 씹는 등 유치한 질투를 하기도 합니다. 친구들 사이에서 은근히 주도권을 쥐고 여론을 이끌고 싶어 하는 보스 기질도 숨어있습니다. 사람을 은근히 떠보고 마음을 확인하려는 버릇이 있어서 피곤할 때도 있지만, 그만큼 내 사람을 아끼고 분위기를 띄우는 데는 타고난 분위기 메이커입니다.",
        '丁丑': "친구의 작은 고민 하나도 내 일처럼 끌어안고 끙끙대는 헌신과 인내의 아이콘입니다. 누가 돈이 없다고 하면 밥값을 대신 내주고, 술 먹고 진상 부리는 것도 다 받아주는 보살급 멘탈을 가졌습니다. 하지만 본인은 정작 상처받고 서운해도 꾹꾹 참으며 속병을 앓는 짠한 캐릭터입니다. 갈등을 피하려고 무조건 내가 미안하다고 숙이지만, 그 억울함이 계속 쌓이다가 어느 날 갑자기 예고도 없이 잠수 이별(손절)을 통보해서 주변을 경악하게 만듭니다. 나쁜 친구들에게 엮여서 호구 잡히기 딱 좋은 성향이니, 베풀기만 하는 병적인 헌신을 버리고 가끔은 이기적으로 굴 필요가 있습니다.",
        '戊寅': "무리의 대장이 되어 친구들을 리드하고 총대를 메야 직성이 풀리는 대장부 스타일입니다. 여행을 갈 때도 숙소 예약부터 동선 짜기까지 본인이 주도해야 마음이 편하고, 친구들이 딴죽을 걸면 짜증이 확 올라옵니다. 의리가 넘쳐서 내 친구가 어디 가서 무시당하면 대신 싸워줄 정도로 든든하지만, 자기 주장이 너무 강해서 가끔 통제광이나 독재자처럼 느껴지기도 합니다. 남의 말을 듣기보단 '내 말이 맞으니까 내 말대로 해'라는 식의 꼰대 마인드가 발동할 때가 많아, 기가 약한 친구들은 기가 빨려서 떨어져 나가는 경우도 생깁니다. 강압적인 태도만 고치면 평생 믿고 갈 수 있는 골목대장입니다.",
        '己卯': "어떤 무리에 섞이든 카멜레온처럼 보호색을 띠며 적응하는 눈치 백단입니다. 친구들끼리 싸움이 나도 기가 막히게 박쥐처럼 줄을 잘 타고 양쪽 모두에게 욕을 먹지 않는 신들린 처세술을 자랑합니다. 남의 기분을 아주 잘 맞춰주고 쓴소리를 안 해서 인기가 많지만, 속으로는 누구보다 철저하게 손절 각을 재고 있는 계산적인 팩폭기입니다. 나한테 조금이라도 피해가 올 것 같은 진상 친구는 서서히 연락을 씹으며 흔적도 없이 정리해 버립니다. 앞에서는 웃어주지만 뒤에서는 냉정한 평가를 내리고 있는, 알고 보면 제일 무섭고 실속 챙기는 얍삽한 베프입니다.",
        '庚辰': "맺고 끊음이 칼같이 확실하고 불도저 같은 추진력을 가진 상남자/상여자 스타일의 친구입니다. 빙빙 돌려 말하는 걸 극혐해서 팩트로 상대의 명치를 때리는 직언 제조기입니다. 뒤끝은 전혀 없어서 한바탕 시원하게 싸우고 나면 언제 그랬냐는 듯 훌훌 털어버립니다. 쪼잔하게 구는 것, 구차하게 변명하는 것을 가장 경멸하며 의리와 폼생폼사를 중요시합니다. 누군가 내 믿음을 한 번이라도 저버리면 그 자리에서 아웃시켜 버리는 무자비한 결단력을 가졌습니다. 가끔 말의 필터링이 없어서 상처를 주기도 하지만, 앞뒤가 똑같고 투명해서 제일 믿고 의지할 수 있는 의리파입니다.",
        '辛巳': "같이 다니는 친구의 급과 퀄리티를 은근히 따지는 우아한 속물주의자입니다. 거지근성이 있거나 매너 없이 구는 친구, 지저분하고 센스 없는 사람과는 애초에 겸상조차 하지 않습니다. 겉으로는 생글생글 웃으며 친절하지만 속으로는 친구들의 경제 관념, 직업, 라이프스타일을 스캔하며 계속해서 점수를 매깁니다. 내 기준에 미달한다고 느끼면 서서히 거리를 두며 우아하게 손절합니다. 남들에게 보여지는 시선과 품격을 중요하게 생각해서 데이트 비용이나 선물도 쩨쩨하게 굴지 않지만, 그만큼 상대방도 나를 제대로 대접해주길 바라는 까다롭고 예민한 귀족 스타일의 친구입니다.",
        '壬午': "말 한마디로 천 냥 빚도 갚고 사람을 홀리는 마성의 입담을 가진 무리의 핵폭탄급 인싸입니다. 넉살이 좋고 유머 감각이 뛰어나서 어색한 분위기도 5분 만에 화기애애하게 만드는 능력이 있습니다. 친구들을 자기 페이스로 교묘하게 끌어들이며 은근슬쩍 모임의 주도권을 쥐락펴락합니다. 발이 넓어서 여기저기 부르는 곳이 많다 보니 찐친 입장에서는 나만 바라보지 않는 이 친구에게 묘한 서운함을 느낄 때도 있습니다. 호기심이 많고 쉽게 질려 하는 성향이라 재미없고 진지하기만 한 친구는 피곤해하며, 늘 새로운 자극과 재미를 좇아다니는 피터팬 같은 친구입니다.",
        '癸未': "친구의 불행을 자기 일처럼 안타까워하고 어떻게든 도와주려고 오지랖을 부리는 짠내 나는 마더 테레사입니다. 누가 고민을 털어놓으면 새벽까지 통화하며 같이 울어주는 따뜻한 심성의 소유자입니다. 하지만 정작 본인은 속마음을 잘 드러내지 않고 외로움을 많이 타서 애정 결핍 기질이 다분합니다. 내가 챙겨준 만큼 상대방도 나를 특별하게 생각해 주길 바라는 마음이 커서, 작은 서운함에도 크게 삐지고 멘탈이 나갑니다. 상대방에게 지나치게 의존하거나 집착하는 경향이 있어 서로를 피곤하게 만들 수 있으니 감정의 독립이 몹시 필요한 여린 친구입니다.",
        '甲申': "친구 사이에서도 묘하게 경쟁심을 느끼고 무조건 자기가 이겨먹어야 직성이 풀리는 승부사입니다. 게임을 하든 내기를 하든 지고는 못 살며, 은근슬쩍 자기 자랑을 섞어가며 우위를 점하려 합니다. 추진력이 좋아서 친구들을 이끌고 어디든 가는 걸 좋아하지만, 타협을 모르고 자기 고집대로 밀어붙이는 불도저 기질 탓에 잦은 마찰을 빚습니다. 상대방이 내 의견을 묵살하거나 반대하면 불같이 화를 내기도 합니다. 오글거리는 애정 표현은 죽어도 못 하지만 의리 하나는 끝내줘서 내 친구가 맞고 들어오면 당장 뛰쳐나가는 행동파 베프입니다.",
        '乙酉': "친구를 자기 입맛대로 통제하고 개조하려는 숨 막히는 완벽주의자입니다. 친구의 옷차림부터 생활 습관, 인간관계까지 시시콜콜 잔소리를 늘어놓으며 지적질을 서슴지 않습니다. 겉으로는 널 위해서 하는 말이라고 포장하지만 사실은 내 눈에 거슬리는 꼴을 못 보는 깐깐함 때문입니다. 감정적인 위로나 공감보다는 차가운 팩트 폭행을 날려 친구를 두 번 죽이는 재주가 있습니다. 계산이 빠르고 손해 보는 짓은 절대 안 해서, 우정에서도 철저하게 기브 앤 테이크를 따집니다. 맺고 끊음이 워낙 칼 같아서 무서운 면도 있지만 현실적인 조언이 필요할 땐 이만한 친구가 없습니다.",
        '丙戌': "호탕하고 의리가 넘쳐서 친구들을 위해 지갑을 활짝 여는 무리의 물주(?)이자 리더입니다. 겉보기엔 근심 걱정 하나 없는 천진난만한 대인배 같지만, 혼자 있을 땐 극도의 외로움을 느끼는 반전 멘탈의 소유자입니다. 친구가 나를 빼놓고 놀거나 배신하면 하늘이 무너지는 듯한 충격을 받고 그 자리에서 이성의 끈을 놓아버릴 정도로 욱하는 성질이 있습니다. 촉이 무서울 정도로 발달해서 친구가 나에게 거짓말을 치거나 뒤통수를 치려고 하면 귀신같이 알아채고 선빵을 날립니다. 정이 많아 내 사람에겐 한없이 퍼주지만 돌아서면 가장 무서운 적이 되는 다혈질 친구입니다.",
        '丁亥': "친구의 멘탈을 어루만져 주고 상처를 보듬어 주는 따뜻한 심리 상담가 같은 존재입니다. 누구와도 적을 만들지 않고 둥글둥글하게 잘 지내며, 무리 안에서 트러블이 생기면 스무스하게 중재하는 역할을 맡습니다. 겉보기엔 한없이 순하고 만만해 보이지만, 속으로는 친구들의 능력, 배경, 인성까지 철저하게 분석하며 은근히 급을 나누는 냉정한 이성도 숨어있습니다. 대놓고 싸우기보다는 부드러운 말로 상대를 조종하고 내가 원하는 방향으로 이끄는 지능적인 처세술이 뛰어납니다. 진짜 속마음은 절대 들키지 않으면서도 실속은 다 챙기는 똑똑하고 온화한 베프입니다.",
        '戊子': "평소엔 리액션도 고장 나고 연락도 드문드문해서 도대체 무슨 생각을 하는지 알 수 없는 무뚝뚝의 끝판왕입니다. 친구가 서운함을 토로해도 로봇처럼 영혼 없는 대답만 늘어놓아 복장을 터지게 만듭니다. 하지만 속으로는 이 친구가 내 인생에 득이 되는지, 믿을 만한 사람인지 계산기 전원을 절대 끄지 않습니다. 말로 감정을 표현하기보다는 맛있는 밥을 툭 사주거나 위기 상황에 조용히 실질적인 도움을 던져주는 츤데레 짓으로 애정을 증명합니다. 인맥을 함부로 넓히지 않지만 한 번 바운더리에 들어온 내 사람은 징그러울 정도로 집착하고 지켜내는 듬직한 소나무 같은 친구입니다.",
        '己丑': "누가 때려도 묵묵히 참아내는 미련할 정도의 인내심과 황소고집을 가진 친구입니다. 친구가 아무리 진상을 부리고 선을 넘어도 당장 연을 끊지 않고 속으로 삭히며 무던하게 버텨줍니다. 남들이 보면 왜 저런 대우를 받고도 붙어있나 싶을 정도로 미련해 보입니다. 하지만 이 참을성도 한계치가 있어서 둑이 무너지는 순간 눈이 돌아가며 그동안 쌓아뒀던 불만을 화산 폭발하듯 쏟아냅니다. 변화를 싫어하고 보수적이라 늘 가던 식당, 늘 놀던 패턴만 고집해서 꽤나 지루하고 노잼인 면도 있습니다. 다이나믹한 재미는 없지만 평생 배신 걱정 없이 무덤까지 데려갈 수 있는 안전 자산 같은 베프입니다.",
        '庚寅': "성질이 불같고 생각한 건 바로 행동으로 옮겨야 직성이 풀리는 무법자 같은 친구입니다. 뒤끝이 1도 없고 투명해서 음흉하게 속을 꿍꿍 앓는 짓은 절대 못 합니다. 친구에게 불만이 생기면 다짜고짜 찾아가서 샤우팅을 지르고 뒤집어엎은 뒤, 10분 뒤에 쿨하게 밥 먹으러 가자고 하는 단세포적인 매력이 있습니다. 가오와 체면을 목숨처럼 여겨서 쪼잔하게 구는 걸 극혐하고 화끈하게 돈을 씁니다. 하지만 너무 직진만 하는 성격 탓에 필터링 없는 말로 의도치 않게 상처를 주고 혼자 자책하는 일도 잦습니다. 보호 본능을 자극하는 약한 친구 앞에서는 무장해제되어 지갑을 털어주는 호구 기질도 있는 미워할 수 없는 쌈닭입니다.",
        '辛卯': "분위기와 감각, 힙(Hip)함을 인생의 모토로 삼는 트렌드 세터이자 극강의 예민 보스입니다. 핫플레이스를 기가 막히게 잘 찾아내고 감각이 뛰어나서 같이 놀러 다니면 인생샷은 무조건 건집니다. 하지만 눈이 너무 높고 까다로워서 촌스럽거나 무식한 행동을 하는 친구를 극도로 경멸합니다. 밥 먹을 때 쩝쩝거리거나 옷을 못 입는 것도 은근히 무시하며 속으로 점수를 깎습니다. 성격이 변덕스럽고 가시 돋친 말을 툭툭 내뱉어서 주변 사람들을 눈치 보게 만드는 재주가 있습니다. 내 비위에 거슬리면 아무리 친해도 가차 없이 철벽을 치는 피곤하고 도도한 고양이 같은 친구입니다.",
        '壬辰': "친구 사이에서도 무리를 이끌고 대장 노릇을 해야 성에 차는 야망캐이자 골목대장입니다. 누구 밑에 들어가거나 간섭받는 걸 죽기보다 싫어해서, 은근슬쩍 여론을 주도하고 내 맘대로 약속을 잡아야 직성이 풀립니다. 승부욕이 미친 듯이 강해서 친구가 나보다 잘 나가거나 내 앞길을 막으면 속으로 칼을 갈며 질투의 화신으로 변합니다. 삼각관계나 파벌 싸움이 생기면 물러서기는커녕 수단과 방법을 가리지 않고 이기려 드는 전투력을 자랑합니다. 스케일이 크고 쪼잔하지 않아서 같이 있으면 든든하지만, 내가 무조건 1인자가 되어야 하는 독선적인 성격을 못 버리면 곁에 아무도 안 남게 될 수도 있습니다.",
        '癸巳': "어떤 험악한 분위기라도 웃음 한 번, 말 한마디로 스르르 녹여버리는 인간 소화기입니다. 갈등을 정면으로 돌파하기보다는 빙글빙글 돌려서 부드럽게 넘어가거나 상대방이 스스로 무장해제하게 만드는 고단수 심리전의 달인입니다. 화를 내는 법이 거의 없고 다정해서 늘 주변에 사람이 꼬이지만, 그 선한 얼굴 뒤에는 나한테 득이 되는지 실이 되는지 철저하게 따지는 차가운 주판알이 굴러가고 있습니다. 절대 손해 보는 장사는 안 하며, 위험한 상황이 닥치면 제일 먼저 발을 빼고 도망갈 줄 아는 영악함도 갖췄습니다. 다정함과 냉정한 계산이 공존하는, 절대 호락호락하지 않은 실속파 친구입니다.",
        '甲午': "어딜 가나 시선을 한 몸에 받고 입만 열면 빵빵 터뜨리는 미친 존재감의 소유자입니다. 말솜씨가 화려하고 오지랖이 넓어서 처음 본 사람과도 10분 만에 베프를 먹을 수 있습니다. 텐션이 하늘을 찌르고 놀기 좋아하지만 그만큼 감정의 롤러코스터도 심해서 종잡을 수 없는 또라이 기질이 다분합니다. 기분이 나쁘면 참지 못하고 그 자리에서 필터링 없이 쏟아부어 분위기를 싸하게 만들고는 뒤돌아서 폭풍 후회하는 패턴을 반복합니다. 참을성이 바닥 수준이라 재미없고 지루한 걸 못 버티며 금방 실증을 냅니다. 같이 있으면 심심할 틈은 없지만, 옆에서 멘탈 꽉 붙잡아주지 않으면 이리저리 날뛰는 비글 같은 친구입니다.",
        '乙未': "겉으로는 '그래 네 맘대로 해~' 하면서 다 맞춰주는 순한 양 같지만, 속에는 구렁이 백 마리가 들어앉은 집념의 소유자입니다. 친구들 의견에 순순히 따르는 척하면서도 결국 돌고 돌아 자기가 원하는 목적지로 교묘하게 이끄는 무서운 조종술을 가졌습니다. 끈질긴 인내심 하나는 우주 최강이라, 아무리 억울하고 빡치는 상황이라도 이 악물고 버티다가 최후의 승자가 되는 타입입니다. 소유욕과 집착이 은근히 강해서 내 절친이 딴 친구랑 친하게 지내면 겉으론 웃지만 속으론 저주를 퍼붓기도 합니다. 한 번 원한을 품으면 죽을 때까지 잊지 않고 앙갚음하는 끈적하고 무서운 독기를 품은 외유내강형 베프입니다.",
        '丙申': "진지하고 무거운 분위기는 딱 질색이고 늘 새롭고 재밌는 자극만 쫓아다니는 자유로운 영혼입니다. 유머 감각과 센스가 터져서 무리 안에서 재간둥이 역할을 톡톡히 하지만, 책임감이나 진득함과는 거리가 한참 멉니다. 심각한 고민을 털어놔도 장난으로 받아치거나 분위기를 환기시켜버려 가끔 친구 속을 뒤집어 놓습니다. 약속을 잡아놔도 그날 기분에 따라 갑자기 취소하거나 다른 핑계를 대고 잠수 타버리는 충동적인 기행을 자주 벌입니다. 깊고 끈끈한 의리보다는 그때그때 즐겁게 노는 쿨한 파티원 느낌이 강해서, 너무 많은 걸 기대하고 의지하면 상처받기 딱 좋은 피터팬 콤플렉 친구입니다.",
        '丁酉': "친구를 만날 때도 분위기 좋은 카페, 줄 서는 맛집, 깔끔한 환경을 고집하는 극강의 까탈쟁이입니다. 대충 밥이나 먹자며 허름한 국밥집에 데려가면 표정 관리가 안 되며 은근히 불쾌해합니다. 자신이 받는 대우에 굉장히 민감해서 돈 낼 때 쪼잔하게 굴거나 매너 없이 행동하는 친구는 속으로 바로 아웃시켜 버립니다. 눈치가 무서울 정도로 빨라서 친구의 사소한 거짓말이나 가식은 0.1초 만에 꿰뚫어 보고 코웃음을 칩니다. 피곤할 정도로 기준이 높아서 인간관계를 넓게 가지진 못하지만, 한 번 내 바운더리에 들어온 '수준 맞는' 친구에게는 아낌없이 베푸는 우아한 귀족병 환자입니다.",
        '戊戌': "타협이란 걸 모르는 아집과 독선으로 똘똘 뭉친 고집불통 대마왕입니다. 친구가 내 방식이나 생각에 태클을 걸면 그 자리에서 논리 배틀을 신청해 끝을 봐야 직성이 풀립니다. 남의 말은 귓등으로도 안 듣고 자기가 무조건 맞다고 박박 우기는 통에 주변 친구들이 기가 빨려서 떨어져 나갑니다. 사생활을 침해하거나 선을 넘는 간섭을 극도로 혐오해서, 아무리 친한 베프라도 지켜야 할 철조망이 단단하게 쳐져 있습니다. 욱하는 성질을 주체 못 하고 쌍욕을 박으며 다 엎어버리는 파괴적인 다혈질이지만, 역설적이게도 자기 식구 하나만큼은 굶어 죽어도 지켜내는 상남자 의리를 가진 피곤한 폭군입니다.",
        '己亥': "겉보기엔 착하고 순둥순둥해서 무리 안에서 호구 잡히기 딱 좋아 보이지만, 실상은 머릿속에 슈퍼컴퓨터를 돌리고 있는 소름 돋는 실리주의자입니다. 친구들 사이에서 의견 충돌이 나면 절대 앞에 나서지 않고 관망하다가 나에게 제일 이득이 되는 쪽에 은근슬쩍 줄을 서는 기회주의적 성향이 다분합니다. 화가 나는 일이 있어도 대놓고 싸우지 않고 분위기와 상황을 교묘하게 조작해서 상대방이 스스로 백기 들게 만드는 음흉한 전술의 달인입니다. 진짜 속마음은 죽어도 꺼내 보여주지 않으면서 실속은 알뜰하게 다 챙겨 먹는, 알고 보면 제일 똑똑하고 무서운 너구리 같은 베프입니다.",
        '庚子': "친구의 헛소리나 모순을 귀신같이 잡아내서 뼈 때리는 논리로 압살해 버리는 무자비한 팩트 폭행범입니다. 위로나 공감을 바라고 고민을 털어놓았다간 '그건 네가 잘못한 건데?' 라며 차가운 팩트로 명치를 맞고 울면서 집에 갈 수 있습니다. 감정에 휩쓸리는 꼴을 혐오하고 언제나 냉철한 이성을 유지하려 애씁니다. 거짓말을 하거나 앞뒤가 다른 행동을 하는 순간 사람 취급도 안 하고 미련 없이 칼같이 손절 쳐버리는 결단력이 있습니다. 성격이 너무 차갑고 칼 같아서 정떨어질 때도 있지만, 객관적이고 정확한 조언이 필요할 때는 이 친구만한 알파고가 없습니다.",
        '辛丑': "아무리 속이 문드러지고 빡치는 상황에서도 표정 변화 하나 없이 꾹꾹 눌러 참는 극강의 포커페이스입니다. 친구가 아무리 서운하게 굴어도 그 자리에서 티를 안 내고 그냥 조용히 참아주기 때문에 남들은 이 친구가 보살인 줄 압니다. 하지만 사실은 고집이 황소 뺨치게 쎄고, 속으로는 상처와 원한을 곰탕처럼 푹푹 끓이고 있는 중입니다. 이미 끝난 인연이나 자신을 갉아먹는 쓰레기 같은 친구도 쉽게 끊어내지 못하고 미련하게 끌어안고 가는 고구마 100개 먹은 답답함이 있습니다. 평생을 참다가 한 번 폭발하면 그 누구도 말릴 수 없는 대재앙이 열리는 조용한 화산 같은 친구입니다.",
        '壬寅': "가만히 앉아있는 꼴을 못 보고 늘 새로운 자극과 사람을 찾아 쏘다니는 자유의 영혼입니다. 지적 호기심이 뛰어나서 다양한 주제로 대화하는 걸 즐기고, 입담이 좋아서 어딜 가나 모임의 분위기를 리드합니다. 오지랖이 태평양 같아서 주변 사람들의 고민 상담을 도맡아 하고 위기에 빠진 친구를 지나치지 못하는 홍반장 기질이 있습니다. 하지만 워낙 발이 넓고 역마살이 끼어서 한 친구에게 진득하게 올인하거나 깊은 소속감을 가지진 못합니다. 간섭받고 구속받는 걸 질색해서 연락을 귀찮아하고 제멋대로 잠수를 타기도 하는, 잡힐 듯 잡히지 않는 바람 같은 베프입니다.",
        '癸卯': "상대방의 감정 상태를 1초 만에 스캔해서 그에 맞춰 행동하는 극강의 눈치와 센스를 장착했습니다. 친구가 우울해 보이면 말없이 디저트를 사다 주고, 화가 나 보이면 납작 엎드려서 기분을 맞춰주는 등 거의 맞춤형 서비스 수준의 배려를 보여줍니다. 갈등 상황을 극도로 회피해서 자기가 잘못하지 않았어도 일단 사과하고 상황을 무마시키려는 유약한 면이 있습니다. 자존감이 다소 낮고 결정 장애가 심해서 메뉴 하나 고를 때도 '네가 먹고 싶은 거 먹자'며 끊임없이 의존하고 매달리는 피곤한 껌딱지 기질이 있습니다. 둥글둥글 착하지만 스스로 일어서는 법을 배워야 할 온실 속 화초 같은 친구입니다.",
        '甲辰': "누가 나한테 이래라저래라 명령하거나 가르치려 드는 걸 극도로 혐오하는 반항아 기질의 1인자입니다. 무리 안에서도 자기가 주도권을 쥐고 대장 노릇을 해야 직성이 풀리며, 다른 친구가 나대면 은근히 기강을 잡으려 듭니다. 자존심은 하늘을 찌르고 타협이란 걸 몰라서, 싸움이 나면 내가 100% 잘못했어도 절대 먼저 미안하다는 소리를 안 하는 똥고집의 소유자입니다. 오지랖이 넓어서 친구들 일에 훈수를 두다가 오히려 싸움을 키우기도 합니다. 제멋대로에 성질머리도 괴팍하지만 역설적이게도 친구가 곤경에 처하면 빚을 내서라도 도와주는 앞뒤 안 가리는 폼생폼사 의리파입니다.",
        '乙巳': "숨만 쉬어도 사람을 끌어당기는 기묘한 매력과 미친 입담으로 어딜 가나 시선 강탈을 하는 인싸 중의 인싸입니다. 분위기 메이커 역할을 자처하며 남의 속마음을 귀신같이 읽어내서 가려운 곳을 긁어주는 요물 같은 처세술을 자랑합니다. 하지만 감정 기복이 미친 널뛰기 수준이라 아까까지 박장대소하며 놀다가도 자기 기분이 수틀리면 갑자기 표정이 썩어 들어가며 주변 사람들을 숨 막히게 만듭니다. 참을성이 없고 욱하는 성질에 필터링 없는 독설을 내뿜어 친구 마음에 대못을 박고는 금방 또 헤헤거리며 다가오는, 도저히 종잡을 수 없는 조울증 텐션의 매력적인 도른자(?)입니다.",
        '丙午': "자존심과 자아 비대가 태양계를 뚫고 나가는 천상천하 유아독존 스타일입니다. 모임에서 스포트라이트는 무조건 내가 받아야 하고, 내가 낸 의견이 묵살 당하면 불같이 화를 내며 판을 엎어버리는 파괴왕입니다. 기가 너무 쎄서 웬만한 친구들은 기가 빨려 옆에 오래 붙어있지도 못합니다. 마음에 안 드는 일이 생기면 뒤에서 꿍꿍 앓지 않고 그 자리에서 쌍욕을 섞어가며 사이다 팩폭을 날려버리는 다혈질이지만, 다음 날이면 기억 리셋이 되어 언제 싸웠냐는 듯 쿨하게 인사하는 붕어 기억력의 소유자입니다. 맞추긴 더럽게 힘들지만 뒤끝 하나는 세계 최고로 깔끔한 화끈한 골목대장입니다.",
        '丁未': "겉으로 보기엔 천사표에 배려의 아이콘 같지만, 속을 까보면 꼬장꼬장한 아집과 독기로 무장한 외유내강형 꼰대입니다. 남의 고민을 세상 진지하게 들어주고 맞춰주는 척하지만 속으로는 절대 자기 의견을 굽히지 않는 벽창호 같은 구석이 있습니다. 서운한 일이 생기면 그 자리에서 말하지 않고 가슴 속 장부에 꼼꼼히 적어뒀다가, 나중에 싸울 일이 생기면 3년 전 서운했던 일까지 끄집어내서 상대방의 혼을 쏙 빼놓는 뒤끝 작렬의 달인입니다. 화를 참다가 한 번 터지면 평소의 순한 모습은 온데간데없이 독설을 쏟아내는 지킬 앤 하이드 같은 친구입니다.",
        '戊申': "말 한마디를 시키면 대답이 돌아오기까지 세월아 네월아 속이 터지는 무뚝뚝함의 결정체입니다. 친구가 옆에서 징징대고 감정 호소를 해도 바위처럼 무반응이어서 상대를 미치게 만듭니다. 감정이나 낭만 따위는 개나 줘버렸고 오로지 효율, 실리, 현실성만 따지는 지독한 계산기입니다. 생일 선물로 예쁜 쓰레기를 주면 진심으로 정색하며 현찰이나 기프티콘을 요구할 정도로 감성이 메말랐습니다. 입만 산 가벼운 우정은 극혐하며, 연락은 1년에 두어 번 해도 큰돈이 필요하거나 위기 상황일 때 말없이 통장에 거금을 쏴주는 식으로 애정을 증명하는 상남자/상여자 식 우정의 표본입니다.",
        '己酉': "무리에 섞여 아무 말 없이 웃고 있는 것 같지만 눈알은 쉴 새 없이 돌아가며 친구들의 약점과 성향을 데이터베이스화하고 있는 소름 돋는 관찰자입니다. 눈치가 미치도록 빠르고 계산이 칼 같아서 나한테 이득이 되는 놈과 짐이 되는 놈을 기가 막히게 분리수거합니다. 호구 잡히는 걸 죽기보다 싫어해서 더치페이는 1원 단위까지 칼같이 나눠야 직성이 풀립니다. 싸움이 나면 흥분하지 않고 상대방의 가장 아픈 콤플렉스와 모순점만 정밀 타격하여 반박 불가 상태로 만들어버리는 잔인한 언변술의 달인입니다. 정을 주긴 어렵지만 같은 편에 서면 가장 든든하고 똑똑한 참모가 되어줄 친구입니다.",
        '庚戌': "세상을 흑백 논리로만 바라보며 내 편이 아니면 무조건 적으로 간주하는 살벌한 원칙주의자입니다. '친구면 무조건 믿어야지'라는 맹목적인 의리와 폼생폼사에 죽고 사는 진짜베기 쌈닭입니다. 한 번 내 바운더리에 들어온 내 새끼는 누가 건드리면 눈 뒤집혀서 대신 패주는(?) 든든함이 있지만, 그만큼 친구가 나를 속이거나 배신하면 그 자리에서 인간관계를 박살 내고 영구 제명시켜버립니다. 타협이나 융통성이라곤 1도 없고 꼰대 기질이 다분해서 말싸움이 시작되면 벽에다 대고 얘기하는 기분이 들게 만듭니다. 의리 하나 빼면 시체인 답답하지만 진국인 친구입니다.",
        '辛亥': "우아하고 세련된 라이프스타일에 미쳐서 조금이라도 지저분하거나 촌스러운 상황을 견디지 못하는 극강의 결벽주의자입니다. 거지 근성, 구질구질한 하소연, 예의 없는 행동을 하는 친구를 보면 벌레 보듯 혐오하며 소리 없이 손절합니다. 친구 사이에서도 적당한 존중과 품격 있는 대우를 원하며, 내가 잘해준 만큼 상대방도 센스 있게 보답해 주길 바라는 바라는 계산적인 면이 다분합니다. 말솜씨가 화려하고 연기력이 출중해서 가식적인 리액션의 달인이기도 합니다. 기준이 너무 높아서 주변에 진짜 맘 터놓는 친구는 씨가 말라가는 피곤한 완벽주의자입니다.",

            if(headerBtn) { headerBtn.innerText = "로그인 / 가입"; headerBtn.onclick = openLogin; }
        }
    });

    window.realGoogleLogin = function() { signInWithPopup(auth, googleProvider).then(() => { closeLogin(); }).catch(console.error); }
    window.realKakaoLogin = function() { const kakaoProvider = new OAuthProvider('oidc.kakao'); signInWithPopup(auth, kakaoProvider).then(() => { closeLogin(); }).catch(console.error); }
</script>
</body>
