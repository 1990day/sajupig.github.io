<script>
    function openLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function closeLogin() { document.getElementById('loginOverlay').style.display = 'none'; }

    // ==========================================================
    // 🚨 [필수] 결제 우회 방지 철통 보안 코드 (Kill Switch 작동)
    // ==========================================================
    const urlParams = new URLSearchParams(window.location.search);
    const paymentKey = urlParams.get('paymentKey'); 
    const meYear = sessionStorage.getItem('me_year'); 
    const youYear = sessionStorage.getItem('you_year'); 
    const orderId = urlParams.get('orderId') || '현장결제';

    if (!paymentKey || paymentKey === '') {
        alert("정상적인 결제 내역이 확인되지 않았습니다! 결제 페이지로 이동합니다.");
        document.body.style.display = "none"; 
        window.location.replace("reunionpig.html");
        throw new Error("결제 미확인 차단"); 
    } else if (!meYear || !youYear) {
        alert("사주 정보가 만료되었습니다. 결제 페이지에서 다시 입력해주세요!");
        document.body.style.display = "none";
        window.location.replace("reunionpig.html");
        throw new Error("정보 만료 차단");
    }
    // ==========================================================

    const elementMap = {
        '甲': '木', '乙': '木', '寅': '木', '卯': '木',
        '丙': '火', '丁': '火', '巳': '火', '午': '火',
        '戊': '土', '己': '土', '辰': '土', '戌': '土', '丑': '土', '未': '土',
        '庚': '金', '辛': '金', '申': '金', '酉': '金',
        '壬': '水', '癸': '水', '亥': '水', '子': '水'
    };

    const colorClasses = {
        '木': 'c-wood', '火': 'c-fire', '土': 'c-earth', '金': 'c-metal', '水': 'c-water'
    };

    function getCharHtml(char) {
        if (!char || char === 'unknown') return "?";
        const el = elementMap[char];
        return `<span class="${colorClasses[el]}">${char}</span>`;
    }

    const iljuPersonality = {
        '甲子': "이별을 맞이했을 때 겉으로는 최대한 담담하고 이성적인 태도를 유지하려 애쓰는 타입입니다. 하지만 혼자만의 시간이 되면 과거의 대화와 상황들을 끊임없이 복기하며 이별의 근본적인 원인이 무엇인지 아주 깊이 분석하는 완벽주의적 성향이 있습니다. 자존심이 매우 강하고 스스로의 감정을 통제하려는 의지가 커서, 아무리 속으로 그리워해도 먼저 매달리거나 연락하는 일은 드뭅니다. 그러나 마음 깊은 곳에는 상대방에 대한 따뜻한 정과 이해심이 남아있기 때문에, 상대가 과거의 갈등을 논리적으로 풀고 다가온다면 다시 한번 마음의 문을 열어줄 수 있는 외유내강의 기질을 지녔습니다.",
        '乙丑': "연애 과정에서 상대방에게 헌신하고 많은 것을 양보하는 성향이 강해, 이별 후의 상실감과 마음의 상처를 가장 깊게 체감하는 부류입니다. 본인이 쏟았던 정성과 노력만큼 관계가 유지되지 못한 것에 대해 짙은 아쉬움과 은근한 보상 심리를 갖게 됩니다. 겉으로는 관계를 정리한 듯 보이지만, 마음 한편에는 상대방이 언제든 돌아올 수 있도록 여지를 남겨두는 여린 구석이 있습니다. 하지만 재회를 하더라도 과거에 자신이 서운했던 감정들을 완전히 잊지 못해, 무의식적으로 방어적인 태도를 취하거나 지난 일들을 조심스럽게 꺼내며 확인받으려 할 수 있습니다.",
        '丙寅': "감정의 표현이 솔직하고 열정적이었던 만큼, 이별 직후에는 끓어오르는 감정을 감추지 못하고 크게 힘들어하며 주변에 감정을 쏟아내는 경향이 있습니다. 그러나 슬픔에 잠겨있는 시간은 의외로 길지 않으며, 특유의 밝고 긍정적인 에너지로 빠르게 일상에 적응하고 새로운 사람들과의 교류를 통해 상처를 잊으려 노력합니다. 헤어진 연인이 다시 다가온다면 특유의 친화력으로 반갑게 맞이할 수는 있으나, 과거의 무겁고 진지했던 연애 패턴으로 다시 묶이는 것에는 강한 부담을 느껴 일정한 거리를 두려 할 확률이 높습니다.",
        '丁卯': "연애하는 동안 상대방의 미세한 감정 변화와 분위기를 누구보다 예민하게 캐치하고 맞춰주려 노력했던 타입입니다. 그렇기에 이별 후에도 상대방의 일상적인 안부나 SNS의 작은 변화 하나하나에 깊은 의미를 부여하며 밤새워 고민하는 등 섬세하고 여린 마음을 지니고 있습니다. 혼자 남겨지는 것에 대한 본원적인 공허함을 크게 느끼기 때문에, 상대방이 따뜻한 말 한마디와 진심 어린 태도로 다시 손을 내밀면 과거의 상처를 덮어두고 다시 관계에 의존하려는 성향이 강합니다. 스스로의 마음을 단단히 지키는 연습이 무엇보다 필요한 분입니다.",

        '己巳': "갈등과 부딪힘을 유연하게 피해 가는 처세술이 뛰어나, 이별의 순간에도 크게 얼굴을 붉히거나 극단적인 감정 싸움을 피하고 비교적 평화롭게 상황을 정리하려 애쓰는 타입입니다. 겉보기에는 상처 없이 쿨하게 이별을 받아들인 것 같지만, 내면에서는 이미 이 관계가 자신에게 주는 심리적, 현실적 의미를 매우 냉철하게 계산하고 정리를 마친 상태입니다. 이별 후에도 상대방을 칼같이 끊어내기보다는, 인간적인 매너를 지키며 적당한 안부를 묻는 거리를 유지하여 상대에게 묘한 미련을 남기게 하는 영리하고 유연한 대처 능력을 지녔습니다.",
        '庚午': "연인 사이의 신뢰와 지켜야 할 선을 명확하게 규정하고 이를 중요시하는 원칙주의자입니다. 이별의 원인이 신뢰의 훼손이나 선을 넘는 행동에 있었다면, 단 한 치의 미련도 남기지 않고 아주 차갑고 단호하게 관계를 끊어내는 냉철함을 보여줍니다. 감정에 호소하거나 과거의 정을 들먹이며 매달리는 태도를 성숙하지 못하다고 생각하여 스스로도 그런 행동을 철저히 배제합니다. 자신이 내린 결정을 번복하는 것은 스스로의 가치관을 부정하는 일이라 여기므로, 이분이 한 번 돌아선 마음을 다시 돌리기 위해서는 기적에 가까운 노력과 논리적인 설득이 필요합니다.",
        '辛未': "자신만의 미적 기준과 삶의 가치관이 뚜렷하여 연애 중에도 상대방이 그 기준에 부합하는지 내심 깐깐하게 관찰하고 평가하던 성향입니다. 이별 후에는 슬픔에 빠지기보다는 상대방의 행동이나 성향 중 자신과 맞지 않았던 부분들을 복기하며, 이별이 매우 합리적이고 당연한 수순이었다고 스스로를 설득하고 방어합니다. 상처받는 것에 대한 두려움이 커서 절대 먼저 속마음을 내비치거나 연락하는 일이 없으며, 완벽을 추구하는 성향 탓에 상대방이 이전보다 훨씬 더 성숙하고 발전된 모습을 보여주지 않는 이상 과거의 관계로 돌아가려 하지 않습니다.",
        '壬申': "특유의 유연함과 넓은 대인 관계를 바탕으로 이별의 슬픔에 깊게 매몰되지 않고 금세 새로운 환경과 사람들에게 녹아드는 자유로운 영혼의 소유자입니다. 연애가 주는 무거운 책임감이나 서로를 구속하는 딥한 관계에서 벗어난 해방감을 은근히 즐기기도 합니다. 헤어진 연인이 감정적으로 무겁게 다가오거나 질척거리는 모습을 보이면 심리적인 압박감을 느껴 더욱 멀리 달아나려 합니다. 하지만 본인의 감정이 여유롭거나 문득 과거의 추억이 떠오를 때는, 아무런 앙금 없이 가볍고 편안한 친구처럼 먼저 연락을 건네기도 하는 예측 불가능한 매력을 지녔습니다.",
        '癸酉': "상대방의 마음이 식어가는 과정이나 관계의 미세한 균열을 누구보다 빠르고 예리하게 직감하고, 감정이 더 다치기 전에 스스로 관계를 정리할 수 있는 차가운 이성과 직관력을 지녔습니다. 이별의 순간에 상대방이 감정적인 핑계나 변명을 늘어놓아도 흔들림 없이 상황의 핵심만을 찌르며 단호하게 돌아서는 맺고 끊음이 확실합니다. 자신의 고유한 세계와 가치관을 무엇보다 소중하게 여기기 때문에, 한 번 결이 맞지 않다고 판단하여 도려낸 인연과는 웬만해서는 다시 에너지를 섞으려 하지 않는 고고하고 철저한 성향입니다.",
        '甲戌': "자신이 내 사람이라고 여긴 연인에게는 묵묵한 책임감과 깊은 의리로 헌신했던 듬직한 바위 같은 분입니다. 그렇기에 이별을 맞이했을 때 겉으로 요란하게 슬퍼하지는 않지만, 끝까지 인연을 지켜내지 못했다는 깊은 책임감과 자책감을 홀로 무겁게 짊어집니다. 상대방의 배신이나 가벼운 행동으로 이별하게 된 것이라면 자신이 쏟은 신뢰가 부정당했다는 생각에 두 번 다시 마음을 열지 않습니다. 그러나 오해나 상황적인 문제로 헤어졌다면, 가슴 속 깊은 곳에는 여전히 상대를 아끼는 마음이 남아있어 진심 어린 사과와 책임감 있는 태도에는 흔들릴 수 있는 진국입니다.",
        '乙亥': "관계에서 발생하는 피로도와 극단적인 감정의 충돌을 극도로 피하고 싶어 하는 평화주의자입니다. 이별의 순간에도 얼굴을 붉히며 싸우기보다는, 점진적으로 거리를 두거나 침묵을 선택하며 자신의 내면을 보호하려는 방어적인 태도를 보였을 확률이 높습니다. 이별 후에도 자신의 진짜 슬픔과 아쉬움은 철저히 숨긴 채 혼자만의 동굴에서 감정을 갈무리하며 시간을 보냅니다. 상대방에게 매정하게 대하지는 않지만 그렇다고 속마음을 명확히 보여주지도 않기 때문에, 상대방 입장에서는 이 사람의 진짜 의중과 재회 가능성을 가늠하기가 가장 어려운 타입입니다.",
        '丙子': "사회생활에서는 누구보다 밝고 쾌활한 에너지를 뿜어내지만, 연애에 있어서는 상대방의 애정과 관심을 지속적으로 갈구하는 묘한 양면성을 지니고 있습니다. 이별 후에도 쿨한 척 일상을 보내지만, 혼자 있을 때는 상대방이 나 없이 잘 지내는 것은 아닌지 끊임없이 궁금해하고 은근한 소유욕에 시달립니다. 자신의 존재감을 상대방에게 각인시키고 싶어 하는 심리가 남아있어, 이별 후에도 SNS나 간접적인 방식을 통해 자신의 소식을 은근히 알리며 상대의 반응을 살피고 여지를 열어두려는 섬세하고도 복잡한 감정선의 소유자입니다.",
        '丁丑': "연애하는 동안 자신의 감정보다는 상대방의 상황과 상처를 더 많이 살피고 배려하며 헌신했던 따뜻하고 인내심 깊은 성향입니다. 이별을 맞이하면 상대방을 탓하기보다는 내가 더 잘해주지 못해서, 내가 부족해서 관계가 끝났다고 자책하며 모든 슬픔을 혼자 떠안으려는 짠한 모습을 보니다. 본인이 받은 상처가 큼에도 불구하고 상대방이 힘들다고 다가오면 모질게 쳐내지 못하고 또다시 마음을 내어줄 위험이 매우 큽니다. 스스로의 가치를 지키기 위해 상대방에 대한 무조건적인 연민을 거두고 자신을 먼저 돌보는 단호함이 절실히 요구됩니다.",
        '戊寅': "자신의 삶을 주도적으로 이끌어가며 연애에서도 상대방을 리드하고 보호하려는 대장부 같은 기질을 지녔습니다. 이별이라는 상황 자체를 내 통제력을 벗어난 예기치 못한 실패로 받아들여, 슬픔보다는 자존심의 상처와 묘한 분노를 먼저 느낍니다. 자신이 베풀었던 책임감과 애정이 제대로 평가받지 못했다는 괘씸함이 커서, 이별 후 먼저 연락을 취하며 고개를 숙이는 일은 자존심 상 절대 허락하지 않습니다. 상대방이 먼저 자신의 가치를 완벽하게 인정하고 존중하며 진심으로 굽히고 들어오지 않는 한, 재회의 문은 굳게 닫혀있습니다.",
        '己卯': "상황의 흐름을 빠르게 읽어내고 자신에게 불리한 상황을 부드럽게 모면하는 눈치와 처세가 매우 뛰어납니다. 이별을 직감하는 순간, 자신이 상처받거나 나쁜 사람이 되지 않도록 매우 자연스럽고 유연하게 관계의 거리를 두며 정리를 시작했을 것입니다. 헤어진 후에도 상대방을 매몰차게 끊어내어 원한을 사기보다는, 가끔 기분 좋은 안부를 주고받을 수 있는 적당하고 애매한 관계를 유지하는 데 탁월합니다. 겉으로는 재회의 여지가 있는 것처럼 여유롭게 굴지만, 내면에서는 이미 자신에게 실이 되는 관계라고 판단을 끝냈을 확률이 매우 높은 영리한 타입입니다.",
        '庚辰': "맺고 끊음이 식칼처럼 분명하고, 한 번 결심한 바는 주변의 시선에 흔들림 없이 강하게 밀어붙이는 결단력의 소유자입니다. 이별의 사유가 명확하다면 빙빙 돌려 말하거나 감정적으로 질척거리는 것을 극도로 혐오하여, 상대방의 잘못을 팩트로 짚어준 뒤 미련 없이 관계를 종료합니다. 한바탕 크게 다투고 헤어졌더라도 뒤끝이 없기 때문에 상대방을 미워하는 감정조차 빠르게 증발시켜 버립니다. 이미 자신의 기준에서 신뢰를 잃고 아웃된 사람에게는 두 번 다시 마음의 문을 열지 않는, 철벽보다 단단하고 견고한 이성의 소유자입니다.",
        '辛巳': "자신의 품위와 세련된 라이프스타일을 매우 중요하게 여기며, 연애 상대에게도 그에 걸맞은 교양과 태도를 은근히 요구하는 완벽주의 성향입니다. 이별 후에는 감정적인 슬픔에 허우적대기보다는, 상대방의 부족했던 점이나 맞지 않았던 가치관을 차분하게 복기하며 자신의 선택이 틀리지 않았음을 스스로 확인하며 안도합니다. 남들에게 보여지는 체면과 자존심을 목숨처럼 여기기 때문에, 이별 후에 전 연인에게 구차하게 매달리거나 아쉬운 소리를 하는 행동은 자신의 품격을 떨어뜨리는 일이라 생각하여 절대 하지 않습니다.",
        '壬午': "뛰어난 언변과 유머 감각으로 연애를 즐겁고 다이내믹하게 이끌어가지만, 관계가 무거워지거나 구속과 책임감이 강요되는 순간 극심한 답답함을 느끼는 자유로운 영혼입니다. 이별 후에도 특유의 사교성으로 금세 새로운 사람들과 어울리며 이별의 빈자리를 가볍게 채워나가는 능력을 지녔습니다. 만약 전 연인이 지나치게 진지하고 무거운 태도로 재회를 요구하며 다가오면, 본능적으로 부담감을 느끼고 유머나 애매한 태도로 상황을 스무스하게 회피해 버립니다. 심각한 대화보다는 가벼운 텐션으로 접근해야 마음을 여는 타입입니다.",
        '癸未': "타인의 아픔에 깊이 공감하고 연애 과정에서 상대방의 상처를 따뜻하게 보듬어주려 노력했던 이타적인 성품의 소유자입니다. 이별 후 자신이 받은 상처보다 홀로 남겨진 상대방이 힘들어하지는 않을까 걱정하는 여리고 따뜻한 마음을 가졌습니다. 그러나 내면에는 자신이 베푼 만큼 깊은 사랑을 돌려받고 싶어 하는 애정 결핍의 요소가 숨어 있어, 상대방이 아파하거나 그리워하는 모습을 보이면 자신의 상처를 잊고 다시 구원자가 되려는 위험한 연민을 느낍니다. 과거의 패턴을 반복하지 않으려면 뼈아픈 이성적 판단이 반드시 필요합니다.",
        '甲申': "스스로에 대한 프라이드가 높고, 연애 관계에서도 자신이 더 우위에 있거나 더 인정받아야 마음이 편안한 강한 승부욕을 지니고 있습니다. 이별 후 상대방이 자신을 금방 잊고 잘 지내는 모습을 보면, 이별 자체의 슬픔보다 자존심의 스크래치와 질투심을 훨씬 더 강하게 느낍니다. 이별의 책임 역시 상대방이 자신의 가치를 다 담아내지 못했기 때문이라고 방어 기제를 펼칩니다. 상대방이 완벽하게 고개를 숙이고 자신의 가치를 치켜세워주며 다가오지 않는 이상, 본인의 알량한 자존심을 먼저 꺾고 재회를 요구하는 일은 결코 일어나지 않습니다.",
        '乙酉': "사고방식이 매우 치밀하고 논리적이며, 연애를 할 때도 서로의 밸런스와 상대방의 태도를 날카로운 잣대로 검열하던 성향입니다. 이별을 맞이했을 때 감정의 소용돌이에 빠지기보다는, 그동안의 연애 과정에서 발생했던 감정적, 물질적 손익을 매우 차갑고 냉정하게 계산하여 상황을 정리합니다. 당신이 흘리는 눈물이나 감정적인 호소에는 눈 하나 깜짝하지 않고 차가운 팩트로 대응할 수 있는 이성을 지녔습니다. 하지만 상대방이 자신의 깐깐한 기준을 완벽하게 충족시킬 만큼 변화된 모습을 증명한다면, 매우 현실적인 관점에서 재회를 다시 검토할 수 있는 실리주의자입니다.",
        '丙戌': "평소에는 넉넉한 마음과 의리로 연인에게 아낌없이 베풀고 다정다감하지만, 자신의 진심이 기만당하거나 배신을 당했다고 느끼는 순간 숨겨진 불같은 다혈질 기질이 폭발하는 성격입니다. 이별 과정에서 큰 상처를 받았다면 다시는 안 볼 사람처럼 매몰차게 관계를 끊어내고 극단적인 원망을 쏟아내지만, 화가 가라앉고 홀로 남겨지면 가장 깊은 상실감과 우울감에 빠져드는 여린 속마음을 지니고 있습니다. 감정의 진폭이 커서 사소한 오해로 헤어진 것이라면, 겉으로는 화를 내도 속으로는 여전히 상대를 잊지 못해 끙끙 앓고 있을 확률이 매우 높은 순정파입니다.",
        '丁亥': "상대방의 마음을 편안하게 해주는 부드러운 화법과 깊은 공감 능력을 갖추었으나, 그 이면에는 상황을 매우 냉철하게 분석하고 자신에게 가장 안전한 포지션을 찾는 고도의 이성이 자리 잡고 있습니다. 갈등 상황에서 직접적인 충돌을 피하고 대화를 통해 부드럽게 이별을 유도하여, 상대방으로 하여금 자연스럽게 관계가 정리되었다고 믿게 만드는 세련된 처세술을 보여줍니다. 겉보기에는 매우 다정하고 미련이 남은 것처럼 보여 전 연인이 쉽게 다가갈 수 있을 것 같지만, 내면의 결정은 이미 콘크리트처럼 단단하게 굳어있어 절대 빈틈을 내주지 않습니다.",
        '戊子': "감정을 말로 표현하는 것에 서툴러 연애 내내 무뚝뚝하고 건조한 태도로 일관하여 상대방을 서운하게 만들었을 가능성이 큽니다. 이별의 순간에도 큰 감정의 동요를 보이지 않아 차가운 사람처럼 보였겠지만, 사실 가슴 속에는 상대방에 대한 깊은 미련과 묵직한 책임감을 오랫동안 묻어두고 살아갑니다. 화려한 말로 상대를 붙잡거나 로맨틱한 재회를 시도하지는 못하지만, 상대방이 현실적인 어려움에 처했을 때 뒤에서 조용히 나타나 묵묵히 문제를 해결해 주는 방식으로 변치 않은 자신의 진심을 증명하려는 우직함을 지녔습니다.",
        '己丑': "한 번 마음을 준 사람에게는 웬만한 단점과 상처를 묵묵히 감내하며 인내하려는 소와 같은 우직함을 가졌습니다. 이별에 이르렀다는 것은 그 엄청난 인내심의 한계치가 마침내 폭발했음을 의미합니다. 변화를 두려워하고 보수적인 성향 탓에 한 사람을 마음에서 완벽히 지워내는 데 엄청난 시간이 걸립니다. 헤어진 지 오랜 시간이 지나도 과거의 추억과 묵은 서운함을 마음속 깊은 곳에 차곡차곡 쌓아두고 버리지 못해, 겉으로는 담담해 보여도 속으로는 가장 오랫동안 이별의 후유증을 앓고 살아가는 안타까운 타입입니다.",
        '庚寅': "생각하는 바를 즉각 행동으로 옮겨야 직성이 풀리는 역동적이고 불같은 에너지를 지녔습니다. 이별의 순간에도 자신의 분노나 감정을 숨기지 않고 여과 없이 쏟아내며 관계를 화끈하게 끝내버렸을 가능성이 높습니다. 그러나 특유의 투명하고 뒤끝 없는 성격 덕분에 며칠만 지나면 화가 눈 녹듯 사라지고, 자기가 먼저 불같이 화를 내놓고도 아무렇지 않게 안부를 묻는 연락을 취할 수 있는 예측 불가한 쿨함을 가졌습니다. 체면을 구기는 것을 싫어해 차이는 것은 못 견디지만, 본인의 감정에 솔직하여 마음이 동하면 직진해서 들이대는 용기를 가졌습니다.",
        '辛卯': "자신만의 고상한 취향과 예민한 미적 감각을 지니고 있어, 연애 중에도 상대방의 거친 매너나 부족한 센스를 견디지 못하고 속으로 끊임없이 마이너스 채점을 하던 성향입니다. 한 번 자신의 기준에서 벗어나 정이 떨어지는 행동을 발견하면, 단 한 번의 기회도 주지 않고 차갑게 돌아서며 연락을 완벽히 차단해버립니다. 상대방이 아무리 감정적으로 매달리고 애원해도, 자신의 깐깐한 심사 기준을 통과하지 못해 탈락한 인연에게는 작은 동정심이나 여지조차 주지 않는 매우 도도하고 서늘한 이별 방식을 고수합니다.",
        '壬辰': "관계의 주도권을 자신이 쥐고 이끌어가야만 직성이 풀리는 강한 리더십과 지배욕을 지닌 분입니다. 연인이 자신의 통제에서 벗어나려 하거나 자존심에 상처를 입혔을 때 강하게 반발하며 이별을 불사했을 것입니다. 이별 후에도 승부욕이 강해, 상대방이 나보다 먼저 다른 사람을 만나 행복해하는 것을 쉽게 용납하지 못하는 묘한 질투심을 품고 있습니다. 자신이 찼든 차였든, 과거의 연인이 자신을 잊지 못하고 아쉬워하는 모습을 확인하고 싶어 하는 권력 지향적인 심리가 기저에 깔려 있어 재회 과정에서도 팽팽한 기싸움을 유도합니다.",
        '癸巳': "어떤 불편한 상황이나 이별의 위기 속에서도 부드러운 미소와 재치 있는 말 한마디로 긴장을 스르르 녹여버리는 탁월한 사회적 유연성을 지녔습니다. 갈등을 정면으로 마주하기보다는 교묘하게 논점을 흐리고 부드럽게 상황을 모면하여, 결국 상대방이 지쳐서 먼저 이별을 고하게 만드는 고단수의 심리전을 펼치기도 합니다. 헤어진 후에도 상대방의 연락처를 완전히 지우지 않고 애매한 거리감을 유지하며 좋은 사람으로 남으려 애씁니다. 자신이 완전히 매달려 손해를 보는 상황은 절대 만들지 않으며, 상대방이 스스로 다가오게끔 판을 짜는 영리함이 돋보입니다.",
        '甲午': "어디서든 스포트라이트를 받는 것을 즐기며 열정적이고 역동적인 연애를 주도하지만, 그만큼 감정의 기복도 크고 즉흥적인 성향이 강합니다. 아주 사소한 오해나 서운함에도 불같이 화를 내며 그 자리에서 이별을 선언했다가, 분노가 가라앉으면 금세 후회하며 상대방에게 다시 다가가는 감정의 롤러코스터를 수없이 반복했을 수 있습니다. 인내심이 부족하고 진득하게 감정을 다스리는 것에 서툴러 이별의 슬픔도 길게 가져가지 않으며, 금세 새로운 흥미와 자극을 찾아 훌훌 떠나버릴 수 있는 예측 불가능하고 톡톡 튀는 성향을 지녔습니다.",
        '乙未': "겉으로는 상대방의 의견에 순순히 따르고 헌신하는 다정한 연인처럼 보이지만, 내면에는 자신이 원하는 방향으로 관계를 이끌어가고자 하는 매우 강인하고 끈질긴 집념이 자리 잡고 있습니다. 이별의 과정에서도 자신이 상처받은 피해자의 위치를 선점하여 상대방에게 깊은 죄책감을 심어주고, 주변의 동정 여론을 자신의 편으로 만드는 치밀함을 보여줍니다. 겉보기와 달리 인내심과 방어 기제가 매우 강해, 한 번 받은 상처나 원한을 가슴 깊이 새겨두고 오랜 시간이 지나더라도 결코 쉽게 잊지 않는 외유내강의 기질이 있습니다.",
        '丙申': "연애가 주는 진지한 책임감이나 서로의 일상을 구속하는 무거운 분위기를 극도로 견디지 못하는 자유롭고 유쾌한 영혼입니다. 관계에 심각한 갈등이나 위기가 닥쳤을 때 정면으로 해결하기보다는 가벼운 농담이나 회피를 통해 상황을 모면하려다 결국 상대방의 신뢰를 잃고 이별을 맞이했을 확률이 높습니다. 이별 후에도 깊은 슬픔에 잠기기보다는 본연의 낙천성으로 빠르게 일상에 복귀하여 자유를 만끽합니다. 전 연인이 진지하고 무거운 태도로 눈물 흘리며 재회를 요구하면 극도의 부담감을 느끼고 더욱 멀리 회피하려는 면이 있습니다.",
        '丁酉': "연애의 사소한 과정 하나하나에도 높은 기준과 세련된 매너를 요구하며 상대방을 세심하게 관찰하던 예민하고 깐깐한 완벽주의자입니다. 자신의 배려와 헌신을 상대방이 당연하게 여기거나 작은 실수를 반복하면, 겉으로 화를 내기보다는 속으로 차곡차곡 마이너스 점수를 매기다 어느 순간 냉정하게 마음의 문을 걸어 잠급니다. 통찰력이 매우 뛰어나 상대방의 거짓말이나 변명, 식어버린 진심을 0.1초 만에 꿰뚫어 보고 이성적인 판단을 내립니다. 이별 후에도 스스로 설정한 눈높이가 높아 웬만한 다가옴에는 흔들리지 않지만, 상대가 완벽하게 변화된 모습을 증명한다면 다시 기회를 줄 의향은 있습니다.",
        '戊戌': "자신의 신념과 가치관이 바위처럼 확고하여, 연애 중에도 상대방과 의견이 충돌하면 타협하기보다는 자신의 방식이 옳다고 끝까지 밀어붙이던 고집스러운 기질이 다분합니다. 내 프라이버시나 영역을 침범하는 과도한 간섭을 극도로 혐오하여, 상대방이 선을 넘었다고 판단하면 거친 분노를 표출하며 관계의 벽을 세워버립니다. 한 번 이별을 결심하면 그 결정을 뒤집는 것을 대단한 자존심 상실로 여겨 요지부동입니다. 그러나 이 강인한 겉모습 이면에는 한 번 맺은 인연에 대한 깊고 진중한 의리가 숨어있어, 뒤에서는 상대를 조용히 염려하기도 합니다.",
        '己亥': "겉으로는 둥글둥글하고 상대방에게 잘 맞춰주는 배려 깊은 연인 같지만, 내면에서는 이 관계가 자신에게 주는 감정적, 현실적 손익을 쉴 새 없이 정밀하게 계산하고 있는 완벽한 실리주의자입니다. 이별의 낌새가 보일 때 자신이 먼저 악역을 자처하기보다는 조용히 상황을 관망하다가, 본인에게 가장 타격이 적고 유리한 타이밍에 스무스하게 관계에서 발을 빼는 기회주의적 처세술이 뛰어납니다. 진짜 속마음이나 상처는 절대 밖으로 드러내지 않으며, 헤어지는 순간까지도 실속은 다 챙기면서 예의 바른 사람으로 기억되려 하는 영리함을 지녔습니다.",
        '庚子': "상대방의 감정적인 호소나 논리에 맞지 않는 변명, 가식적인 행동을 귀신같이 잡아내어 이성적인 팩트로 압도해버리던 냉철한 성향입니다. 연인이 힘든 감정을 토로할 때도 공감과 위로보다는 문제의 원인을 차갑게 지적하고 해결책만을 제시하려 하여 상대방에게 섭섭함을 주었을 것입니다. 감정에 휩쓸려 매달리거나 이별을 부정하는 행위를 성숙하지 못하다고 생각하므로, 헤어진 후 상대방이 눈물로 호소하며 다가오면 일말의 흔들림 없이 이성적으로 선을 긋고 관계를 차단해 버리는 단호한 결단력을 발휘합니다.",
        '辛丑': "연애 과정에서 상대방이 이기적으로 굴거나 서운하게 행동해도 겉으로는 화 한 번 내지 않고 묵묵히 다 인내하며 속으로 삼키던 뛰어난 포커페이스입니다. 하지만 이것은 상황을 쿨하게 넘긴 것이 아니라, 그 모든 서운함과 감정을 내면의 깊은 곳에 차곡차곡 쌓아두고 있었던 것입니다. 묵묵히 참아주다가 이별의 순간에 인내의 임계점이 폭발하면, 지난 수년간의 서운했던 일화들을 날짜와 시간까지 정확히 끄집어내어 상대방이 반박할 수 없게 만드는 조용하고 무서운 성질을 숨기고 있습니다.",

            if(headerBtn) { headerBtn.innerText = "내정보"; headerBtn.onclick = function() { location.href = 'index.html?tab=myinfo'; }; }
            
            // 내 정보 화면에서 [결과 다시보기]를 위해 재회궁합 영수증 저장! (itemType을 reunionpig로 지정)
            if (orderId && paymentKey && paymentKey !== 'revisit') {
                try {
                    const purchaseRef = doc(db, "users", user.uid, "purchases", orderId);
                    await setDoc(purchaseRef, {
                        orderId: orderId,
                        itemName: "돼지 재회 사주",
                        itemType: "reunionpig",
                        purchaseDate: new Date().toISOString(),
                        sajuInfo: {
                            year: sessionStorage.getItem('me_year'),
                            month: sessionStorage.getItem('me_month'),
                            day: sessionStorage.getItem('me_day'),
                            time: sessionStorage.getItem('me_time'),
                            gender: sessionStorage.getItem('me_gender'),
                            calendar: sessionStorage.getItem('me_calendar'),
                            youYear: sessionStorage.getItem('you_year'),
                            youMonth: sessionStorage.getItem('you_month'),
                            youDay: sessionStorage.getItem('you_day'),
                            youTime: sessionStorage.getItem('you_time'),
                            youGender: sessionStorage.getItem('you_gender'),
                            youCalendar: sessionStorage.getItem('you_calendar')
                        }
                    }, { merge: true });
                    console.log("결제 내역(재회 사주) 저장 완료");
                } catch (e) { console.error("영수증 저장 실패:", e); }
            }
        } else {
            if(headerBtn) { headerBtn.innerText = "로그인 / 가입"; headerBtn.onclick = openLogin; }
        }
    });

    window.realGoogleLogin = function() { signInWithPopup(auth, googleProvider).then(() => { closeLogin(); }).catch(console.error); }
    window.realKakaoLogin = function() { const kakaoProvider = new OAuthProvider('oidc.kakao'); signInWithPopup(auth, kakaoProvider).then(() => { closeLogin(); }).catch(console.error); }
</script>
