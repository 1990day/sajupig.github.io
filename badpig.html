    '乙酉': "신경질적이고 예민하기가 면도날 같아서, 곁에 있는 사람이 숨소리 하나 내는 것조차 조심하게 만드는 지독한 까탈스러움을 가졌습니다. 남의 아주 작은 실수 하나도 잊지 않고 적어두었다가 반드시 팩트 폭력으로 되돌려주는 잔인하고 집요한 성격입니다. 겉으론 연약해 동정심을 유발하지만, 내면은 자신의 안위를 위해서라면 남을 가차 없이 밟고 올라서는 차갑고 이기적인 승부욕으로 똘똘 뭉쳐 있습니다.",
    '丙戌': "감정 기복이 마치 롤러코스터 같아, 어제는 열정적으로 사랑을 맹세하다가도 오늘은 별것 아닌 일에 분노를 터뜨리는 통제 불능의 다혈질입니다. 뒷수습은 생각지도 않고 감정 내키는 대로 막말을 쏟아내어 평생 씻을 수 없는 상처를 남기고는 나중에야 후회하는 찌질한 패턴을 반복합니다. 대인배인 척 폼을 잡지만, 실제로는 타인의 사소한 비판 하나 쿨하게 넘기지 못하고 끝까지 앙갚음하려는 옹졸함을 품고 있습니다.",
    '丁亥': "생각의 미로에 갇혀 결단 내리기를 극도로 두려워하는 답답한 우유부단함의 표본입니다. 갈등이 생기면 정면으로 부딪혀 해결하려 하지 않고, 이리저리 핑계를 대며 상황을 회피하거나 잠수 타버리는 비겁한 대처 방식을 보입니다. 착한 사람 콤플렉스에 빠져 겉으로는 모두에게 좋은 사람인 척하지만, 속으로는 불만과 억울함을 겹겹이 쌓아두다 엉뚱한 곳에서 찌질하게 터뜨리는 소극적 공격성이 몹시 피곤합니다.",
    '戊子': "묵직하고 과묵한 겉모습과 달리, 머릿속으로는 남의 주머니를 털어 내 배를 불릴 궁리만 쉴 새 없이 돌아가는 치밀한 계산기입니다. 돈과 물질에 대한 집착이 상상을 초월하여 1원 한 푼 손해 보지 않으려는 이기적인 구두쇠 기질이 주변을 질리게 만듭니다. 타인에게 신뢰를 주는 척 포장하지만, 결국 모든 관계의 끝은 본인의 이득 챙기기로 귀결되는, 인간관계마저 비즈니스로 취급하는 차갑고 메마른 영혼입니다.",
    '己丑': "새로운 변화를 죽기보다 싫어하며, 낡은 생각과 아집에 사로잡혀 대화가 단 1분도 통하지 않는 숨 막히는 벽창호입니다. 남들이 다 아니라고 뜯어말려도 기어이 자신의 고집대로 밀어붙이다 일을 다 망쳐버리는 미련함의 끝을 보여줍니다. 속마음을 음침하게 숨기고 겉으로는 수용하는 척만 하다가 뒤통수를 치거나, 타인의 작은 흠결을 두고두고 곱씹으며 원망하는 징글징글한 뒤끝이 타인을 지치게 만듭니다.",
    '庚寅': "타인의 입장은 조금도 배려하지 않고 오직 힘과 목소리 크기로 상대를 찍어 누르려는 폭력적이고 과격한 독단주의자입니다. 자신의 방식이 무조건 옳다는 오만함에 빠져 있어, 조언을 건네는 사람마저 적으로 간주하고 물어뜯는 짐승 같은 성질머리를 가졌습니다. 참을성이라곤 1도 없어 눈앞의 장애물이 생기면 다 때려 엎어야 직성이 풀리며, 그 무모함 때문에 결국 소중한 사람들을 모두 잃고 자멸할 위험이 큽니다.",
    '辛卯': "남의 단점을 귀신같이 찾아내 차갑게 난도질하는 싸이코패스적 비판 능력을 가졌으나, 정작 본인을 향한 지적에는 방어벽을 치고 펄펄 뛰는 내로남불의 극치입니다. 너무나 날 선 결벽증 탓에 스스로도 피곤하게 살지만, 곁에 있는 사람의 멘탈마저 가루로 만들어버리는 인간 믹서기입니다. 타인에게 따뜻한 온기 한 번 내어주지 않는 이기적이고 차가운 성향으로 인해 결국은 아무도 다가오지 않는 얼음성 속에 갇히게 됩니다.",
    '壬辰': "스케일이 큰 대장부인 척하지만, 그 거대한 허세 이면에는 옹졸한 피해의식과 타인을 조종하려는 음흉한 권력욕이 똬리를 틀고 있습니다. 속마음을 좀처럼 드러내지 않고 이중, 삼중으로 꼬아 생각하여 사람을 끊임없이 시험하고 의심하는 피곤한 멘탈의 소유자입니다. 상황이 뜻대로 돌아가지 않으면 갑자기 깽판을 쳐서 판 자체를 엎어버리는 극단적이고 무책임한 파괴성을 지니고 있어 곁에 두기 매우 위험한 성향입니다.",
    '癸巳': "어디서나 이익을 좇아 기가 막히게 줄을 갈아타는 박쥐 같은 얍삽함과 기회주의적 처세술이 소름 돋게 발달해 있습니다. 겉으로는 부드럽게 웃으며 친절을 베풀지만, 그 모든 것은 결국 상대를 이용해 먹기 위한 치밀한 밑밥 깔기에 불과합니다. 책임져야 할 무거운 상황이 오면 누구보다 빠르게 남에게 덤탱이를 씌우고 꼬리를 자르는 비열함이 있어, 얕은 관계는 많아도 진정으로 당신을 믿어주는 사람은 없습니다.",
    '甲午': "생각이 떠오르면 앞뒤 재지 않고 일단 저지르고 보는 브레이크 고장 난 폭주 기관차로, 매사에 끈기라곤 바닥을 쳐서 제대로 끝맺는 일이 단 하나도 없는 프로 용두사미입니다. 감정 조절 기능이 상실되어 기분 내키는 대로 막말을 내뱉고 욱하는 성질 때문에 수시로 주변 사람들에게 깊은 상처를 남깁니다. 허세와 관종끼에 절여져 쓸데없는 일에 에너지를 낭비하다 정작 중요한 인생의 실속은 다 놓치는 헛똑똑이입니다.",
    '乙未': "겉으로는 환경에 잘 적응하는 온화한 척을 하지만, 뼛속까지 꼬여있는 삐딱한 시선으로 세상을 바라보며 불평불만을 입에 달고 사는 징그러운 염세주의자입니다. 남이 잘되는 꼴을 절대 쿨하게 축하하지 못하고 은근히 비꼬아 내리려는 자격지심이 매우 심각합니다. 문제가 생기면 절대 자신의 잘못을 반성하지 않고 환경 탓, 남 탓으로 돌리며 자기합리화의 성을 쌓고 숨어버리는 찌질한 회피 본능을 가졌습니다.",
    '丙申': "진지함과 무게감이라곤 눈 씻고 찾아봐도 없는 가벼운 깃털 같은 성격으로, 얄팍한 잔머리만 굴리며 이리저리 상황을 모면하려는 얍삽함이 주무기입니다. 깊이 있는 지식이나 노력 없이 얕은 임기응변으로 아는 척, 잘난 척을 일삼다 결국 실력이 뽀록나 큰 코 다치는 전형적인 허세꾼입니다. 쉽게 달아오르고 쉽게 식어버려 책임감 있는 관계나 업무를 전혀 소화해 내지 못하는 멘탈의 끈기가 심각하게 결여되어 있습니다.",
    '丁酉': "물질적인 조건과 화려한 겉모습에 병적으로 집착하여, 타인의 가치마저 돈과 외모로만 평가하는 천박하고 속물적인 마인드의 소유자입니다. 신경질적이고 까탈스러운 결벽증으로 주변을 숨 막히게 하며, 조금만 자기 기준에 못 미치면 가차 없이 사람을 베어버리는 잔인함을 가졌습니다. 나 자신만 고상하고 완벽하다는 재수 없는 선민의식에 빠져 정작 본인의 썩어가는 내면은 돌아보지 못하는 오만한 성향입니다.",
    '戊戌': "자신이 쌓아올린 좁고 편협한 경험칙만이 세상의 진리라고 믿어 의심치 않는 답답하고 숨 막히는 꼰대 독재자입니다. 융통성이라곤 전혀 찾아볼 수 없으며, 타인의 새로운 의견이나 변화를 자신에 대한 공격으로 간주하고 무조건 찍어 누르려 듭니다. 속에는 억눌린 분노와 아집이 꽉 차 있어 건드리면 폭발하는 화산과 같고, 한 번 틀어진 사람에게는 무덤까지 용서하지 않는 징그러운 뒤끝과 원한을 품고 살아갑니다.",
    '己亥': "의심병이 깊어 타인의 순수한 호의마저도 삐딱하게 해석하며 맨날 혼자만의 망상 속에서 음침한 소설을 쓰는 피곤한 성격입니다. 스스로 결단 내리는 것을 두려워해 이리저리 끌려다니다가 결국 나쁜 결과가 나오면 남 탓을 시전하는 비겁함을 가졌습니다. 앞에서는 수긍하는 척 조용히 있지만 뒤에서는 끊임없이 궁시렁거리며 불만을 토로하는 이중성 때문에 곁에 있는 사람의 멘탈을 천천히 갉아먹는 암적인 존재입니다.",
    '庚子': "타인의 감정에는 눈곱만큼도 공감하지 못하면서, 얼음장같이 차가운 논리로 팩트 폭격을 날리며 타인을 짓밟는 데서 묘한 우월감을 느끼는 냉혈한입니다. 오만방자하게 자신이 가장 똑똑하다고 착각하여 남들을 가르치려 들고 깔보는 재수 없는 태도가 뼛속까지 배어 있습니다. 인간관계마저 득실을 따지는 계산기로 전락시켜, 쓸모가 없다고 판단되면 가차 없이 끊어내는 잔혹함 탓에 진정한 내 편은 단 한 명도 남지 않게 됩니다.",
    '辛丑': "지독하고 질긴 똥고집과 세상을 비관적으로 바라보는 어두운 시선이 합쳐져 곁에 있는 사람마저 우울증에 걸리게 만드는 재앙 같은 멘탈입니다. 남의 작은 흠결을 잊지 않고 현미경으로 관찰하며 평생을 곱씹어대는 징글징글한 집요함과 원한의 끝판왕을 보여줍니다. 유연하게 상황을 넘기는 법을 몰라 스스로를 가시밭길로 몰아넣으면서도 자존심 때문에 끝까지 내가 맞다고 우기는 처절한 미련함을 안고 살아갑니다.",
    '壬寅': "입만 열면 우주라도 정복할 듯 번지르르하게 털어대지만, 막상 실천하라고 하면 손가락 하나 까딱하지 않는 구제 불능의 허풍쟁이이자 게으름뱅이입니다. 얕은 오지랖으로 남의 일에 사사건건 참견하여 분란을 조장하면서 정작 본인 앞가림은 처참한 수준입니다. 진득하게 하나를 파고들지 못하고 늘 새롭고 자극적인 것만 기웃거리다 인생의 황금기를 허송세월로 날려버리는 산만한 성인 ADHD 기질이 농후합니다.",
    '癸卯': "스스로 일어설 생각은 하지 않고 늘 타인에게 기생하여 에너지를 쪽쪽 빨아먹으려 드는 징그러운 의존성과 나약함의 결정체입니다. 아주 작은 스트레스에도 세상이 끝난 것처럼 징징거리며 타인의 동정심을 무기로 상대를 조종하려는 교활한 멘탈을 지녔습니다. 책임감이 바닥을 치기 때문에 힘든 일이 생기면 가장 먼저 도망치며, 나에게 이득이 되는 곳으로 철새처럼 옮겨 다니는 얍삽한 박쥐 본능이 충만합니다.",
    '甲辰': "대인배 코스프레를 하지만 실상은 모든 상황을 자신이 통제하고 군림해야만 직성이 풀리는 독재자적 아집으로 똘똘 뭉쳐 있습니다. 지나친 승부욕과 오만함으로 타인의 자존감을 짓밟으며 억지로 굴복시키려다 결국 조직과 관계를 파탄으로 몰고 가는 파괴적인 성향입니다. 겉으로는 의리와 명분을 앞세우지만, 이면에는 지독한 물질적 탐욕과 성공에 대한 집착이 도사리고 있어 속물적인 본성이 들통날 위기를 늘 달고 삽니다.",
    '乙巳': "기분과 변덕이 하루에도 열두 번씩 바뀌어 도저히 장단을 맞출 수 없는 피곤하고 불안정한 시한폭탄 같은 성격입니다. 화려한 겉치장과 타인의 관심에 병적으로 목말라 있어 내면의 깊이는 텅텅 비어있는 속 빈 강정이며, 입이 너무 가벼워 남의 비밀을 가십거리로 소모하는 악취미가 있습니다. 진득한 관계를 견디지 못하고 쉽게 질려버려 이리저리 도망 다니는 회피형 멘탈이라 평생 안착하지 못하고 떠도는 팔자입니다.",
    '丙午': "불난 집에 기름을 붓는 격으로 참을성 제로에 다혈질의 끝을 달리는, 도무지 구제가 안 되는 감정 통제 불능자입니다. 화가 나면 앞뒤, 위아래 재지 않고 깽판을 쳐서 그동안 쌓아온 공든 탑을 한순간에 잿더미로 만들어버리는 자폭 전문가입니다. 자기중심적인 사고방식이 너무 강해 타인의 피해는 안중에도 없으며, 본인의 감정만을 최우선으로 내세우다 결국 세상 사람들의 손가락질을 받고 장렬하게 고립되는 멍청한 불나방입니다.",
    '丁未': "예민함이 극도로 뾰족해져 있어 주변 사람들을 끊임없이 피 말리고 눈치 보게 만드는 인간 가시덤불입니다. 대놓고 불만을 말하지 못하고 속으로 꽁하게 쌓아두다가 은근슬쩍 비꼬거나 엉뚱한 데서 화풀이하는 음침하고 소극적인 공격성이 매우 징그럽습니다. 지나친 자기 연민에 빠져 모든 불행을 환경이나 타인의 탓으로 돌리며, 스스로 변화할 의지는 1도 없이 불평불만만 쏟아내는 지독한 염세주의자입니다.",

        document.getElementById('lt-form').addEventListener('submit', function(e) {

            const hour = timeMap[timeStr] !== undefined ? timeMap[timeStr] : 12;

            try {
                let lunarObj;

                    lunarObj = Solar.fromYmdHms(year, month, day, hour, 0, 0).getLunar();
                } else if (calendarType === 'lunar') {
                    lunarObj = Lunar.fromYmdHms(year, month, day, hour, 0, 0);
