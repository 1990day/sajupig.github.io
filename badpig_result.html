            '庚午': "원칙과 도덕, 반듯함을 내세우지만 그 엄격한 잣대는 철저히 타인에게만 향해 있는 이중적인 면모를 지녔습니다. 타인의 작은 실수조차 너그럽게 안아주지 못하는 냉혹함 때문에 주변 사람들은 늘 긴장하고 눈치를 봅니다. 반면 본인의 자존심이 조금이라도 상하면 불같이 화를 내며 관계 단절을 해버리는 미성숙한 대처 방식을 보입니다.",
            '辛未': "모든 일에 현미경을 들이대고 작은 흠집이라도 찾아내야 직성이 풀리는 피곤하고 예민한 완벽주의를 가졌습니다. 타인이 본인보다 앞서가거나 주목받는 것을 견디지 못하는 은근한 자격지심이 있어, 겉으로는 축하하면서도 속으로는 상대를 깎아내리는 서늘함이 있습니다. 한 번 받은 상처나 서운함은 절대 잊지 않는 긴 뒤끝을 자랑합니다.",
            '壬申': "뛰어난 순발력과 임기응변으로 상황을 모면하는 데는 탁월하지만, 진정성 있게 문제를 정면 돌파하기보다는 말장난으로 요리조리 빠져나가려는 가벼움이 단점입니다. 다방면에 호기심이 많아 이것저것 시도하지만 한 분야에 진득하게 뿌리내리는 끈기가 부족해, 결국 얕은 지식만 넓게 가진 채 '전문성 없는 다재다능'으로 끝날 위험이 큽니다.",
            '癸酉': "극도의 예민함과 까칠함으로 타인과 마음의 벽을 두껍게 치고 방어적으로 살아가는 개인주의자입니다. 자신의 고요한 영역을 침범당하는 것을 극도로 혐오하며, 선 단계를 넘었다 판단되면 매섭게 잘라내는 차가움이 있습니다. 상처받는 것이 두려워 먼저 남을 밀어내고 팩트라는 명분으로 비수를 꽂는 방어기제가 스스로를 철저히 외롭게 만듭니다.",
            '甲戌': "자신이 속한 무리에서 주도권을 쥐고 대장 노릇을 해야만 직성이 풀리는 오만함과 독선이 깊게 박혀 있습니다. 타인의 조언을 듣는 시늉은 하지만 결국 본인의 굳건한 고집대로 밀어붙여 조직이나 관계를 위태롭게 하기도 합니다. 겉으로는 의리와 명분을 중시하는 듯해도, 결정적인 이익 앞에서는 냉정하게 돌아설 수 있는 차가움을 숨기고 있습니다.",
            '乙亥': "환경에 잘 순응하고 부드러운 듯 보이지만, 정작 갈등에 정면으로 부딪혀 책임져야 할 상황이 오면 회피하려는 수동적인 성향이 짙습니다. 스트레스를 받으면 깊은 우울감과 자기 연민에 빠져 주변의 에너지까지 무겁게 소진시킵니다. 구체적인 실행 계획 없이 머릿속으로만 이상을 그리며 고민하다가 중요한 타이밍을 번번이 놓치곤 합니다.",
            '丙子': "밝고 원만해 보이는 겉모습 뒤에 철저하게 계산된 사회적 가면과 이중성이 숨어 있습니다. 자신에게 이득이 되는 사람에게는 한없이 다정하고 헌신적이다가도, 쓸모가 없어지면 언제 그랬냐는 듯 냉정하게 선을 긋습니다. 평소엔 젠틀하게 행동하다가도 예상치 못한 스트레스 앞에서는 이성을 잃고 히스테릭하게 반응하여 주변을 당혹스럽게 합니다.",
            '丁丑': "한 번 앙심을 품거나 억울함을 느끼면 겉으로는 평온한 척 숨기면서 끝까지 원한을 곱씹는 무서운 집요함의 소유자입니다. 본인의 신념에 대한 고집이 매우 세서 주변의 합리적인 만류에도 절대 타협하지 않는 꽉 막힌 태도를 보입니다. 불만을 대화로 시원하게 풀지 않고 속으로 삭이다가 엉뚱한 곳에서 삐딱하게 표출하여 사람을 피곤하게 합니다.",
            '戊寅': "무소의 뿔처럼 목표를 향해 직진하는 듬직함은 있으나, 주변의 상황과 과정을 무시하고 결과만 들이밀며 타인을 억압하려는 불도저 기질이 가장 큰 단점입니다. 타인의 감정을 세심하게 헤아리는 공감 능력이 부족해 의도치 않게 깊은 상처를 남깁니다. 본인의 실수를 인정하기 싫어 궁지에 몰리면 오히려 큰소리를 치며 억지를 부리는 경향이 있습니다.",
            '己卯': "눈치가 비상하게 빨라 분위기 파악에 능하지만, 강자 앞에서는 자신을 한없이 낮추고 만만한 사람에게는 은근히 권위를 내세우는 기회주의적 태도가 배어 있습니다. 자신의 속내를 절대 다 보여주지 않으며, 불리한 상황에서는 책임을 회피하고 타인 뒤로 숨는 데 능합니다. 스트레스가 쌓이면 타인의 단점을 헐뜯는 것으로 감정을 해소하려는 삐딱함이 있습니다.",
            '庚辰': "강한 자만심과 우월감으로 똘똘 뭉쳐 있어 타인의 의견을 가볍게 여기고 가르치려 드는 권위적인 성향을 가졌습니다. 본인의 스케일이 크다고 자부하지만, 실상은 타인의 섬세한 감정과 상처를 전혀 읽지 못하는 극도의 둔감함일 뿐입니다. 목표 성취에만 매몰되어 주변 사람들을 외면하고 상처 주다 결국 고립무원의 처지에 놓이기 쉽습니다.",
            '辛巳': "머리 회전이 빠르고 예리하여 상대의 의도를 단숨에 파악하지만, 그 뛰어난 능력을 타인의 약점을 찌르고 통제하는 데 사용하는 서늘한 습관이 있습니다. 겉으로는 우아하고 완벽해 보이려 애쓰나, 내면은 타인에 대한 끝없는 불신과 의심으로 가득 차 있습니다. 결정적인 이익 앞에서는 수년의 인연도 주저 없이 냉정하게 베어내는 단호함이 있습니다.",
            '壬午': "다정다감하고 유연한 미소 뒤에 극단적인 현실주의와 개인적인 욕망을 교묘하게 감추고 있습니다. 감정에 흔들리는 척하면서도 결정적인 갈림길에서는 철저히 본인에게 금전적, 현실적 이득이 되는 방향으로만 움직이는 계산 능력을 발휘합니다. 맺고 끊음이 불분명하고 우유부단하여, 얕은 관계를 넓히다 불필요한 구설에 오르기 십상입니다.",
            '癸未': "작은 시련에도 세상에서 자신이 가장 불행한 척 비련의 주인공 행세를 하며 주변 사람들의 감정과 에너지를 과도하게 소모시키는 유형입니다. 본인은 남을 위해 희생한다고 굳게 믿지만, 사실은 그 희생을 빌미로 타인에게 죄책감을 심어주고 조종하려는 통제욕이 깔려 있습니다. 채워지지 않는 결핍과 타인의 시선에 대한 병적인 집착이 내재되어 있습니다.",
            '甲申': "자신이 세운 높은 자존심의 성벽에 갇혀, 변화하는 현실을 받아들이지 못하고 꺾일 때까지 버티는 미련한 고집의 화신입니다. 위기 대처 능력은 부족하면서 오기와 허세만 앞세워 억지를 부리다 주변까지 힘들게 합니다. 타협을 실패나 굴복으로 여기는 극단적인 흑백논리 탓에, 충분히 수월하게 갈 수 있는 길도 스스로 험난하게 만들어 걷게 됩니다.",
            '乙酉': "신경이 면도날처럼 날카롭고 예민하여 곁에 있는 사람이 숨소리조차 편히 내지 못하게 만드는 까탈스러움을 가졌습니다. 타인의 아주 작은 실수 하나도 잊지 않고 적어두었다가 반드시 팩트 폭력으로 되돌려주는 집요한 성격입니다. 겉으론 연약하고 상처받기 쉬워 보이나, 내면은 본인의 안위를 위해 타인을 차갑게 밟고 올라서는 승부욕이 강합니다.",
            '丙戌': "감정 기복이 롤러코스터 같아 도무지 어느 장단에 맞춰야 할지 종잡을 수 없는 통제 불능의 다혈질입니다. 뒷수습은 생각지 않고 화가 나는 순간 날 선 말을 여과 없이 쏟아내어 평생 씻을 수 없는 상처를 남기고 뒤늦게 후회하는 패턴을 반복합니다. 겉으론 쿨한 대인배인 척하지만 사소한 비판 하나도 넘기지 못하고 마음속에 담아두는 편입니다.",
            '丁亥': "생각의 미로에 갇혀 명확한 결단 내리기를 극도로 두려워하는 답답한 우유부단함의 표본입니다. 관계에서 갈등이 생기면 정면으로 대화하여 해결하려 하지 않고, 핑계를 대며 상황을 회피하거나 잠수를 타버립니다. 겉으로는 모두에게 좋은 사람으로 남으려 하지만, 속으로 억눌러둔 불만을 엉뚱한 곳에서 삐딱하게 터뜨리는 소극적 공격성이 짙습니다.",
            '戊子': "과묵하고 듬직해 보이는 겉모습과 달리, 속으로는 끊임없이 본인의 이익을 계산하는 치밀한 현실주의자입니다. 물질에 대한 집착과 불안감이 강해 조금의 손해도 보지 않으려는 방어적인 기질로 주변을 지치게 만듭니다. 타인에게 깊은 신뢰를 주는 척하지만 결국 인간관계마저 득실과 비즈니스로 평가하는 메마른 내면을 지녔습니다.",
            '己丑': "새로운 시도나 변화를 극도로 꺼리며 본인의 낡은 경험과 생각에 사로잡혀 대화가 통하지 않는 꽉 막힌 성격입니다. 주변에서 아무리 합리적으로 만류해도 기어이 본인의 굳건한 고집대로 밀어붙이다 일을 그르치곤 합니다. 불만이 있어도 속마음을 꾹 숨기고 있다가 타인의 작은 흠결을 두고두고 원망하며 곱씹는 집요한 뒤끝이 타인을 몹시 지치게 합니다.",
            '庚寅': "타인의 입장이나 상황은 전혀 배려하지 않고 오직 힘과 목소리 크기로 자신의 방식만을 강요하는 독단적인 성향이 강합니다. 본인이 무조건 옳다는 오만함에 빠져 조언을 건네는 사람마저 적으로 간주하고 방어 태세를 취합니다. 참을성이 부족해 장애물이 생기면 억지로 부수고 나가려다 결국 소중한 사람들과의 관계를 파탄 낼 위험이 큽니다.",
            '辛卯': "타인의 단점을 귀신같이 찾아내어 논리적으로 난도질하는 비판 능력을 가졌으나, 정작 본인을 향한 사소한 지적에는 방어벽을 치고 펄펄 뛰는 이중적인 면모가 있습니다. 지나치게 예민한 완벽주의 탓에 스스로도 피곤하게 살지만 곁에 있는 사람의 자존감마저 갉아먹습니다. 타인에게 따뜻한 위로와 온기를 내어주기보다는 차가운 지적을 앞세우는 편입니다.",
            '壬辰': "스케일이 큰 대장부인 척 호탕하게 굴지만, 이면에는 타인을 내 뜻대로 조종하려는 음흉한 권력욕과 옹졸한 피해의식이 깊게 자리 잡고 있습니다. 상황을 이중, 삼중으로 꼬아 생각하며 사람의 진심을 끊임없이 시험하고 의심합니다. 진행하던 일이 뜻대로 돌아가지 않으면 무책임하게 판 전체를 엎어버리는 극단적이고 파괴적인 면이 있습니다.",
            '癸巳': "어디서나 이익을 좇아 기가 막히게 노선을 갈아타는 기회주의적 처세술이 매우 발달해 있습니다. 겉으로는 부드럽게 미소 지으며 친절을 베풀지만, 그 이면에는 결국 상대를 이용하기 위한 철저한 계산과 밑밥 깔기가 숨어 있는 경우가 많습니다. 불리한 상황이나 무거운 책임 앞에서는 남에게 은근슬쩍 떠넘기는 회피 성향이 있어 깊은 신뢰를 얻기 힘듭니다.",
            '甲午': "순간적인 충동이 떠오르면 앞뒤 재지 않고 일단 저지르고 보는 브레이크 없는 폭주 기관차입니다. 매사에 진득한 끈기가 부족해 제대로 끝맺는 일이 드문 전형적인 용두사미의 모습을 보입니다. 감정 조절이 서툴러 욱하는 성질에 필터링 없는 막말을 내뱉어 스스로 관계를 망칩니다. 화려한 겉치레에 에너지를 낭비하다 정작 중요한 인생의 실속을 놓치기 쉽습니다.",
            '乙未': "환경에 잘 적응하는 온화하고 무던한 척을 하지만, 뼛속까지 삐딱한 시선으로 세상을 바라보며 불평불만을 달고 사는 염세주의자입니다. 타인의 성공을 진심으로 축하하지 못하고 은근히 깎아내리려는 자격지심이 심합니다. 삶에 문제가 생기면 스스로의 잘못을 돌아보고 반성하기보다 환경 탓, 남 탓으로 돌리며 합리화의 성을 쌓고 숨어버리는 회피 본능이 강합니다.",
