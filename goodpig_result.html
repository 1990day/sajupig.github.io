            '丁卯': "은은하게 빛나는 달빛 아래 치명적인 매력을 뿜어내는 아름다운 화초처럼, 타인의 마음을 단숨에 사로잡는 섬세하고 부드러운 감수성을 지녔습니다. 뛰어난 미적 감각과 세상을 아름답게 바라보는 눈을 가져 예술, 디자인, 기획 등 감각적인 분야에서 독보적인 두각을 나타냅니다. 사람의 마음을 편안하게 해주는 뛰어난 공감 능력과 유연한 처세술 덕분에 훌륭한 인적 네트워크를 형성하게 됩니다. 특유의 우아함과 사랑스러운 매력으로 평생토록 주변의 사랑과 보호를 듬뿍 받으며 안락하고 빛나는 삶을 완성해 나갑니다.",
            '戊辰': "하늘을 향해 힘차게 승천하는 듬직한 용의 기운을 품고 있는 웅장하고 거대한 태산과도 같은 명운입니다. 남들과는 비교할 수 없는 거대한 스케일과 넓은 시야를 지녔으며, 어떤 거대한 위기나 시련 앞에서도 바위처럼 흔들리지 않고 묵묵히 버텨내는 경이로운 멘탈을 자랑합니다. 원대한 목표를 향해 한 걸음씩 나아가 결국에는 모두가 우러러보는 최고의 정상에 우뚝 서게 되는 타고난 대인배의 사주입니다. 넓은 가슴으로 수많은 사람을 거느리고 이끌며, 명예와 거대한 부를 동시에 성취하는 압도적인 성공을 거두게 됩니다.",
            '己巳': "만물을 따뜻하게 품어주는 대지 속을 유연하게 누비며 지혜를 모으는 뱀처럼, 비상한 두뇌와 탁월한 눈치를 타고난 영리한 지략가입니다. 어떤 사람, 어떤 낯선 환경에 던져져도 물이 스며들듯 자연스럽게 동화되어 모두의 호감과 조력을 얻어내는 기막힌 유연성을 지녔습니다. 상황을 자신에게 유리하게 이끌어가는 뛰어난 수완을 발휘하여, 큰 힘을 들이지 않고도 원하는 실속을 야무지게 챙기는 지혜를 발휘합니다. 부드러운 미소 뒤에 숨겨진 치밀한 계획력과 실행력으로 재물과 명예를 안정적으로 쌓아 올리는 지혜로운 삶을 살아갑니다.",
            '庚午': "뜨거운 불길 속에서 단단하고 예리하게 벼려진 훌륭한 명검처럼, 불의와 절대 타협하지 않는 반듯한 명예욕과 카리스마를 지녔습니다. 강직하고 곧은 신념을 바탕으로 훌륭한 조직을 이끄는 능력이 탁월하며, 철저한 자기 관리와 책임감으로 엘리트의 길을 탄탄하게 걸어갑니다. 공과 사가 명확하고 품격 있는 태도를 잃지 않아 윗사람들의 전폭적인 신뢰와 아랫사람들의 존경을 한 몸에 받게 됩니다. 결국 자신이 속한 분야에서 막강한 권위와 빛나는 명예를 거머쥐며 만인의 귀감이 되는 당당하고 멋진 일생을 완성합니다.",
            '辛未': "메마른 모래밭 가장 깊은 곳에 은밀하고 소중하게 숨겨져 있는 값비싼 보석처럼, 누구도 흉내 낼 수 없는 독창적인 재능과 훌륭한 장인 정신을 지녔습니다. 남들이 보지 못하는 디테일을 짚어내는 섬세하고 날카로운 통찰력을 바탕으로 자신이 선택한 분야에서 타의 추종을 불허하는 최고의 전문가로 우뚝 섭니다. 화려하게 자신을 드러내지 않아도 그 내면에 품은 진정한 가치가 저절로 빛을 발하여 결정적인 순간에 큰 대우를 받게 됩니다. 고도의 전문성과 특유의 끈기를 무기로 시간이 갈수록 가치가 폭등하는 명품 같은 인생을 만들어 갑니다.",
            '壬申': "바위틈의 작은 샘에서 시작해 마침내 온 세상을 품어버리는 맑고 거대한 강물처럼, 마르지 않는 지혜와 놀라운 유연함을 지녔습니다. 비상한 두뇌 회전과 기막힌 임기응변으로 위기를 단숨에 기회로 바꾸어내며, 어떤 환경에서도 유쾌하고 여유로운 성품으로 어딜 가나 열렬한 환영을 받습니다. 다방면에 걸친 넓은 호기심과 뛰어난 습득력으로 수많은 지식과 경험을 스펀지처럼 흡수하여 다재다능한 능력자로 성장합니다. 거침없이 넓은 세상을 누비며 사람과 재물을 끊임없이 끌어모으는 자유롭고 풍요로운 삶의 주인공입니다.",
            '癸酉': "아름답고 매끄러운 바위 표면에 영롱하게 맺힌 맑은 아침 이슬처럼, 타인의 마음을 섬세하게 헤아리는 직관력과 천재적인 두뇌를 지녔습니다. 고상하고 세련된 성품과 깔끔한 일 처리 능력 덕분에 학문, 기획, 아이디어, 전문직 분야에서 눈부신 탁월함을 발휘합니다. 불필요한 에너지를 낭비하지 않고 핵심만을 정확히 짚어내는 날카로운 안목을 가졌으며, 고품격의 라이프스타일을 지향하는 우아한 성향입니다. 풍부한 영감과 비상한 지식으로 주변을 놀라게 하며, 지적인 명예와 맑은 재물운이 평생토록 함께하는 귀한 명운입니다.",
            '甲戌': "결실의 계절인 가을 들판에 억세고 당당하게 서 있는 단풍나무처럼, 남에게 의지하지 않는 훌륭한 자립심과 기막힌 현실 감각을 지녔습니다. 스스로의 힘으로 맨바닥에서 기반을 다지고 놀라운 가치를 창출해 내는 능력이 탁월하여 독립적인 비즈니스나 프로젝트에서 거대한 성과를 냅니다. 불굴의 의지와 목표를 향한 집념으로 어떤 방해물이 와도 흔들리지 않고 뚝심 있게 자신의 길을 개척해 나가는 개척자입니다. 결국 자신만의 견고한 성을 쌓아 올려 풍부한 재물과 흔들리지 않는 지위를 누리게 되는 자수성가의 아이콘입니다.",
            '乙亥': "드넓은 바다를 자유롭고 평화롭게 유랑하는 푸른 부평초처럼, 세상의 다양한 지식과 경험을 스펀지처럼 빨아들이는 훌륭한 호기심과 유연성을 가졌습니다. 어떤 낯선 환경이나 예상치 못한 변화 앞에서도 당황하지 않고 물 흐르듯 유연하게 대처하며 평화롭게 자신만의 길을 걸어가는 지혜를 지녔습니다. 뛰어난 직관력과 풍부한 상상력을 바탕으로 정신적, 학문적, 예술적 분야에서 남다른 깊이를 보여주며 철학적인 안목을 빛냅니다. 세상의 틀에 얽매이지 않고 자유로운 영혼으로 다양한 인연과 즐거움을 누리며 행복한 삶을 유람하게 됩니다.",
            '丙子': "깊은 어둠을 뚫고 찬란하게 떠오르는 지혜로운 태양처럼, 예의 바르고 반듯한 겉모습 안에 차갑고 이성적인 통찰력을 완벽하게 품고 있습니다. 불처럼 뜨거운 열정과 물처럼 차가운 이성이 가장 이상적으로 조화를 이루고 있어 무리에서 가장 돋보이고 신뢰받는 훌륭한 리더로 성장합니다. 원칙을 지키면서도 주변 사람들을 따뜻하게 품어주는 품격을 지녀 공직이나 대기업, 혹은 명예를 중시하는 조직에서 큰 성공을 거둡니다. 어떤 유혹에도 흔들리지 않는 바른길을 걸으며 세상에 선한 영향력을 널리 퍼뜨리는 빛나는 일생을 살아갑니다.",
            '丁丑': "한겨울 차갑게 얼어붙은 땅을 묵묵하게 녹여내는 따뜻한 난로처럼, 평소엔 한없이 다정하고 헌신적이지만 목표가 생기면 상상을 초월하는 끈기를 발휘합니다. 남들이 지쳐서 포기할 법한 어렵고 복잡한 일도 특유의 집중력과 성실함으로 기어이 해내어 주변의 엄청난 인정과 거대한 성과를 냅니다. 깊은 내면에 뜨거운 불꽃을 숨기고 있어 결정적인 순간 폭발적인 에너지를 뿜어내며 상황을 역전시키는 승부사 기질도 갖추고 있습니다. 오랜 시간 공들여 쌓아 올린 실력과 인덕이 훗날 엄청난 재물과 흔들리지 않는 안정감으로 보상받게 됩니다.",
            '戊寅': "거대한 산맥 위를 거침없이 호령하는 용맹한 호랑이처럼, 태생부터 주변을 압도하는 뿜어져 나오는 카리스마와 넘치는 자신감을 지녔습니다. 가슴속에 품은 큰 목표를 향해 어떤 두려움도 없이 돌진하며 넓은 무대에서 당당하게 주도권을 쥐고 세상을 호령하는 듬직한 승부사입니다. 작은 이익에 연연하지 않는 대인배의 풍모를 지녔으며, 위기가 닥치면 오히려 더 큰 에너지를 발휘하여 기적 같은 성취를 이루어냅니다. 많은 사람을 이끌고 보호하는 강인한 리더십 덕분에 어디서든 존경받는 우두머리로 자리매김하며 큰 명예를 얻습니다.",
            '己卯': "생명력이 움트는 이른 봄 들판을 생기 발랄하게 뛰어다니는 영리한 토끼처럼, 눈치가 무척 빠르고 센스가 넘쳐 어떤 상황에서도 사랑받습니다. 사람들의 굳게 닫힌 마음을 무장해제 시키고 스스럼없이 다가가 적응해 내는 훌륭한 친화력과 부드러운 처세술의 달인입니다. 겉보기엔 부드럽고 여려 보이지만 내면에는 자신에게 필요한 실속과 권리를 절대 놓치지 않는 아주 야무진 자기 보호 능력과 기획력을 지녔습니다. 끊임없이 샘솟는 아이디어와 훌륭한 눈치를 무기로 인생의 다양한 기회를 쏙쏙 잡아내며 실속 있고 풍요로운 삶을 완성합니다.",
            '庚辰': "광활한 하늘을 매섭게 가르며 도약하는 전설 속의 백룡처럼, 두려움을 전혀 모르는 강인한 투지와 놀라운 결단력을 지니고 태어났습니다. 스케일이 매우 넓고 마음 씀씀이가 커서 수많은 사람을 든든하게 이끌고 위험으로부터 완벽히 보호해 내는 타고난 대인배의 기질을 지녔습니다. 한 번 목표를 정하면 하늘이 무너져도 반드시 이루어내고 마는 압도적인 불도저급 추진력을 자랑하여 굵직한 업적을 수없이 남깁니다. 시대를 앞서가는 직관력과 폭발적인 에너지로 거대한 부와 명예를 한 손에 거머쥐는 영웅적이고 장엄한 인생을 살아갑니다.",
            '辛巳': "가장 정교하고 완벽하게 제련되어 찬란한 빛을 뿜어내는 보석처럼, 빈틈없는 세련미와 우아함을 온몸에 두르고 있는 매력적인 명운입니다. 머리 회전이 타의 추종을 불허할 만큼 빠르고 일 처리가 치밀하여, 명예를 몹시 중시하며 언제나 높은 품격을 유지하는 훌륭한 엘리트의 표본입니다. 뛰어난 직관력과 사람의 마음을 꿰뚫어 보는 통찰력으로 위기를 미연에 방지하고 가장 효율적이고 완벽한 길만을 찾아내는 능력이 탁월합니다. 고품격의 가치를 쫓으며 언제나 대중의 선망과 부러움을 받는 눈부시고 세련된 성공 가도를 달리게 될 것입니다.",
            '壬午': "잔잔한 호수 위에 아름답게 비치는 둥근 달빛처럼, 타고난 훌륭한 재물 감각과 명예를 중시하는 바른 마음이 완벽하게 어우러져 있습니다. 기막힌 현실 감각과 부드러운 인품을 동시에 갖추고 있어 돈과 사람을 힘들이지 않고 자연스럽게 끌어모으는 매우 균형 잡힌 성향입니다. 감수성이 풍부하고 타인에 대한 이해심이 깊으면서도 결정적인 순간에는 철저히 이성적인 판단을 내려 결코 손해를 보지 않는 영리함을 지녔습니다. 다정다감한 성품으로 널리 인기를 얻고 뛰어난 수완으로 안정적인 부를 축적하여 흠잡을 데 없이 평화로운 삶을 누립니다.",
            '癸未': "오랜 가뭄 끝에 메마른 땅을 흠뻑 적시며 생명을 구하는 단비처럼, 고난을 이겨내는 놀라운 생명력과 타인의 상처를 어루만지는 선한 마음을 타고났습니다. 어떤 척박한 상황에서도 기어이 살아남는 강인한 내면을 지녔으며, 자신의 재능을 아낌없이 베푸는 헌신적이고 따뜻한 영혼으로 깊은 존경을 받습니다. 감수성이 매우 뛰어나고 직관이 발달하여 남들이 보지 못하는 이면의 진실을 발견하고 이를 예술이나 교육, 치유의 영역으로 아름답게 승화시킵니다. 베푼 선의가 결국 거대한 행운으로 되돌아와 인생의 후반부가 가장 안정적이고 찬란하게 빛나는 명운입니다.",
            '甲申': "깎아지른 듯한 가파른 벼랑 끝에서도 푸른 기상을 잃지 않고 당당하게 서 있는 소나무처럼, 시련이 올수록 오히려 더욱 강인하게 단련되는 압도적인 돌파력을 지녔습니다. 세상의 어떤 불의나 유혹과도 절대 타협하지 않는 굳은 신념과 불굴의 개척 정신으로 아무도 가지 않은 새로운 길을 훌륭하게 만들어 냅니다. 다재다능한 능력과 뛰어난 두뇌를 바탕으로 조직을 혁신하고 판을 뒤집어엎는 강렬한 승부사적 기질을 한껏 발휘하여 큰 무대에서 활약합니다. 역경을 딛고 일어난 자만이 가질 수 있는 거대한 명예와 강력한 권력을 쥐며 누구보다 다이내믹하고 멋진 성공 신화를 씁니다.",
            '乙酉': "딱딱한 바위를 뚫고 기어이 고귀한 향기를 뿜어내며 피어나는 난초처럼, 뚜렷한 목표를 향한 무서운 집념과 정밀한 기술적 감각을 타고났습니다. 아무나 흉내 낼 수 없는 자신만의 독보적인 실력과 치밀한 꼼꼼함으로 가장 치열하고 어려운 환경에서도 기필코 살아남아 최고가 되는 전문가입니다. 겉보기엔 유연하고 부드러워 보이지만 내면에는 칼날 같은 예리함과 결단력을 숨기고 있어 위기 상황에서 더욱 빛나는 능력을 발휘합니다. 오직 실력 하나로 세상을 평정하며 전문 분야에서 막강한 부와 명성을 축적하여 흠결 없이 깔끔하고 독립적인 삶을 완성합니다.",
            '丙戌': "해 질 녘 온 세상을 아름답고 붉게 물들이며 따뜻한 여운을 남기는 노을처럼, 호탕하게 베푸는 따뜻한 마음과 깊은 철학적 혜안을 동시에 지녔습니다. 화려하고 흡입력 있는 언변과 타인의 숨겨진 마음을 단숨에 읽어내는 기막힌 직관력으로 대중의 열렬한 사랑과 지지를 받는 인기인입니다. 정의감이 넘치고 약자를 돕는 것을 좋아하여 어디서든 빛나는 존재감을 뽐내며, 창의적인 영감과 풍부한 감수성으로 자신만의 멋진 작품이나 업적을 남깁니다. 열정적으로 타인과 세상에 기여한 공로가 돌아와 평생 곁에 든든한 조력자들이 가득한 풍요롭고 명예로운 일생을 누립니다.",
            '丁亥': "칠흑 같이 어두운 밤바다를 환하고 다정하게 비추어 길을 안내하는 등대처럼, 무척 다정다감하고 맑은 영혼을 지니고 태어난 귀한 명운입니다. 누구보다 뛰어난 영감과 직관으로 세상의 바른길을 가장 먼저 찾아가며, 방황하는 타인을 올바른 방향으로 이끌어주는 따뜻한 멘토이자 조언자 역할을 훌륭히 해냅니다. 선량하고 도덕적인 성품을 잃지 않아 윗사람과 하늘의 전폭적인 도움을 받아 위기마다 귀인의 도움을 톡톡히 받는 엄청난 행운이 따릅니다. 맑은 정신과 흔들리지 않는 평온한 마음을 유지하며 세상 사람들의 칭송과 존경 속에서 안정적이고 부유한 삶을 누리게 됩니다.",
            '戊子': "웅장하고 듬직한 태산 밑에 마르지 않는 맑은 생명수를 가득 품고 있는 것처럼, 겉은 무던해 보이지만 속으로는 비상한 지혜와 탁월한 재무 감각을 완벽하게 갖추고 있습니다. 절대 가볍게 자신을 과시하지 않으면서도 한 번 시작한 일은 완벽하게 실속을 챙기며 마무리 짓는 든든하고 치밀한 실력파입니다. 겉으로 드러나는 명예보다 내실을 탄탄하게 다지는 능력이 무척 뛰어나 시간이 갈수록 곳간에 거대한 재물이 쌓이는 엄청난 부자의 사주입니다. 넓은 포용력으로 사람들을 편안하게 이끌면서도 결코 손해 보지 않는 기막힌 지략을 무기로 평생토록 든든한 부귀영화를 누립니다.",
            '己丑': "세상의 모든 생명을 넓게 품어내고 길러내는 단단한 대지처럼, 인생의 어떤 풍파나 시련 앞에서도 결코 흔들리지 않는 묵직하고 경이로운 인내심을 지녔습니다. 조금 느린 듯 보여도 절대 멈추거나 포기하지 않는 무서운 꾸준함으로 결국 세상에서 가장 튼튼하고 안전한 기반을 완벽하게 세워 올리는 대기만성형입니다. 남들이 알아주지 않아도 묵묵히 자신의 자리를 지키며 실력을 쌓아올려, 결정적인 순간에 아무도 무너뜨릴 수 없는 확고한 성공을 증명해 냅니다. 요행을 바라지 않고 정직하게 흘린 땀방울이 거대한 황금빛 물결로 변하여 노년에 가장 화려하고 풍요로운 성취를 만끽하게 됩니다.",
            '庚寅': "만물이 소생하는 봄날 가장 역동적으로 도약하는 기운찬 맹수처럼, 시대의 흐름과 기회를 정확히 알아보는 뛰어난 직관과 거침없이 나아가는 과감한 승부사 기질을 지녔습니다. 한 곳에 답답하게 머물기보다 역동적으로 넓은 세상을 누비며 주도적이고 대범하게 자신만의 길을 빵빵하게 개척해 나가는 스케일이 훌륭합니다. 결단력과 행동력이 뛰어나서 머릿속에 떠오른 아이디어를 곧바로 엄청난 성과와 재물로 연결시키는 기막힌 사업가적 수완을 발휘합니다. 두려움 없는 도전 정신과 긍정적인 에너지로 어떤 난관도 돌파해 내며 끊임없이 발전하고 거대한 부를 일구어내는 역동적인 삶의 주인공입니다.",
            '辛卯': "섬세한 자연의 아름다움을 가장 정교하게 다듬어내는 날카로운 가위처럼, 감각이 매우 예민하고 타의 추종을 불허하는 압도적인 미적 센스가 탁월합니다. 세상의 트렌드와 흐름을 누구보다 먼저 짚어내고 훌륭한 아이디어를 현실로 만들어내는 깐깐하고 독보적인 기획력을 지녀 큰 환영을 받습니다. 타인과의 관계에서 선을 잘 지키면서도 자신만의 확고한 매력과 재능을 무기로 사람들을 매료시키며 자신에게 유리한 환경을 완벽하게 조성합니다. 섬세하고 완벽주의적인 기질을 무기로 예술, 디자인, 기획 등의 분야에서 큰 성공을 거두어 우아하고 부유한 삶의 질을 평생토록 유지하게 됩니다.",
            '壬辰': "거대한 세상의 흐름을 정확히 읽어내고 하늘을 향해 힘차게 비상하는 전설의 용처럼, 아주 넓은 시야와 웅장하고 거침없는 스케일을 지녔습니다. 위기의 순간일수록 당황하기는커녕 오히려 침착하고 대범하게 상황을 정리하고 판을 뒤집어버리는 뛰어난 문제 해결 능력을 자랑하는 든든한 해결사입니다. 카리스마 넘치는 리더십과 번뜩이는 지략을 바탕으로 아주 큰 무대에서 수많은 대중이나 거대한 조직을 이끌며 당당하게 승승장구합니다. 남들이 감히 상상하지 못할 거대한 목표를 훌륭하게 현실로 만들어내며 압도적인 명예와 거대한 부를 거머쥐는 훌륭하고 영웅적인 일생입니다.",
            '癸巳': "세상의 모든 생명을 고루 적시고 아름답게 길러내는 촉촉한 이슬비처럼, 한없이 부드럽고 유연한 처세술로 어떤 환경에 가든 큰 사랑을 받으며 완벽하게 스며듭니다. 주변 사람들과 평화롭게 조화를 이루면서도 자신이 필요로 하는 실속과 이익은 야무지게 다 챙기는 기막힌 융통성과 지혜를 가졌습니다. 재물과 명예에 대한 감각이 뛰어나 겉으로는 욕심이 없어 보여도 속으로는 가장 알짜배기 성과들을 독차지하는 눈치 빠르고 영리한 행운아입니다. 뛰어난 직관력과 따뜻한 공감 능력으로 훌륭한 인맥을 구축하여 평생토록 하늘이 돕는 순탄하고 풍요로운 탄탄대로를 걷게 될 것입니다.",
            '甲午': "한여름에 가장 화려하고 뜨겁게 타오르는 불꽃처럼, 단숨에 모든 사람의 시선을 끌어당기는 엄청난 매력과 천재적인 두뇌 회전을 자랑합니다. 가슴이 뻥 뚫릴 듯 막힘없고 시원한 언변과 무한히 솟아나는 긍정적인 에너지로 주변 사람들에게 늘 큰 영감을 주며 역동적으로 활동하는 타고난 활동가입니다. 한 곳에 얽매이는 것을 싫어하고 늘 새롭고 진취적인 목표를 향해 달려가는 뛰어난 창의력과 추진력 덕분에 트렌드를 이끄는 선구자가 됩니다. 실패를 두려워하지 않는 불꽃 같은 열정과 뛰어난 표현력으로 대중의 인기를 독차지하며 매일매일이 축제처럼 화려하고 즐거운 일생을 만끽합니다.",
            '乙未': "아무것도 없는 척박한 사막에서도 기어이 아름다운 오아시스를 만들어내고 마는 선인장처럼, 부드러운 겉모습 뒤에 놀라운 생활력과 강인한 생존 본능을 숨기고 있습니다. 어떤 극한의 위기나 어려운 상황에 부딪혀도 결코 무너지지 않고 훌륭한 지혜를 발휘하여 결국 자신만의 안락한 자리를 만들어내는 눈부신 자립심을 지녔습니다. 현실 감각이 매우 뛰어나 허황된 꿈을 좇기보다는 차곡차곡 안전하게 실력을 쌓고 재산을 모아 평온하고 단단한 기반을 완벽하게 다집니다. 타고난 끈기와 섬세한 감각으로 결국 원하는 바를 묵묵히 이루어내어 중년 이후 가장 흔들림 없는 평화와 막대한 풍요를 누리게 됩니다.",
            '丙申': "세상의 모든 곳을 밝게 비추며 자유롭게 누비고 다니는 에너지가 넘치는 태양처럼, 호기심이 끝이 없고 지식 흡수력이 스펀지처럼 대단히 뛰어납니다. 다방면에 걸친 훌륭한 융통성과 지치지 않는 역동적인 활동성으로 다양한 경험을 쌓아 올리며 무한히 폭넓은 무대에서 마음껏 자신의 역량을 발휘합니다. 특유의 밝고 유쾌한 성격으로 주변 사람들을 늘 즐겁게 해주며 기막힌 재물 감각까지 갖추고 있어 즐기면서 돈을 버는 훌륭한 능력자입니다. 넘치는 다재다능함과 임기응변으로 여러 가지 재능을 동시에 뽐내며 인생을 흥미진진하고 다이내믹하게, 그리고 무척이나 풍요롭게 이끌어갑니다.",
            '丁酉': "깊은 어둠 속에서도 스스로 영롱하게 반짝이는 귀한 보석처럼, 무척 예리하고 정밀한 지성과 한 치의 오차도 허용하지 않는 완벽을 추구하는 꼼꼼함을 지녔습니다. 어떤 일을 맡든 흠집 하나 없는 최고의 결과물만을 만들어내기 위해 끊임없이 노력하며, 깔끔하고 우아하며 세련된 고품격 라이프스타일을 지향합니다. 천부적인 재물운을 품고 있어 예민하고 섬세한 감각을 돈을 버는 데 기막히게 활용하는 능력이 탁월하며 어디서나 경제적인 윤택함을 잃지 않습니다. 뛰어난 통찰력으로 사람과 사물의 진가를 단번에 알아보며 평생토록 고급스럽고 풍족한 환경에서 빛나는 훌륭한 명운을 타고났습니다.",
            '戊戌': "우뚝 솟아 세상을 내려다보는 웅장한 큰 산처럼 내면의 신뢰감이 바다처럼 깊고 매사에 한없이 듬직하여 누구나 믿고 의지하고 싶어 하는 존재입니다. 가벼운 말이나 얄팍한 꾀를 부리기보다 진중하고 무거운 행동으로 무리를 이끌며, 한 번 맺은 의리와 약속은 하늘이 두 쪽 나도 끝까지 책임지는 스케일 큰 대인배의 성품입니다. 어떤 거친 풍파가 몰아쳐도 끄떡없이 자리를 지키며 묵묵히 자신의 할 일을 완수해 내어 결국 가장 높고 명예로운 자리를 차지하게 됩니다. 두둑한 배짱과 변함없는 성실함을 무기로 평생 흔들림 없는 견고한 업적과 두터운 명예, 그리고 막대한 부를 쌓아 올리는 위대한 일생입니다.",
            '己亥': "풍요롭고 비옥한 대지 아래에서 소리 없이 조용하게 흐르는 맑은 물처럼, 겉으로는 다정하고 원만하여 사람들과 무척 잘 어울리면서도 속으로는 치밀하고 영리한 훌륭한 지략가입니다. 상황을 파악하는 두뇌 회전이 대단히 빠르고 남과 부딪히지 않고도 가장 안전하고 확실한 방법으로 자신에게 필요한 거대한 실속을 차리는 일급 수완가입니다. 포용력과 융통성이 뛰어나 어딜 가든 환영받으며, 겉으로 드러나지 않는 곳에 이미 어마어마한 재물을 쌓아두고 있을 만큼 천부적인 재물 감각을 자랑합니다. 사람의 마음을 훔치는 따뜻한 화술과 기막힌 판단력을 동시에 갖추어 평생 돈과 사람이 끊이지 않는 안락하고 지혜로운 삶의 달인입니다.",
            '庚子': "맑고 차가운 물속에 깨끗하게 씻긴 날카로운 강철처럼 세상의 이면과 부조리를 단번에 꿰뚫어 보는 예리한 통찰력과 논리적인 비판 능력을 지녔습니다. 감정에 쉽게 휩쓸리지 않는 냉철하고 이성적인 판단력과 정밀함을 무기로 학술, 연구, 전문 기술 등 고도의 전문 분야에서 가장 돋보이는 독보적인 능력을 발휘합니다. 자신이 옳다고 생각하는 일에는 한 치의 망설임 없이 소신 있게 직언을 던지며 불의와 타협하지 않는 곧고 맑은 기상을 자랑하는 매력적인 지식인입니다. 뛰어난 두뇌와 빈틈없는 완벽주의로 흠잡을 곳 없는 성과를 내어 세상의 깊은 인정과 존경을 받으며 엘리트로서의 확고한 명예를 누립니다.",
            '辛丑': "가장 혹독한 시간과 압력을 묵묵히 인내하여 마침내 세상에 나온 세상에서 제일 단단한 다이아몬드처럼, 차분한 겉모습 속에 엄청난 뚝심을 지녔습니다. 어떤 크나큰 시련이 와도 결코 불평하지 않고 묵묵히 땀방울을 흘리며 이겨내어 결국에는 누구도 부인할 수 없는 빛나는 진가를 증명해 내는 진정한 승리자입니다. 얕은 꾀나 요행을 부리지 않고 오직 정직한 정도만을 걸으며 자신의 실력을 단단하게 벼려나가 가장 흔들림 없는 굳건한 인생의 기반을 완성합니다. 그 어떤 유혹에도 흔들리지 않는 진정성과 무서운 끈기로 시간이 지날수록 막강한 권위와 거대한 부를 획득하는 눈부신 대기만성의 명운입니다.",
            '壬寅': "메마른 대지를 흠뻑 적시며 힘차고 굽이쳐 흐르는 웅장한 강물처럼, 새로운 것을 끊임없이 배우려는 왕성한 학구열과 훌륭한 언변을 타고난 멋진 지식인입니다. 한 곳에 정체되어 머물기보다는 넓고 역동적인 무대를 거침없이 누비며 자신만의 다이내믹하고 흥미진진한 삶을 유쾌하고 즐겁게 빵빵하게 개척합니다. 뛰어난 기획력과 번뜩이는 창의적인 아이디어로 무에서 유를 창조해 내는 재주가 탁월하며 자신의 넘치는 재능을 세상에 널리 알리며 돋보이는 성과를 거둡니다. 긍정적이고 진취적인 기상으로 막힌 길도 속 시원하게 뚫어버리며 끊임없이 발전하여 거대한 재물과 깊은 명성을 동시에 안는 풍요로운 여정입니다.",
            '癸卯': "세상의 만물을 따뜻하게 감싸 안고 부드럽게 생명을 불어넣는 봄비처럼, 태어날 때부터 윗사람의 긍정적인 지원과 인덕을 가득 타고난 복 많은 명운입니다. 눈치가 대단히 뛰어나고 성품이 한없이 부드럽고 친절하여 어딜 가나 귀여움과 환영을 듬뿍 받으며, 주변의 사람들과 평화롭게 조화를 이루는 안정적인 기운의 소유자입니다. 다툼이나 갈등을 지혜롭게 피하고 자연스러운 흐름 속에서 자신에게 이로운 기회와 재물을 아주 쉽게 얻어내는 놀랍고도 영리한 재주를 가졌습니다. 의식주가 평생토록 풍부하고 주변에 늘 좋은 인연들이 가득하여 마음 편안하고 따스한 햇살 같은 행복한 삶을 영원토록 누리게 됩니다.",
            '甲辰': "따스한 봄의 대지에 단단하게 뿌리를 내리고 거대한 도약을 완벽하게 준비하는 웅장한 거목처럼, 굽힐 줄 모르는 기상과 현실적인 감각이 기막히게 조화되어 있습니다. 평범하고 지루한 현실에 안주하지 않고 강인한 추진력을 발휘해 주도적으로 새로운 판을 짜고 개척해 나가는 능력이 그 누구보다 훌륭하고 탁월합니다. 명예를 지키는 올곧은 마음과 흙 속에서 재물을 훌륭하게 일구어내는 수완을 동시에 갖추어 명분과 실리를 모두 거머쥐는 최고의 균형 감각을 자랑합니다. 꺾이지 않는 당당한 자존심과 끊임없는 전진으로 무리에서 우뚝 솟아올라 막대한 부와 흔들리지 않는 지위를 차지하는 승리자의 사주입니다.",
            '乙巳': "따뜻하고 화창한 햇살 아래 가장 화려하고 아름답게 피어난 매력적인 꽃처럼, 훌륭한 예술적 재능과 타인을 단숨에 매료시키는 기막힌 눈치를 지녔습니다. 어떤 무대에 오르든 자신을 가장 훌륭하고 눈에 띄게 표현할 줄 알며 활기찬 에너지로 주변에 밝은 기운을 뿜어내는 멋진 감각과 끼의 소유자입니다. 머리 회전이 비상할 정도로 빠르고 상황 판단력이 대단히 뛰어나 위기를 모면하는 유연성과 자신에게 이익이 되는 방향을 찾는 감각이 탁월합니다. 다재다능한 솜씨와 뛰어난 언변으로 대중의 큰 사랑과 스포트라이트를 독차지하며 화려하고 역동적으로 재물을 끌어모으는 멋진 일생을 살아갑니다.",
            '丙午': "세상을 가장 눈부시고 환하게 밝히는 한여름의 뜨거운 태양처럼, 가슴속에 끓어오르는 엄청난 열정과 폭발적인 에너지가 가득 찬 진정한 승부사입니다. 매사에 자신감이 넘치고 어떤 실패나 좌절도 전혀 두려워하지 않는 압도적인 긍정적 추진력으로 매사에 주도권을 쥐고 거침없이 나아가는 활기찬 리더입니다. 화끈하고 솔직한 성격으로 주변 사람들의 마음을 단숨에 사로잡으며 불가능해 보이는 일도 통쾌하게 밀어붙여 기어이 거대한 성공으로 이끌어냅니다. 두려움을 모르는 용기와 끝없는 도전 정신으로 굵직하고 눈부신 업적을 세우며 세상 사람들의 열렬한 환호와 엄청난 명예를 쟁취하게 됩니다.",
            '丁未': "추운 사람의 마음을 녹이는 따뜻한 모닥불처럼 주변을 한없이 부드럽게 감싸면서도 내면에는 절대 꺼지지 않는 강렬한 인내심과 집념을 단단하게 품고 있습니다. 겉모습은 마냥 다정하고 온화해 보이지만 그 속은 그 누구보다 단단하여 묵묵히 자신만의 탁월한 실력을 정교하게 쌓아가는 외유내강의 완벽한 표본입니다. 한 번 마음먹은 일은 놀라운 집중력과 끈기로 파고들어 결국 해당 분야의 독보적인 장인이나 전문가로 거듭나 큰 존경과 경제적 보상을 한 몸에 받게 됩니다. 타인에 대한 깊은 공감 능력과 철학적 사고력을 바탕으로 많은 사람의 멘토가 되어 존경받으며, 평생토록 빛나는 지혜롭고 굳건한 명운입니다.",
            '戊申': "깊은 산속에 누구도 모르게 은밀하고 거대한 광맥을 가득 품고 있는 태산처럼, 행동은 몹시 신중하지만 머릿속은 우주처럼 빠르고 예리하게 돌아가는 천재입니다. 남들에게 자신의 능력을 결코 섣불리 과시하지 않고 조용하게 자신의 전문 기술과 능력을 갈고닦아 결정적인 순간에 세상을 놀라게 하는 훌륭한 실력자입니다. 다재다능한 재주와 뛰어난 문장력, 탁월한 문제 해결 능력을 모두 갖추고 있어 어떤 조직에 가든 핵심 브레인으로 깊은 인정과 파격적인 대우를 받게 됩니다. 속이 꽉 찬 지혜와 흔들림 없는 듬직함으로 묵묵히 자신의 제국을 건설하여 시간이 갈수록 어마어마한 부귀와 높은 명예를 확실하게 누리게 될 것입니다.",
            '己酉': "찬란하게 빛나는 보석을 가득 품고 있는 비옥하고 부드러운 대지처럼, 일머리가 대단히 뛰어나고 사교성이 훌륭하여 어떤 조직에서도 핵심적인 에이스 역할을 도맡습니다. 사람들과 언제나 조화롭고 평화롭게 어울리면서도 결국 자신에게 가장 유리한 방향과 결과를 영리하게 찾아내는 기막힌 수완과 눈치를 완벽히 가졌습니다. 어떤 일에 착수하든 한 치의 오차도 없이 깔끔하고 세밀하게 마무리 짓는 완벽주의적인 성향 덕분에 주변의 무한한 신뢰를 독차지하는 유능한 인재입니다. 타고난 식복과 재물운을 바탕으로 뛰어난 전문성과 융통성을 십분 발휘하여 경제적으로 무척 안정되고 화려하며 평탄한 인생을 걷습니다.",
            '庚戌': "그 어떤 충격에도 절대 흔들리지 않는 견고한 강철처럼, 자신이 옳다고 믿는 일 앞에서는 그 어떤 두려움 없이 가장 먼저 앞장서는 엄청난 추진력과 숭고한 정의로움을 지녔습니다. 겉으로 드러나는 상황이 거칠고 어려울수록 더욱 침착하고 냉정하게 무리를 안전하게 리드해 내는 강인하고 듬직한 리더이자 보호자의 성품입니다. 의리를 목숨처럼 소중히 여기며 한 번 내 편으로 만든 사람들은 끝까지 완벽하게 책임지는 멋진 카리스마를 발휘하여 숱한 사람들의 깊은 충성을 얻습니다. 비상한 직관력과 강력한 돌파력으로 어떤 장애물도 거뜬히 깨부수며 넓은 세상에서 위대한 업적을 세우고 막강한 권위를 쟁취해 냅니다.",
