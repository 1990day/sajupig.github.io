<body>

    <main>
        <div id="result-loading" style="text-align: center; padding: 100px 0; font-weight: bold; color: #ff85a2; font-size: 1.2rem;">
            🐷 결제 확인 완료! 평생 운명을 뼈 때리게 분석 중입니다... 잠시만 기다려주세요!

    <script>
        function openLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
        function closeLogin() { document.getElementById('loginOverlay').style.display = 'none'; }

        // ==========================================================
        // 🚨 [필수] 결제 우회 방지 철통 보안 코드
        // ==========================================================
        const urlParams = new URLSearchParams(window.location.search);
        const paymentKey = urlParams.get('paymentKey'); 
        const sajuYear = sessionStorage.getItem('saju_year'); 
        const orderId = urlParams.get('orderId') || '현장결제';

        if (!paymentKey || paymentKey === '') {
            alert("정상적인 결제 내역이 확인되지 않았습니다! 결제 페이지로 이동합니다.");
            document.body.style.display = "none"; 
            window.location.replace("pigsaju.html");
            throw new Error("결제 미확인 차단"); 
        } else if (!sajuYear) {
            alert("사주 정보가 만료되었습니다. 결제 페이지에서 다시 입력해주세요!");
            document.body.style.display = "none";
            window.location.replace("pigsaju.html");
            throw new Error("정보 만료 차단");
        }
        // ==========================================================

        const fullNames = {
            '甲':'갑목', '乙':'을목', '丙':'병화', '丁':'정화', '戊':'무토', '己':'기토', '庚':'경금', '辛':'신금', '壬':'임수', '癸':'계수',
            '子':'자수', '丑':'축토', '寅':'인목', '卯':'묘목', '辰':'진토', '巳':'사화', '午':'오화', '未':'미토', '申':'신금', '酉':'유금', '戌':'술토', '亥':'해수'
        };
        function transFull(char) { return fullNames[char] || char; }

        const charData = {
            '甲': { hg: '갑', el: '木', cls: 'c-wood' }, '乙': { hg: '을', el: '木', cls: 'c-wood' },
            '丙': { hg: '병', el: '火', cls: 'c-fire' }, '丁': { hg: '정', el: '火', cls: 'c-fire' },
            '戊': { hg: '무', el: '土', cls: 'c-earth' }, '己': { hg: '기', el: '土', cls: 'c-earth' },
            '庚': { hg: '경', el: '金', cls: 'c-metal' }, '辛': { hg: '신', el: '金', cls: 'c-metal' },
            '壬': { hg: '임', el: '水', cls: 'c-water' }, '癸': { hg: '계', el: '水', cls: 'c-water' },
            '子': { hg: '자', el: '水', cls: 'c-water' }, '丑': { hg: '축', el: '土', cls: 'c-earth' },
            '寅': { hg: '인', el: '木', cls: 'c-wood' }, '卯': { hg: '묘', el: '木', cls: 'c-wood' },
            '辰': { hg: '진', el: '土', cls: 'c-earth' }, '巳': { hg: '사', el: '火', cls: 'c-fire' },
            '午': { hg: '오', el: '火', cls: 'c-fire' }, '未': { hg: '미', el: '土', cls: 'c-earth' },
            '申': { hg: '신', el: '金', cls: 'c-metal' }, '酉': { hg: '유', el: '金', cls: 'c-metal' },
            '戌': { hg: '술', el: '土', cls: 'c-earth' }, '亥': { hg: '해', el: '水', cls: 'c-water' }
        };

        function getHtmlChar(char) {
            if (!char || char === 'unknown') return "<span class='c-unknown'>?</span><span class='char-hg'>(모름)</span>";
            const data = charData[char];
            if (!data) return char;
            return `<span class='${data.cls}'>${char}</span><span class='char-hg'>(${data.hg})</span>`;
        }

        const iljuPersonality = {
            '甲子': "한겨울 꽁꽁 얼어붙은 얼음물 위에 홀로 고고하게 떠 있는 꼿꼿하고 거대한 나무의 영혼입니다. 타인에게 굽히거나 아쉬운 소리 하는 것을 죽기보다 극혐하는 맹렬한 자존심이 뼛속 깊이 박혀 있습니다. 겉보기엔 학자처럼 한없이 차분하고 고상해 보이지만, 그 속에는 세상을 내 발밑에 두려는 웅장한 야망과 1원 한 푼까지 챙기려는 치밀한 계산기가 쉴 새 없이 돌아가고 있습니다. 육체적인 막노동이나 폼 안 나는 일은 절대 못 견디며, 오직 지적인 우월감과 정신적인 숭고함으로 무리를 지배하려 듭니다. 남의 조언은 귓등으로도 안 듣는 징그러운 똥고집 탓에 스스로 고립을 자초하기도 하지만, 결국 무력보다는 머리와 혀 하나로 떵떵거리며 살아남는 독보적인 생존 본능의 소유자입니다.",
            '乙丑': "언 땅을 뚫고 기어이 피어나고야 마는 끈질긴 인동초이자 독기 품은 잡초의 영혼입니다. 남들이 더럽고 치사해서 다 포기하고 도망가는 최악의 헬게이트 환경 속에서도 악착같이 살아남아, 기어코 내 밥그릇을 싹 다 챙겨내는 지독한 생존 본능과 생활력을 자랑합니다. 겉보기엔 부드럽고 얌전해 보여 호구 잡기 딱 좋아 보이지만, 막상 건드려보면 그 속에는 무시무시한 황소고집과 타인의 뼛속까지 털어먹는 소름 돋는 주판알이 완벽하게 자리 잡고 있습니다. 1원 한 푼 손해 보지 않으려는 강박증에 가까운 깐깐함 덕분에 맨바닥에서 시작해도 결국엔 알짜배기 현금과 부동산을 금고에 꽉꽉 채워 넣는 무서운 대기만성의 끝판왕입니다.",
            '丙寅': "세상을 환하게 비추는 붉은 태양 아래 당당하고 거침없이 뻗어 나가는 거대한 숲의 영혼입니다. 머릿속에 번뜩이는 아이디어와 타의 추종을 불허하는 기획력이 폭포수처럼 쏟아지며, 어디서든 구석에 쭈구려 있기보다는 무리의 중심에서 조명을 독차지해야 직성이 풀리는 천생 보스 기질을 타고났습니다. 성격이 불도저처럼 화끈하고 뒤끝이 1도 없으며 불의를 참지 못하는 호탕함 덕분에 평생 주변에 사람이 끊이지 않습니다. 하지만 내가 무조건 맞다며 남을 쥐고 흔들려는 과도한 오지랖과 급한 성미 때문에 다 된 밥에 재를 뿌리는 경우가 빈번하니, 입을 반만 열어야 천하를 얻을 수 있습니다.",
            '丁卯': "어두운 달빛 아래 치명적인 매력을 뿜어내며 피어난 섬세한 화초의 영혼입니다. 눈치가 100단이라 못해 1000단 수준이며, 타인의 속마음과 약점을 엑스레이처럼 단숨에 꿰뚫어 보는 극도로 예민한 통찰력을 탑재했습니다. 미적 감각과 예술적 똘끼가 우주 최강이라 본인의 톡톡 튀는 독보적인 재주 하나로 수많은 사람의 시선과 지갑을 쓸어 모으는 마성의 매력을 지녔습니다. 겉으론 웃고 있어도 속으로는 감정 기복이 롤러코스터를 타며, 타인의 무심한 말 한마디에 혼자만의 고독한 동굴로 파고들어 문을 잠가버리는 대단히 피곤하고도 매혹적인 감수성의 소유자입니다.",
            '戊辰': "거대하고 비옥한 태산이자, 승천의 타이밍만 노리며 땅을 박차고 오를 준비를 하는 웅장한 백룡의 영혼입니다. 스케일 자체가 일반인과는 비교도 안 되게 우주만큼 광활하여, 자질구레하고 쩨쩨한 일에는 콧방귀도 뀌지 않습니다. 한 번 타겟으로 꽂힌 목표 앞에서는 앞뒤 재지 않고 불도저처럼 무자비하게 돌진해 박살을 내버리는 압도적인 추진력을 자랑합니다. 평화로운 시기엔 게을러 보일지 몰라도, 모두가 죽어 나가는 위기가 닥치면 오히려 초인적인 괴력을 발휘해 판을 통째로 뒤엎고 승리를 쟁취하는 무시무시한 난세의 영웅 기질을 품고 있습니다.",
            '己巳': "따뜻하고 영양분 넘치는 대지 속을 유연하고 은밀하게 꿈틀거리는 뱀의 영혼입니다. 겉으론 한없이 부드럽고 둥글둥글 만인을 포용할 것처럼 자애롭고 싹싹해 보이나, 그 깊고 어두운 속마음에는 세상을 내 뜻대로 쥐락펴락하려는 펄펄 끓는 승부욕과 맹렬한 야심이 용암처럼 타오르고 있습니다. 기가 막힌 처세술과 타인의 심리를 조종하는 능력으로 어떤 조직이나 무리에 던져져도 기어이 핵심 실세로 군림합니다. 남들과 얼굴 붉히지 않고 웃는 얼굴로 뒤통수를 치며 가장 큰 알짜배기 실속만 쏙쏙 빼먹는 무서운 전략가입니다.",
            '庚午': "펄펄 끓는 용광로 속에서 무자비한 망치질을 견디며 제련되고 있는 서슬 퍼런 강철 검의 영혼입니다. 명예와 룰, 폼생폼사를 내 목숨보다 중시하며, 불의와 타협하거나 구차하게 구는 것을 죽기보다 혐오하는 강직하고 뻣뻣한 카리스마를 타고났습니다. 맺고 끊음이 섬뜩할 정도로 예리하여 기강이 빡센 조직에서 무리를 공포로 통솔하는 강력한 리더로 우뚝 섭니다. 타인의 아주 작은 헛점도 용서치 않는 지독한 완벽주의 탓에 남들을 숨 막히게 하지만, 정작 본인 스스로를 가장 가혹하게 채찍질하며 정상을 향해 기어 올라가는 독종입니다.",
            '辛未': "수분 한 방울 없이 바짝 메마른 건조한 모래밭 깊은 곳에 남몰래 숨겨져 있는 영롱하고 값비싼 보석의 영혼입니다. 남들이 감히 상상도 못 하는 독창적인 영감과 똘끼, 그리고 한 번 꽂힌 분야는 뼛속까지 파고들어 기어이 끝장을 보고야 마는 징그러울 정도의 집요함을 지녔습니다. 타인에게 흠잡히거나 빚지는 것을 극도로 혐오하여 스스로의 행동을 강박적으로 통제하며, 그 누구와도 타협하지 않는 꼿꼿한 자존심 하나로 버텨냅니다. 대중성과 타협하지 않는 예민함 탓에 고독을 달고 살지만, 결국 특수 분야의 최고 스페셜리스트 자리를 꿰차고 맙니다.",
            '壬申': "단단하고 거대한 바위틈에서 쉴 새 없이 쏟아져 나와 드넓은 바다로 맹렬하게 흘러가는 마르지 않는 강물의 영혼입니다. 슈퍼컴퓨터보다 빠른 천재적인 두뇌 회전과, 세상 모든 지식을 스펀지처럼 빨아들이는 얕고 넓은 방대한 오지랖을 자랑합니다. 어떤 낯설고 험악한 헬게이트에 던져져도 능구렁이처럼 100% 완벽히 적응해 살아남는 엄청난 융통성을 가졌습니다. 잔머리와 임기응변이 신의 경지에 달해 남들보다 적게 일하고 큰돈을 거머쥐며, 식복과 재물복이 화수분처럼 솟아나 일평생 굶어 죽을 걱정이 1도 없는 몹시 얄밉도록 축복받은 기질입니다.",
            '癸酉': "맑고 서늘한 바위 표면에 맺힌 차갑고 투명한 이슬의 영혼입니다. 10천간 60갑자 중 가장 눈치가 빠르고 머리가 비상하여, 타인의 이면과 역겨운 거짓말을 소름 돋게 엑스레이처럼 단숨에 꿰뚫어 보는 무서운 직관력을 지녔습니다. 절대 남에게 사기당하거나 단 1원도 손해 보지 않는 철저하고 냉혹한 계산 능력을 바탕으로, 교육, 기획, 의료, 법조 등에서 예리한 메스 같은 천재성을 뽐냅니다. 티 없이 맑고 고결한 귀족적 삶을 지향하여, 냄새나고 수준 떨어지는 것들을 경멸하는 대단히 도도하고 결벽증적인 성품입니다.",
            '甲戌': "쓸쓸하고 차가운 가을 들판에 고독하게, 하지만 억세게 서 있는 붉은 단풍나무의 영혼입니다. 지극히 현실적이고 돈 냄새를 쫓는 상업적, 동물적 감각이 소름 돋게 예리하게 발달해 있습니다. 남의 밑에서 얌전히 지시나 받으며 쥐꼬리만한 월급쟁이로 썩기보다는, 기어이 내 간판을 걸고 치열한 링 위에 올라 독립적인 내 사업으로 억 단위의 큰 목돈을 만져야만 숨통이 트이는 대단히 억척스러운 팔자입니다. 목표를 위해선 자존심도 굽힐 줄 아는 놀라운 융통성과, 한 번 물면 안 놓는 핏불 테리어 같은 생활력의 끝판왕입니다.",
            '乙亥': "광활한 망망대해를 자유롭고 정처 없이 둥둥 떠다니는 푸른 부평초의 영혼입니다. 한 곳의 좁은 우물이나 꽉 막힌 조직에 갇혀 썩는 것을 정신병 걸릴 듯 혐오하며, 쉴 새 없이 바쁘게 온 세상을 방랑하며 방대한 지식과 경험을 쫙쫙 빨아들입니다. 환경 적응력이 타의 추종을 불허하는 수준이라, 어떤 낯설고 험악한 위기가 닥쳐와도 능구렁이처럼 부드럽게 튕겨내고 넘어가 버리는 천부적인 처세술의 달인입니다. 정착을 거부하는 떠돌이 기질 탓에 내실이 부족할 수 있으니 한 곳에 엉덩이를 붙이는 연습이 평생의 숙제입니다.",
            '丙子': "어둠이 짙게 깔린 캄캄한 밤을 홀로 환하게 비추는 찬란하지만 모순적인 태양의 영혼입니다. 겉으로는 엄격한 규율과 명분, 반듯함을 중시하여 남들에게 흠잡힐 일 없이 훌륭한 조직의 모범적인 리더가 되려 안간힘을 씁니다. 하지만 뚜껑을 열어보면 욱하는 다혈질적인 화통함과, 속으로는 끝없이 현실의 득실을 차갑게 계산하는 얼음장 같은 이성이 수시로 충돌하며 교차합니다. 겉과 속이 너무나도 다른 대단히 이중적이고 입체적인 구조라 남들이 속을 알기 어렵지만, 그 속내를 철저히 숨기는 치명적인 매력으로 권력을 거머쥡니다.",
            '丁丑': "꽁꽁 얼어붙은 척박한 얼음땅을 묵묵히, 그러나 기어이 녹여내고야 마는 따뜻한 화로의 영혼입니다. 평소엔 한없이 조용하고 다정하며 남을 위해 희생하는 호구처럼 보이지만, 한 번 뚜껑이 열리거나 돈 냄새를 맡아 목표가 생기면 주변을 다 폭발시킬 듯 무서운 집념과 독기를 눈에서 뿜어냅니다. 남들이 더럽고 치사해서, 힘들어서 다 포기하고 던져버리는 끔찍한 일도 악착같이 끈질기게 주워 담아 해내어, 기어이 억 단위의 묵직한 재물을 금고에 쓸어 담고야 마는 진정한 외유내강이자 내실 챙기기의 끝판왕입니다.",
            '戊寅': "맹렬히 포효하며 피비린내를 풍기는 호랑이를 품고 있는 웅장하고 거친 산맥의 영혼입니다. 타인에게 굽히거나 쩨쩨하게 간섭받는 것을 죽기보다 싫어하며, 내가 법이자 진리라는 극강의 카리스마와 독선으로 똘똘 뭉쳐 있습니다. 잔잔바리 푼돈이나 평범한 일상에는 눈길조차 주지 않으며, 목숨이 오가는 크고 위험천만한 험난한 무대에서 정면 돌파로 거대한 권력을 무자비하게 쟁취해 내는 난세의 무시무시한 영웅입니다. 한 번 들이받으면 브레이크가 고장 난 불도저 같은 기개를 자랑해 주변을 벌벌 떨게 만듭니다.",
            '己卯': "이른 봄 척박한 들판을 쉴 새 없이 예민하게 뛰어다니는 영리하고 눈치 빠른 토끼의 영혼입니다. 겉보기엔 한없이 얌전하고 순해 빠져 남의 말을 다 들어줄 것 같으나, 그 깊은 속에는 험한 세상을 뚫고 나가 기어이 내 몫을 챙기고 승리하려는 무서운 투쟁심과 질투심이 똬리를 틀고 있습니다. 주변 분위기를 읽어내는 레이더가 24시간 곤두서 있어, 어떤 낯선 헬게이트 환경에 던져져도 귀신같이 카멜레온처럼 적응해 버립니다. 어떻게든 적군과 아군을 가리지 않고 이용해 내 밥그릇을 챙겨내는 생존형 처세가의 교과서입니다.",
            '庚辰': "폭발적인 승천을 준비하며 으르렁거리는 웅장한 백룡이자 단단하고 거친 광석의 영혼입니다. 살벌한 위기나 적군을 피하기는커녕, 정면으로 들이부수고 돌진하여 피 튀기는 압도적인 승리를 쟁취해 내고야 마는 타고난 전사이자 투사입니다. 맺고 끊음이 얼음장처럼 칼같이 무자비하게 확실하며, 우주만큼 광활하고 잔인한 스케일로 천하를 내 발밑에 두고 호령하며 지배해야만 비로소 숨을 쉴 수 있는 몹시 파워풀하고 거칠기 짝이 없는 쎈 팔자입니다. 남의 밑에선 절대 오래 버티지 못합니다.",
            '辛巳': "펄펄 끓는 용광로에서 완벽하게 제련을 마치고 나온 극도로 예리한 단도이자 찬란하게 빛나는 보석의 영혼입니다. 머리부터 발끝까지 흠잡을 데 없는 완벽한 세련됨과 병적인 완벽주의를 고집합니다. 겉으론 사람 좋은 천사 같은 미소를 짓고 있어도, 속으론 1원 단위까지 득실을 냉정하게 주판알 튕기고 있는 치밀하고 소름 돋는 두뇌를 지녔습니다. 관운과 명예운이 타고나 경제적인 쪼들림이나 지저분한 구차함 없이 평생 타인 위에 군림하며 우아하고 도도한 귀족의 삶을 누리는 엘리트의 표본입니다.",
            '壬午': "깊고 맑은 호수 위로 아름답게 비치는 은은하고 고혹적인 달빛의 영혼입니다. 일평생 내가 두 손에 쥘 수 있는 묵직한 현금 재물과 남들이 우러러보는 사회적인 명예가 톱니바퀴처럼 한 치의 오차도 없이 완벽하게 맞물려 돌아가는, 60갑자 중 최고의 길격 사주입니다. 어떤 최악의 위기가 닥쳐도 특유의 영리함과 미친 눈치로 기가 막히게 돈 냄새를 쫓아 실속을 쏙쏙 빼먹습니다. 사람을 홀리는 소름 돋는 상업적 두뇌와 적을 만들지 않는 완벽한 대인관계 능력을 동시에 탑재한 타고난 알부자 명식입니다.",
            '癸未': "만물이 말라비틀어져 타들어 가는 척박한 사막에 기적처럼 쏟아지는 한 줄기 구원의 단비와 같은 영혼입니다. 내 인생에 어떤 끔찍한 고통과 억울한 시련이 닥쳐와도, 이빨을 꽉 깨물고 악착같이 끈질기게 버텨내고야 마는 무서운 독종 같은 생존 본능을 가졌습니다. 동시에 타인의 아픔을 구제하려는 깊고 선한 활인의 마음을 지녔으나, 정작 본인의 내면에는 짙게 깔린 우울과 고독이 평생 따라다닙니다. 이 슬픔을 종교, 철학, 예술이나 남을 가르치는 직업으로 완벽히 승화시켜 타인의 맹목적인 존경과 거대한 명예를 얻어냅니다.",
            '甲申': "깎아지른 듯 가파른 절벽 바위산 벼랑 끝에 뿌리를 기어이 내린 꼿꼿하고 독한 소나무의 영혼입니다. 온몸으로 모진 비바람과 피 터지는 시련을 맞을수록 무너지기는커녕 오히려 더욱 독하고 날카롭게 단련되어, 기어이 무리의 최정상 꼭대기에 오르고야 마는 극강의 개척 정신을 지녔습니다. 타협이란 단어 자체를 모르는 뻣뻣함과, 권력과 명예를 향한 브레이크 고장 난 직진 본능이 타의 추종을 불허합니다. 남의 시선 따위 짓밟고 나아가는 거칠고 웅장한 독불장군 리더의 기질입니다.",
            '乙酉': "차갑고 딱딱한 돌 틈 사이를 기어이 비집고 올라온 독기 잔뜩 품은 잡초이자 날카로운 가시넝쿨의 영혼입니다. 일단 내가 살아남고 쟁취하기 위해서라면, 내 뼈를 깎고 남을 짓밟아서라도 무엇이든 이 악물고 버텨내는 무시무시한 집념을 가졌습니다. 예리한 메스 같은 결벽증적 완벽주의를 무기로 삼아, 남이 절대 흉내 낼 수 없는 고도의 정밀한 기술과 독보적인 실력으로 무장합니다. 피도 눈물도 없이 분야 최고의 스페셜리스트로 군림하며, 과정보다 확실한 결과물(현금)에 집착하는 실속파입니다.",
            '丙戌': "해질녘 서쪽 하늘을 웅장하게 뒤덮어 세상을 붉게 물들이는 화려하고 뜨거운 노을의 영혼입니다. 속으로는 심연처럼 깊은 고독과 철학적 영성, 텅 빈 공허함을 짙게 품고 있으면서도, 겉으로는 동네 골목대장처럼 호탕하게 밥을 사고 아낌없이 베푸는 극단적인 이중 매력을 뿜어냅니다. 사람의 약점과 심리를 꿰뚫어 보는 직관력이 귀신같고, 언변이 타의 추종을 불허할 정도로 현란하여 일평생 막대한 재물과 대중의 인기가 폭우처럼 쏟아져 내리는 축복받고 화려한 사주입니다.",
            '丁亥': "칠흑 같이 캄캄한 밤바다 위를 고요하고 숭고하게 비추는 은은한 등대의 영혼입니다. 인생에 절체절명의 끔찍한 위기나 구설수가 닥칠 때마다, 보이지 않는 조상이나 하늘의 전폭적인 도움(천을귀인)을 기적처럼 받아내어 험한 꼴 한 번 보지 않고 평탄한 꽃길을 걷는 엄청난 천운의 명식입니다. 타인의 숨겨진 상처를 단숨에 꿰뚫어 보고 바른길로 부드럽게 인도하는 대단히 고상하고 다정다감한 성품을 지녔으나, 은근히 속을 안 보여주고 치밀하게 득실을 따지는 영리함도 숨어있습니다.",
            '戊子': "겉으론 움직임이 없는 거대한 태산이지만, 그 캄캄한 밑바닥 아래로 은밀하게 맑은 지하수를 가득 품고 있는 영혼입니다. 겉보기엔 돌부처처럼 무뚝뚝하고 만사에 둔감한 척 호구처럼 보이지만, 실제론 머릿속으로 1원 한 푼 안 놓치고 무섭게 득실 주판알을 핑핑 튕기고 있는 기가 막힌 경제 관념을 뼛속 깊이 탑재하고 있습니다. 남들 앞에서 겉멋 부리고 나대며 돈을 흘리기보다는, 남몰래 쏠쏠한 현금 다발과 알짜배기 부동산을 꽉 쥐고 절대 내놓지 않는 진짜 소름 돋는 알부자 팔자입니다.",
            '己丑': "한겨울 꽁꽁 얼어붙은 거칠고 척박한 논밭이자 단단한 동토의 영혼입니다. 남의 조언이나 간섭은 귓등으로도 절대 듣지 않는 무서운 황소고집과, 남들이라면 백 번은 포기하고 도망갔을 끔찍한 고난마저도 이 악물고 묵묵히 버텨내는 우주 최강의 인내심을 똘똘 뭉쳐놨습니다. 느리고 답답해 보일지언정 절대 멈추지 않는 걸음으로, 남들이 감히 상상도 못 할 거대한 부동산 영토와 막대한 부를 묵묵하고 조용히 세워 올리는 완벽하고도 웅장한 대기만성의 끝판왕입니다.",
            '庚寅': "초봄의 파릇파릇 돋아나는 여린 싹을 사정없이 무자비하게 내리치는 단단하고 서늘한 도끼의 영혼입니다. 일확천금의 돈 냄새를 동물적으로 기가 막히게 맡아내는 직관력이 있으며, 목표물이 정해지면 뒤도 안 돌아보고 두려움 따윈 개나 줘버린 채 맹렬히 돌진해 속전속결로 큰 사업이나 딜을 단방에 해치워버립니다. 스케일이 광활하게 크고 과감무쌍한 승부사 기질이 다분하여, 답답한 사무실을 박차고 나가 쉴 새 없이 크고 역동적인 무대를 누비며 재물을 쓸어 담는 사냥꾼입니다.",
            '辛卯': "무성하게 자란 풀과 나무를 아주 정밀하고 깔끔하게 싹둑싹둑 다듬어내는 날카롭고 예리한 가위의 영혼입니다. 시각적, 감각적 예민함이 극도로 발달해 미적 센스와 눈썰미가 타의 추종을 불허하며, 남들이 멍청하게 보지 못하고 지나친 틈새 시장을 귀신같이 찾아냅니다. 자신만의 정교하고 독보적인 기술과 날카로운 기획력으로 쉴 새 없이 현금을 예쁘게 깎아내어 지갑에 채워 넣는, 아주 화려하고 도도하며 깐깐한 기질을 자랑하는 장인 마인드의 소유자입니다.",
            '壬辰': "거대한 바다의 기운을 잔뜩 머금고 번개를 치며 승천을 앞둔 무시무시한 흑룡의 영혼입니다. 생각하는 스케일과 내면의 깊은 야망이 우주를 덮을 만큼 광활하여, 도저히 남들처럼 얌전하고 평범하게 남 밑에서 월급이나 받으며 살 수가 없는 팔자입니다. 남들이 다 피 흘리며 무너져 내리는 최악의 헬게이트 위기 상황이나 극한의 경쟁 속에서 오히려 본인의 진가를 200% 폭발적으로 발휘해, 천문학적인 권력과 막대한 부를 통째로 틀어쥐어 버리는 난세의 영웅호걸이자 혁명가입니다.",
            '癸巳': "말라가는 만물을 생동감 있게 흠뻑 적셔주는 맑고 따뜻한 이슬비의 영혼입니다. 내가 손에 쥘 수 있는 거대한 재물(정재)과 남들이 나를 우러러보는 명예(정관)가 가장 이상적이고 완벽한 황금비율로 구비되어 있어, 인생의 큰 굴곡이나 뼈아픈 나락 없이 몹시 편안하고 풍요로운 삶을 영위하는 타고난 금수저급 복덩이입니다. 어떤 험악한 꼰대 환경이나 살벌한 무대에 던져져도 능구렁이처럼 100% 완벽히 스며들고 적응해, 내 알짜 실속만 얄밉도록 야무지게 챙기는 천재적인 처세술을 뽐냅니다.",
            '甲午': "한여름 작열하는 태양 아래 수분을 다 뺏기며 타오르는 거대한 장작의 영혼입니다. 두뇌 회전이 비상하고 사람의 혼을 쏙 빼놓는 언변이 60갑자 중 단연 최고봉입니다. 내면에 끓어오르는 아이디어와 주체할 수 없는 끼를 밖으로 화려하게 발산해야만 숨을 쉴 수 있는 타고난 연예인 기질을 가졌습니다. 하지만 감정 기복이 롤러코스터처럼 심하고, 욱하는 성질에 내뱉은 독설로 평생 갈 인연을 한순간에 잿더미로 만들어버리는 치명적인 단점이 있습니다. 조용한 사무실보다는 시끄럽고 역동적인 무대에서 혀와 재주 하나로 대중의 스포트라이트를 받으며 억 단위의 돈을 긁어모으는 화려한 팔자입니다.",
            '乙未': "수분 한 방울 없는 척박한 모래 사막에 기어이 뿌리를 내리고, 온몸에 날카로운 가시를 품은 채 살아남은 무서운 선인장의 영혼입니다. 겉보기엔 바람에 살랑살랑 흔들리는 야들야들한 잡초 같지만, 그 속엔 어떤 끔찍한 억압과 고통도 뚫고 기어나오는 동물적인 투기 감각과 소름 돋는 생존 본능을 지독하게 탑재했습니다. 아무리 맨땅에 헤딩을 하더라도 기어이 수십억 대 자산가로 자수성가해 내고야 마는, 인간 승리와 독종의 결정체입니다. 다만 돈에 대한 집착이 도를 넘어 주변 사람들을 숨 막히게 할 수 있으니 베푸는 여유를 가져야 고독한 노후를 피할 수 있습니다.",
            '丙申': "역마살을 단단히 타고나 전 세계를 바쁘게 쏘다니며 온 하늘을 붉게 물들이는 화려한 저녁 태양의 영혼입니다. 다방면에 걸쳐 얕고 넓은 방대한 지식을 스펀지처럼 빨아들이며, 답답한 파티션 안에 갇혀 썩기보다는 넓고 거대한 시장을 거침없이 누벼야 직성이 풀립니다. 무역, 영업, 기획 등 역동적인 무대에서 돈 냄새를 귀신같이 맡으며 타인을 홀려 명예와 부를 능구렁이처럼 싹쓸이하는 호탕한 사업가입니다. 단, 끈기가 부족해 벌려놓은 일의 마무리를 짓지 못하는 용두사미 기질이 있으니 엉덩이를 무겁게 하는 훈련이 필수입니다.",
            '丁酉': "칠흑 같은 어둠 속에서 홀로 영롱하고 찬란하게 반짝이는 가장 정교하고 값비싼 보석의 영혼입니다. 육체적으로 험한 일을 하며 돈에 쪼들리는 구차하고 지저분한 꼴을 극도로 혐오하며, 어딜 가든 귀족적이고 고상한 대접을 받아야 마땅한 팔자입니다. 1원 한 푼 틀리지 않는 정밀하고 날카로운 재무 감각과, 타인을 질리게 할 정도의 결벽증적 완벽주의를 무기 삼아 아무나 만질 수 없는 대단히 안락하고 윤택한 덩치 큰 재물을 양손에 거머쥡니다. 타인의 단점을 현미경으로 파헤치는 버릇만 고치면 평생이 평안합니다.",
            '戊戌': "생명체 하나 없이 황량하고 끝도 없이 펼쳐진 무시무시한 거대 태산의 영혼입니다. 남의 쩨쩨한 간섭과 훈수를 듣는 것을 죽기보다 혐오하며, 내가 곧 법이고 진리라는 소름 돋는 독선과 앞장서서 들이받는 압도적인 카리스마로 전신을 중무장했습니다. 누군가의 생사여탈권을 오가는 가장 험악하고 거친 무대에서 불도저처럼 무리를 무자비하게 통솔하며, 거대한 권력을 단방에 폭력적으로 쟁취해 내는 난세의 극단적인 영웅 기운입니다. 융통성 없는 똥고집을 꺾지 않으면 스스로 판 무덤에 빠지게 됩니다.",
            '己亥': "가장 비옥한 논밭 그 아래로 조용하고 깊게 흐르는 은밀하고 차가운 지하수의 영혼입니다. 겉으론 한없이 얌전하고 착하며 둥글둥글해 보이지만, 속으론 1초도 쉬지 않고 철두철미하게 득실 주판알을 튕기며 내 밥그릇과 이득을 100% 완벽하게 챙겨내는 몹시 무섭고 얄미운 실속파입니다. 물처럼 유연한 뱀 같은 융통성을 십분 발휘해, 남들과 얼굴 한 번 붉히지 않고도 뒤에서 막대한 부와 알짜배기 지위를 아주 조용하고 거대하게 축적해 냅니다. 속을 너무 안 보여주어 음흉하다는 평가를 받을 수 있습니다.",
            '庚子': "한겨울 살얼음 낀 차가운 물속에 푹 담겨 뼛속까지 냉철해진 서슬 퍼런 강철 검의 영혼입니다. 타인의 미세한 헛점과 조직의 썩은 부위를 귀신같이 찾아내, 반박 불가한 팩트 폭격으로 상대의 뼈를 가루로 만들어버리는 예리한 비판 능력이 우주 최강입니다. 맺고 끊음이 섬뜩할 정도로 매정하고 융통성이 제로에 가까워 툭하면 적을 만들지만, 특수 분야에서 남들이 감히 범접하지 못할 독보적인 천재성을 발휘하는 냉혹한 스페셜리스트입니다. 칼날이 너무 예리해 본인 스스로를 베지 않도록 주의해야 합니다.",
            '辛丑': "꽁꽁 언 진흙 속에서 언제 세상에 나갈지 모르는 인고의 세월을 독하게 버티고 있는 날카로운 다이아몬드의 영혼입니다. 바늘로 찔러도 피 한 방울 안 나올 듯 차갑고 매정해 보이지만, 그 속에는 엄청난 뚝심을 품어 어떤 끔찍한 역경과 시련도 입을 꾹 다물고 묵묵히 버텨냅니다. 기어이 한 분야의 아무도 넘보지 못할 최고 장인이자 권위자로 우뚝 서며, 가벼운 현금보다는 묵직한 거대 부동산이나 문서적 성과를 거머쥐는 무서운 대기만성의 끝판왕입니다. 남의 조언을 듣지 않는 아집이 유일한 단점입니다.",
            '壬寅': "광활한 숲과 협곡을 힘차게 굽이쳐 흐르며 메마른 대지에 생명력을 불어넣는 거대한 강물의 영혼입니다. 새로운 지식과 트렌드를 향한 학구열이 맹렬하게 타오르며, 남의 혼을 빼놓는 청산유수 같은 언변을 지녔습니다. 좁은 우물에서 벗어나 해외나 거대한 무대를 쉴 새 없이 바쁘게 쏘다니며, 여기저기서 쏟아지는 현금과 먹을 복을 쉼 없이 폭포수처럼 쓸어 담는 스케일이 대단히 방대하고 평생 풍요로움이 마르지 않는 사주입니다. 다만 오지랖이 넓어 남의 일에 휘말려 돈이 새어나갈 수 있습니다.",
            '癸卯': "바짝 마른 초원을 둥글둥글하게 적셔주어 생명을 키워내는 아주 따뜻하고 자애로운 이슬비의 영혼입니다. 일평생 바닥을 기는 험한 꼴은 절대 보지 않고, 위기가 닥칠 때마다 윗사람과 하늘의 맹목적인 무한한 도움을 듬뿍 받으며 순탄하게 살아가는 진짜 금수저 복덩이입니다. 남의 비위를 맞추는 눈치가 100단이라 어딜 가나 절대 적을 만들지 않으며, 특유의 부드럽고 천부적인 처세술로 손 안 대고 코 푸는 실속을 기막히게 챙깁니다. 의존적인 성향을 버리고 독립심을 키우면 더 큰 명예를 얻습니다.",
            '甲辰': "따뜻한 봄의 대지에 굳건히 뿌리를 박고 맹렬한 승천을 준비하며 으르렁대는 파워풀한 청룡의 영혼입니다. 어떤 끔찍한 억압과 시련 앞에서도 무릎 꿇지 않는 엄청난 깡다구와, 미세한 돈 냄새를 기막히게 맡아내는 상업적 혜안을 지녔습니다. 평범하게 지시나 받으며 톱니바퀴처럼 사는 것을 극도로 거부하고 앞장서서 거친 판을 개척하여, 굵직하고 거대한 규모의 사업과 권력을 무자비하게 쟁취해 내고 마는 스케일이 남다른 난세의 영웅입니다. 남을 무시하는 오만함을 버려야 진짜 리더가 됩니다.",
            '乙巳': "한여름 작열하는 태양 아래 치명적인 매력을 뿜어내며 화려하게 만개한 가시 넝쿨의 영혼입니다. 내면에 끓어오르는 미친 재주와 끼가 활화산처럼 터져 흐르며, 남의 혼을 쏙 빼놓는 뱀 같은 입담과 소름 돋는 눈치로 전신을 무장했습니다. 조용하고 답답한 곳보다는 시끄럽고 역동적인 링 위에서 쉴 새 없이 대중의 스포트라이트를 끌어모아 억 단위의 돈을 긁어모으는 타고난 연예인이자 기획과 영업 분야의 천재적인 엔터테이너입니다. 화려함 뒤에 숨겨진 변덕을 통제하는 것이 관건입니다.",
            '丙午': "세상 모든 것을 다 태워 잿더미로 만들어 버릴 듯이 60갑자 중 가장 뜨겁게 타오르는 거대한 불기둥의 영혼입니다. 하늘 높은 줄 모르고 찌르는 오만한 자존심과 절대 누구와도 타협하지 않는 무자비한 승부욕으로 앞만 보고 불도저처럼 돌진합니다. 가장 피 튀기고 험난한 경쟁의 최전선에서 방해꾼들을 싹 다 밟고 기어이 맨 꼭대기에 올라가, 천하를 무섭게 호령하고 통제해야만 비로소 심장이 뛰고 살아있음을 느끼는 몹시 강렬한 팔자입니다. 불같은 성질을 죽이지 않으면 모든 것을 다 태워버리고 혼자 남게 됩니다.",
            '丁未': "수분 하나 없이 바짝 마른 사막 위에 펄펄 끓고 있는 맹렬한 용광로의 영혼입니다. 겉보기엔 한없이 유순하고 다정다감한 양처럼 보이지만, 속으로는 절대 남에게 1도 의존하거나 지지 않으려는 소름 돋는 황소고집과 악바리 끈기를 은밀하게 숨기고 있습니다. 기어이 남몰래 뼈를 깎는 고통의 시간을 통해 독보적인 기술과 자격을 획득해, 아무것도 없는 맨바닥에서 훌륭하게 자수성가해 내는 겉바속촉의 몹시 뜨겁고 강인한 불꽃 같은 기질입니다. 자신의 속내를 타인에게 좀 더 솔직하게 표현할 필요가 있습니다.",
            '戊申': "거대한 금광과 영롱한 광맥을 그 깊은 속안에 은밀하게 한가득 품고 있는 웅장한 바위산의 영혼입니다. 겉으로 드러나는 행동은 태산처럼 굼뜨고 무거워 보여 속을 알 수 없지만, 실제 두뇌 회전은 알파고 슈퍼컴퓨터보다 백 배는 빠르고 치밀하게 돌아갑니다. 남들 앞에서 경박하게 나대지 않고 묵묵히 남이 절대 흉내 낼 수 없는 깊은 전문 기술을 갈고닦아, 평생 두둑한 현금 다발과 거대한 밥그릇을 조용하고 음흉하게 긁어모으는 무서운 장인입니다. 타인을 너무 계산적으로 대하는 태도만 조심하십시오.",
            '己酉': "가장 예리하고 값비싼 황금과 보석을 듬뿍 묻어두고 있는 몹시 비옥하고 풍요로운 대지의 영혼입니다. 일머리가 기가 막히게 팽팽 돌아가 어떤 꽉 막히고 꼰대 같은 징그러운 조직에 던져져도 100% 완벽 적응해 핵심 에이스이자 실세로 군림합니다. 남들과 둥글게 잘 어울리며 사람 좋다는 호인 소리를 들으면서도, 절대 내 밥그릇에서 1원 한 푼 안 뺏기는 소름 돋게 깐깐하고 영리한 계산력으로 남몰래 거대한 재물을 조용히 쌓아 올립니다. 남의 헛점을 날카롭게 찌르는 말버릇이 치명적 약점입니다.",
            '庚戌': "천지를 쩌렁쩌렁 진동시키며 피비린내를 풍기는 서슬 퍼런 강철 검이자 무자비한 쇳덩이의 영혼입니다. 내가 스스로 정한 명분과 원칙 앞에서는 두려움 없이 불도저처럼 무작정 돌진하며, 인간관계를 맺고 끊음이 섬뜩할 정도로 예리하고 잔인합니다. 누군가의 생사여탈권을 쥐고 흔드는 가장 험악하고 거친 무대에서 적들의 목을 치고 밟고 올라서서, 압도적이고 공포스러운 권력을 한 손에 꽉 틀어쥐는 상남자, 여장부의 끝판왕입니다. 너무 강직하여 스스로 부러질 수 있으니 부드러움을 배워야 합니다.",
            '辛亥': "맑고 깨끗한 계곡물 속에 씻겨 찬란하고 눈부시게 빛나는 가장 아름답고 고결한 보석의 영혼입니다. 타의 추종을 불허하는 기막힌 화술과 극도로 예리한 미적 감각, 그리고 번뜩이는 기획력을 무기로 세상을 단숨에 매료시킵니다. 융통성이 부족할 정도로 구차하고 지저분한 것을 벌레 보듯 극도로 혐오하며, 티 없이 맑고 고상한 귀족적인 삶을 지향하여 학문, 디자인, 특수 전문직에서 몹시 우아하고 도도하게 군림하며 살아갑니다. 차갑고 예민한 성격을 둥글게 깎아내는 것이 숙제입니다.",
            '壬子': "캄캄하고 깊은 심해 속에 억눌린 엄청난 폭발력을 숨긴 채 거칠게 출렁이는 광활한 바다의 영혼입니다. 겉으론 물처럼 유연하고 사람 좋은 척 방긋 웃고 있지만, 내면엔 천지를 다 뒤집어엎고도 남을 압도적인 카리스마와 타인을 밟고 올라가려는 맹렬한 투지를 꽉 품고 있습니다. 스케일 큰 역동적 무대에서 인내심의 끈이 끊어져 한 번 폭발하여 화를 내면 천하의 권력과 재물을 무자비하게 싹쓸이하는 엄청난 야망과 욕망의 거대한 덩어리입니다. 비밀이 너무 많아 진실한 사람을 놓칠 수 있습니다.",
            '癸丑': "꽁꽁 언 진흙탕 지옥 속에서 기어이 살아남아 꽃을 피우기 위해 지독한 독기를 품고 있는 씨앗의 영혼입니다. 남들이라면 백 번은 자살했을 끔찍한 고난과 눈물겨운 시련을 이빨 꽉 깨물고 버텨내어, 기어이 최후의 승리자가 되고야 마는 우주 최강의 인내심을 가졌습니다. 남들 앞에 가벼이 나대지 않으면서도 치밀한 머리 회전과 얼음장 같은 계산으로 남몰래 묵직한 거대 권력과 부동산을 쥐고 뒤에서 조종하는 진짜 무서운 흑막이자 끝판왕입니다. 타인에 대한 극도의 불신을 내려놓아야 마음이 편안해집니다.",
            '甲寅': "하늘 높은 줄 모르고 수십 미터를 꼿꼿하게 뻗어 나가는 타협 제로의 웅장한 거목의 영혼입니다. 자기 주체성과 꺾이지 않는 자존심이 단연 60갑자 중 1등 탑 티어이며, 남에게 허리를 굽히거나 멍청한 훈수를 듣는 것을 죽기보다 혐오합니다. 뼈가 부서지고 온몸이 찢어지는 끔찍한 고통이 있어도 남의 도움을 구걸하지 않고 완전한 자수성가로 자신만의 절대 흔들리지 않는 굳건한 왕국을 떡하니 지어 올리는 대단히 올곧고 거친 기상입니다. 뻣뻣함 때문에 인간관계에서 부러지기 쉬우니 고개를 숙이는 법을 배워야 합니다.",
            '乙卯': "수분 없는 척박한 돌 틈과 남의 영토를 미친 듯이 집어삼키며 매섭게 확장해 나가는 질긴 잡초의 영혼입니다. 겉으로 웃으며 다가갈 땐 한없이 싹싹하고 부드러워 보이지만, 내 생존과 이득을 위해서라면 남을 가차 없이 밟고라도 올라서는 소름 돋는 승부욕으로 전신을 무장했습니다. 피 튀기는 치열한 경쟁 사회에서 남의 밥그릇을 매섭고 얄밉게 뺏어 거대한 재물을 긁어모아 탑을 쌓는, 겉유속강을 넘어선 독종 중의 최고 독종입니다. 지나친 경쟁심이 멘탈을 갉아먹으니 마음의 여유가 필요합니다.",
            '丙辰': "비옥한 대지 위를 비추는 따뜻한 태양처럼 성품이 관대하고 다정하며, 표현력이 유창하고 식신의 길한 기운을 받아 일생 식록이 끊이지 않는 복 받은 명식입니다.",
            '丁巳': "용광로와 같은 겁재의 강한 불기운을 타고나 경쟁을 즐기고 남에게 지는 것을 죽기보다 싫어하며, 어떤 역경에도 포기하지 않는 활화산 같은 투지를 가졌습니다.",
            '戊午': "화산처럼 겉보기에는 태산이나 속에는 뜨거운 마그마(양인살)를 품고 있어 폭발적인 기세와 엄청난 권력욕을 자랑하며, 다혈질적이지만 뒤끝이 없는 호탕함이 있습니다.",
            '己未': "여름날의 메마른 대지처럼 인내심과 독립심이 대단하며, 남의 말을 듣기보다 자신의 뚝심대로 밀고 나가 끝내 영토를 차지하는 불굴의 장인 정신을 지녔습니다.",

    "辰": "월지 진은 사회적 공간에 들어섰을 때 시야가 넓고 스케일이 큰 사람처럼 보이기 쉬우며, 작은 일에 일일이 휘둘리기보다 전체 구조와 큰 흐름을 보려는 성향이 강하게 드러납니다. 당장 눈앞의 사소한 이익이나 감정싸움보다 더 멀리 보고 더 크게 움직이려는 기질이 있어, 자연스럽게 중심축 역할이나 관리자의 분위기를 띠는 경우가 많습니다. 겉으로는 느긋하고 묵직해 보여도 속으로는 현실 감각과 계산이 분명하고, 한 번 자기 영역으로 인식한 일에는 책임감도 큽니다. 때로는 자존심이 세고 큰 그림만 보려 해서 디테일이 약해 보일 수 있지만, 큰 판을 잡고 사람과 자원을 묶는 능력은 뛰어난 편입니다. 그래서 사회에서는 소소한 실무자라기보다 판 전체를 통째로 보고 운영하려는 보스형 가면으로 나타나기 쉽습니다.",

    "巳": "월지 사는 사회적 장면에서 매우 바쁘고 민첩하며, 사람과 정보와 기회를 끊임없이 연결하는 움직임으로 드러나기 쉽습니다. 가만히 한자리에 머무르기보다 여기저기 오가며 흐름을 만들고, 상황에 따라 말과 태도를 빠르게 조정하는 순발력이 좋습니다. 특히 인간관계, 거래, 소통, 영업, 홍보, 기획 같은 영역에서 존재감이 살아나기 쉬우며, 상대의 반응을 읽고 분위기를 끌어가는 능력도 강한 편입니다. 겉으로는 화려하고 능숙해 보이지만 속으로는 계산과 촉이 동시에 빠르게 돌아가고 있어, 생각보다 훨씬 현실적인 판단을 하는 경우가 많습니다. 그래서 사회에서는 사람을 끌어당기고 기회를 놓치지 않는 활동형 비즈니스 마인드, 현장을 누비며 판을 굴리는 세련된 실전형 가면으로 드러나기 쉽습니다.",

    "午": "월지 오는 사회적 무대에 섰을 때 존재감이 강하고 눈에 띄는 방식으로 드러나는 경우가 많으며, 자연스럽게 중심이나 전면으로 나가게 되는 흐름을 탑니다. 조용히 뒤에 숨어 있기보다 내가 한 일, 내가 가진 에너지, 내가 만들어내는 분위기가 바깥으로 또렷하게 보이기를 원하는 성향이 살아납니다. 자신감과 자존심도 강한 편이라 남들 앞에서 작아지기보다 당당하게 존재를 드러내며, 주목받을수록 오히려 힘이 살아나는 타입일 수 있습니다. 다만 지나치면 과열되거나 감정이 앞설 수 있지만, 잘 쓰이면 사람을 끌고 분위기를 일으키는 큰 장점이 됩니다. 그래서 사회에서는 스스로 조명을 끌어오고 존재 자체로 공간의 온도를 바꾸는 중심형 주인공 가면을 쓰기 쉽습니다.",

    "未": "월지 미는 사회와 직업의 자리에서 겉으로 드러나는 화려함보다 실제 쓸모, 완성도, 내실을 더 중요하게 여기는 얼굴로 나타나기 쉽습니다. 성급하게 결과를 내기보다 차근차근 다듬고 정리하며, 어설픈 상태로 밖에 내보내는 것을 꺼리는 경향도 있습니다. 부드러워 보이지만 일에서는 생각보다 기준이 분명하고, 내가 맡은 영역을 성실하게 가꾸고 유지하는 힘이 강합니다. 그래서 요란하게 티를 내지 않아도 시간이 지날수록 실력과 신뢰가 쌓이고, 주변에서는 묵묵하지만 제대로 하는 사람으로 보기 쉽습니다. 결국 이 월지는 사회 속에서 말보다 완성도로 증명하고, 겉치레보다 전문성과 실속을 고집스럽게 쌓아 올리는 장인형 가면으로 드러나는 경우가 많습니다.",

    "申": "월지 신은 사회적 장면에서 매우 영리하고 계산이 빠르며, 감정보다 효율과 결과를 우선하는 냉정한 얼굴로 드러나기 쉽습니다. 상황 판단이 빠르고 사람의 허점이나 구조의 약한 지점을 금방 포착하는 능력이 있어, 경쟁이 붙는 환경에서 특히 강한 면모를 보입니다. 정에 휘둘리기보다 이성적으로 끊고 정리하는 힘이 있고, 필요할 때는 과감하게 결단을 내리는 편이라 현실에서는 만만한 사람으로 보이지 않습니다. 말과 행동도 군더더기 없이 핵심만 남기는 스타일로 흐를 수 있어 차갑게 느껴질 수 있지만, 그것이 곧 생존력으로 연결되기도 합니다. 그래서 사회에서는 날카로운 판단력과 승부 감각으로 판세를 읽고 필요한 순간 정확히 칼을 빼는 실전형 승부사 가면을 쓰기 쉽습니다.",

    "酉": "월지 유는 사회적으로 드러났을 때 기준이 높고 디테일에 민감하며, 작은 오차나 허술함도 그냥 넘기지 않는 정밀한 얼굴로 보이기 쉽습니다. 보기 좋게 정리된 것, 완성도 높은 결과, 체계적이고 깔끔한 방식에 대한 집착이 있어, 대충 넘어가거나 얼렁뚱땅 마무리하는 것을 매우 불편해할 수 있습니다. 사람을 볼 때도 말보다 태도와 수준, 정리감, 일 처리 방식의 결을 예민하게 읽는 편이며, 일에서는 검수자나 감별자 역할을 맡기 쉬운 기운입니다. 물론 이 기준이 너무 높아지면 예민함이나 비판성으로 비칠 수 있지만, 그만큼 품질과 완성도를 끌어올리는 힘도 강합니다. 그래서 사회에서는 허점을 찾아내고 결과의 수준을 끌어올리는 정교한 완성형, 엄격한 기준으로 무대를 정리하는 완벽주의 가면으로 드러나기 쉽습니다.",

    "戌": "월지 술은 사회와 조직의 영역에서 묵직한 책임감과 버팀목 같은 존재감으로 나타나기 쉽습니다. 겉으로는 투박하거나 단순해 보여도 맡은 역할에 대한 의식이 강하고, 위기 상황에서 쉽게 도망가지 않고 끝까지 버티는 힘이 있습니다. 사람을 관리하거나 집단을 지키는 역할과도 인연이 깊어서, 화려하게 나서지 않아도 주변이 자연스럽게 의지하는 경우가 많습니다. 원칙과 의리, 책임이라는 단어가 강하게 작동하기 때문에 한번 내 사람, 내 일, 내 영역이라고 느끼면 끝까지 지키려는 태도가 선명합니다. 그래서 사회에서는 흔들리는 판을 몸으로 막아내는 사람, 분위기를 무겁게 붙들고 질서를 유지하는 든든한 수호자형 리더 가면으로 드러나기 쉽습니다.",

    "亥": "월지 해는 사회적 자리에서 겉으로는 부드럽고 느슨해 보일 수 있지만, 실제로는 정보와 분위기와 사람의 속내를 넓고 깊게 흡수하는 매우 영리한 얼굴로 나타나기 쉽습니다. 직접 앞장서 싸우기보다 한 걸음 뒤에서 전체를 보고, 누가 무엇을 원하고 어디로 흘러가는지를 자연스럽게 읽어내는 힘이 있습니다. 겉으로는 받아주고 흘려보내는 듯 보여도 속으로는 많은 것을 기억하고 정리하고 있으며, 필요할 때는 예상보다 훨씬 정확한 판단을 내립니다. 상황에 맞춰 유연하게 움직이기 때문에 쉽게 드러나지 않지만, 그래서 더 읽기 어려운 사람으로 보일 수 있습니다. 결국 이 월지는 사회 안에서 힘을 노골적으로 과시하기보다 넓은 감수성과 은근한 지략으로 판을 읽고 유리한 흐름을 만드는 깊은 전략가형 가면으로 드러나는 경우가 많습니다."
};

        const tenGodsLogicMap = {
            '木': { '木':'비겁', '火':'식상', '土':'재성', '金':'관성', '水':'인성' },
            '火': { '火':'비겁', '土':'식상', '金':'재성', '水':'관성', '木':'인성' },
            '土': { '土':'비겁', '金':'식상', '水':'재성', '木':'관성', '火':'인성' },
            '金': { '金':'비겁', '水':'식상', '木':'재성', '火':'관성', '土':'인성' },
            '水': { '水':'비겁', '木':'식상', '火':'재성', '土':'관성', '金':'인성' }
        };

        function generateLifetimeFortune(bazi, gender, timeStr) {
            const yGan = bazi.getYear().charAt(0); const yZhi = bazi.getYear().charAt(1);
            const mGan = bazi.getMonth().charAt(0); const mZhi = bazi.getMonth().charAt(1);
            const dGan = bazi.getDay().charAt(0); const dZhi = bazi.getDay().charAt(1);
            const tGan = bazi.getTime().charAt(0); const tZhi = bazi.getTime().charAt(1);
            
            const pillars = [yGan+yZhi, mGan+mZhi, dGan+dZhi, tGan+tZhi];
            const branches = [yZhi, mZhi, dZhi, tZhi];
            const iljuText = transFull(dGan) + transFull(dZhi);
            const key = dGan + dZhi;

            let elements = { '木':0, '火':0, '土':0, '金':0, '水':0 };
            let charsToCount = [yGan, yZhi, mGan, mZhi, dGan, dZhi];
            if (timeStr !== 'unknown') charsToCount.push(tGan, tZhi);
            let totalChars = timeStr === 'unknown' ? 6 : 8;

            charsToCount.forEach(char => {
                if(['甲','乙','寅','卯'].includes(char)) elements['木']++;
                if(['丙','丁','巳','午'].includes(char)) elements['火']++;
                if(['戊','己','辰','戌','丑','未'].includes(char)) elements['土']++;
                if(['庚','辛','申','酉'].includes(char)) elements['金']++;
                if(['壬','癸','亥','子'].includes(char)) elements['水']++;
            });

            let missingEls = Object.keys(elements).filter(e => elements[e] === 0);
            let dmElement = '';
            if(['甲','乙'].includes(dGan)) dmElement = '木';
            else if(['丙','丁'].includes(dGan)) dmElement = '火';
            else if(['戊','己'].includes(dGan)) dmElement = '土';
            else if(['庚','辛'].includes(dGan)) dmElement = '金';
            else if(['壬','癸'].includes(dGan)) dmElement = '水';

            let tenGodsCount = { '비겁':0, '식상':0, '재성':0, '관성':0, '인성':0 };
            const logicMap = tenGodsLogicMap[dmElement];
            Object.keys(elements).forEach(el => {
                const count = elements[el];
                if (count > 0) tenGodsCount[logicMap[el]] += count;
            });

            let sortedTenGods = Object.keys(tenGodsCount).sort((a, b) => tenGodsCount[b] - tenGodsCount[a]);
            let dom1 = sortedTenGods[0];
            let dom2 = sortedTenGods[1];
            if (tenGodsCount[dom1] === 0) dom1 = '비겁';
            if (tenGodsCount[dom2] === 0) dom2 = '식상';
            
            let tieExplanation = "";
            let maxCount1 = tenGodsCount[sortedTenGods[0]];
            let maxCount2 = tenGodsCount[sortedTenGods[1]];
            
            if (maxCount1 === maxCount2 && maxCount1 > 0) {
                let tiedGods = sortedTenGods.filter(tg => tenGodsCount[tg] === maxCount1);
                tieExplanation = "<div style='margin-top: 15px; padding: 15px; background: #fff0f5; border-radius: 15px; border: 2px dashed #ffb6c1; color: #ff5277;'><span class='hl'>💡 십성 동점 발생!</span><br>현재 <b>" + tiedGods.join(', ') + "</b> 기운이 " + maxCount1 + "개로 팽팽하게 동점을 이루고 있습니다. 내면에서 여러 가지 강렬한 본능이 우열을 가리기 힘들 정도로 치열하게 충돌하며 다채로운 매력을 만들어내는 흥미로운 상태입니다.</div>";
            } else if (maxCount2 === tenGodsCount[sortedTenGods[2]] && maxCount2 > 0) {
                let tiedGods2 = sortedTenGods.filter(tg => tenGodsCount[tg] === maxCount2);
                tieExplanation = "<div style='margin-top: 15px; padding: 15px; background: #fff0f5; border-radius: 15px; border: 2px dashed #ffb6c1; color: #ff5277;'><span class='hl'>💡 2순위 십성 동점 발생!</span><br>주무기 뒤에서 <b>" + tiedGods2.join(', ') + "</b> 기운들이 " + maxCount2 + "개로 팽팽한 동점을 이루고 있습니다. 상황에 맞춰 여러 가면을 꺼내 쓸 수 있는 유연성을 지녔습니다.</div>";
            }

            let shensha = [];
            const baekho = ['甲辰', '乙未', '丙戌', '丁丑', '戊辰', '壬戌', '癸丑'];
            if(pillars.some(p => baekho.includes(p))) shensha.push({name: '백호대살', desc: '절망적인 위기도 기회로 뒤집어버리는 폭발력과 맹수 같은 카리스마.'});
            const gwegang = ['戊戌', '庚辰', '庚戌', '壬辰'];
            if(pillars.some(p => gwegang.includes(p))) shensha.push({name: '괴강살', desc: '세상 그 누구와도 타협하지 않는 무자비한 결단력과 거대한 스케일.'});
            const dohwaCount = branches.filter(b => ['子','午','卯','酉'].includes(b)).length;
            if(dohwaCount > 0) shensha.push({name: '도화살', desc: '가만히 있어도 타인의 시선과 욕망을 쫙 끌어당기는 치명적 매력.'});
            const yeokmaCount = branches.filter(b => ['寅','申','巳','亥'].includes(b)).length;
            if(yeokmaCount > 0) shensha.push({name: '역마살', desc: '쉴 새 없이 바쁘게 공간을 넘나들며 무대를 누벼야 돈이 쏟아지는 방랑자.'});
